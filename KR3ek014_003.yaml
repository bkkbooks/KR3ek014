珠不散方下黃丹徐徐攪入其膏已成再下碾淨松香淨末一斤四兩再同熬化取下鍋來以盆頓穩再下乳香木香胡椒輕粉各末二兩白芥子細末四兩漸入攪勻傾入缽內盛貯漸用熱湯頓化綾緞攤貼七日後諸病可痊百發百中附骨疽應用方保安萬靈丹見癰疽腫疽門十全大補湯見潰瘍門小柴胡湯見瘰癧門腸癰論第二十八夫腸癰者皆濕熱瘀血流入小腸而成也又由來有三一男子暴急奔走以致腸胃傳送不能舒利敗血濁氣壅遏而成者一也二婦人產後體虛多臥未經起坐又或坐草艱難用力太過育後失逐敗瘀以致敗血停積腸胃結滯而成者二也三飢飽勞傷擔負重物致傷腸胃又或醉飽房勞過傷精力或生冷並進以致氣血乖違濕動痰生多致腸胃痞塞運化不通氣血凝滯而成者三也總之初起外症發熱惡寒脈芤而數皮毛錯縱腹急漸腫按之急痛大便墜重小便澀滯若淋甚者臍突腹脹轉側水聲此等並見則內癰已成也初起未成時小腹殷殷作痛儼似奔豚小便淋澀者當大黃湯下之瘀血去儘自安體虛脈細不敢下者活血散瘀湯和利之已成腹中疼痛脹滿不食便淋刺痛者薏苡仁湯主之腹濡而痛小腹急脹時時下膿者毒未解也用牡丹皮湯治之如膿從臍出腹脹不除飲食減少面白神勞此皆氣血俱虛宜八珍湯加牡丹皮肉桂黃耆五味子斂而補之如積襲日久因循不識此症誤作脹病治之以致毒攻內臟腸胃受傷或致陰器攻爛腐靨黑斑色敗無膿每流汙水腹連陰痛煩躁不止身熱口乾衾幃多臭臥房難進者凡犯之俱為不治證宜斟酌之腸癰看法初起小腹疼痛小便不利六脈微緩不作寒熱者輕已成小腹腫而堅硬小便數而不利六脈洪數者險已潰時時下膿裡急後重日夜無度疼痛不減者重潰後膿腥臭穢或流敗水濁瘀虛熱更增不食者死腸癰治法初起小腹疼痛或軟或硬脈芤數者瘀血也宜下之小腹作痛有塊大便秘澀小便如淋者宜和而利之已潰時時下膿腹痛不止飲食無味者宜托而補之產婦惡露不盡流注小腸作痛脈數者宜和而導之腹脹日久臍高突出轉側響如水聲膿內蓄急針之腸癰治驗一男子小腹脹痛裡急後重時時下膿醫作痢疾治之愈重診之脈芤而數此小腸癰也薏苡仁湯一服下膿升許隨不墜重更以牡丹皮散六服而安一幼婦產後月餘腹中漸痛腫脹如蠱內醫紛紛認為蠱病又月餘沉重昏憒彼家已棄不治請予視童稚瘡恙偶言此予討診之彼時人雖昏憒不蘇診之其脈細數有力此內癰膿病也猶似不妨彼家曰無生之理予曰腹腫上見而按之一決其生何如隨視腫皮緊急光亮臍下大熱此內癰不妨乃萬無一失之病彼家歡悅分付先備淨桶用滾湯半桶蓋之聽用先以薏苡仁湯加酒炒大黃二錢徐徐灌服待腹中覺痛搭起患者坐桶上熱氣熏蒸其膿下如湧泉連湯與膿約共滿桶其患即蘇更服八珍湯加牡丹皮五味子調理月餘而安一婦人小腹腫痛小便如淋診之脈緩而芤此得之行經時誤餐生冷又兼惱怒肝火急駁瘀血而成內癰膿尚未成也以大黃湯下之瘀血出盡而安一婦人小產瘀血未盡勞動之早小腹內外腫痛月餘大便秘燥小便澀滯口燥咽乾煩悶不睡內醫調理其病日重偶見問之予曰恐內癰也請視脈數實而有力此腸癰已成用薏苡仁湯加大黃一服下膿數碗脹痛頓退外腫堅硬不散仍焮作痛此欲潰膿從外泄也以十全大補湯三服膿脹痛而針之更服八珍湯加牡丹皮五味子月餘而斂一婦人腹脹如鼓臍突寸許小水澀滯轉側腹有水聲此內膿已成用針刺臍上突頂出膿盆許以牡丹皮散五六劑其膿漸少朝以八味丸暮以八珍湯加澤瀉牡丹皮黃耆破故紙服之月餘而愈矣腸癰主治方大黃湯大黃湯中用朴硝丹皮白芥不相饒加上桃仁病即消腸癰腹痛自然調治腸癰小腹堅硬如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈緊實而有力日淺未成膿者宜服之大黃炒朴硝各一錢牡丹皮白芥子桃仁去皮尖各二錢水二鍾煎八分食前或空心溫服活血散瘀湯活血散瘀湯赤芍芎歸蘇木與丹皮栝蔞枳殼桃仁等檳榔加上大黃隨治產後惡露不盡或經後瘀血作痛或暴急奔走或男子杖後瘀血流注腸胃作痛漸成內癰及腹痛大便燥者並宜服之川芎歸尾赤芍蘇木牡丹皮枳殼栝蔞仁去殼桃仁去皮尖各一錢檳榔六分大黃酒炒二錢水二鍾煎八分空心服渣再煎服牡丹皮散牡丹皮散芍參耆茯苓薏苡牡丹皮甘草白芷芎歸等桃仁官桂木香宜治腸癰腹濡而痛隻手重按則止或時時下膿人參牡丹皮白芍茯苓黃耆薏苡仁桃仁白芷當歸川芎各一錢甘草官桂各五分木香三分水二鍾煎八分食前服七賢散七賢散內參山藥萸肉丹皮熟地黃茯苓還有黃耆輩薑棗同煎理內傷治腸癰潰後疼痛淋瀝不已或精神減少飲食無味面色痿黃四肢無力自汗盜汗睡臥不寧茯苓山藥牡丹皮山茱萸熟地黃人參各一錢黃耆二錢水二鍾煨姜三片大棗二枚煎八分食前服失笑散失笑散用五靈丹還有蒲黃相更隨心腹諸疼並疝痛吞之即可樂嘻嘻治產後心腹絞痛欲死或血迷心竅不省人事及尋常腹內瘀血或積血作痛又婦人血氣為病作痛之聖藥也及治男子諸疝疼痛不已者五靈脂蒲黃俱炒等分上為細末每服三錢醋一合調稠熬數滾入水一鍾煎七分食前連藥服用醋為丸每服二錢淡醋湯下治前症亦妙排膿散排膿散內用黃耆白芷芎歸山甲宜銀花再兼栝蔞等防風加上效堪推治腸癰小腹脹痛脈滑數裡急後重時時下膿黃耆當歸金銀花白芷穿山甲防風川芎栝蔞仁各一錢水二鍾煎八分食前服或為末每服二三錢食遠蜜湯調下亦可栝蔞子湯栝蔞子湯薏苡仁桃仁丹皮共此呈產後惡露並瘀血腸胃停來用此清治產後惡露不盡或經後瘀血停滯腸胃作痛縱非是癰服之亦效薏苡仁四錢桃仁牡丹皮栝蔞仁各二錢水二鍾煎八分食前並空心服薏苡仁湯薏苡仁湯功效奇腸癰腹痛最堪醫桃仁加上栝蔞子白芍丹皮在後隨治腸癰腹中疼痛或脹滿不食小便澀滯婦人產後多有此病縱非癰服之尤效薏苡仁栝蔞仁各三錢牡丹皮桃仁去皮尖各二錢白芍一錢水二鍾煎八分空心服應用方八珍湯十全大補湯八味丸俱見潰瘍門臟毒論第二十九夫臟毒者醇酒厚味勤勞辛苦蘊毒流注肛門結成腫塊其病有內外之別虛實之殊發於外者多實多熱脈數有力肛門突腫大便秘結肚腹不寬小水不利甚者肛門肉泛如箍孔頭緊閉此為外發屬陽易治宜四順清涼飲內消沃雪湯通利大小二便痛甚者珍珠散人中白散搽之膿脹痛者針之發於內者屬陰虛濕熱滲入肛門內臟結腫刺痛如鍾小便淋瀝大便虛秘咳嗽生痰脈數虛細寒熱往來遇夜尤甚此為內發屬陰難治宜四物湯加黃柏知母天花粉甘草兼以六味地黃丸調治候內臟膿出則安又有生平情性暴急縱食膏粱或兼補術蘊毒結於臟腑火熱流注肛門結而為腫其患痛連小腹肛門墜重二便乖違或瀉或秘肛門內蝕串爛經絡汙水流通大孔無奈飲食不餐作渴之甚凡犯此未得見其有生又有虛勞久嗽痰火結腫肛門如慄者破必成漏瀝盡氣血必亡此二症乃內傷之故非藥可療不可勉治也臟毒看法初起腫痛紅色光亮疼痛有時肛門不墜便和者易已成焮赤腫痛發熱不渴小便不數展轉自便者順已潰膿稠色鮮不臭焮腫漸消疼痛漸減能食者順潰後膿水漸止新肉易生不疼多癢瘡口易乾者順初起堅硬漫腫內臟閉痛小便頻數大便秘結者險已成疼痛日甚腫連小腹肛門閉緊下氣不通者重已潰臭水淋漓疼痛不減腫仍不消身熱唇焦者逆臟毒治法初起寒熱交作大便墜痛脈浮數者宜用輕劑解散已成內熱口乾大便秘結脈沉實而有力者當下之肛門腫痛常欲便而下墜作痛者導濕熱兼瀉邪火肛門焮腫疼痛小便澀滯小腹急脹者清肝利小水出膿腥臭疼痛不減身熱者養血健脾胃更兼滲濕膿水清稀脾胃虛弱不能收斂者滋腎氣急補脾胃臟毒治驗一男子肛門腫突紅紫痛甚以內消沃雪湯二服大便已通數次疼痛稍減外腫上以珍珠散清蜜調搽早晚二次其腫漸消更風涼血地黃湯而痊愈一婦人產後用力太過肛門墜腫疼苦之甚先以枳殼紫蘇煎湯熏洗後以珍珠散加冰片豬脊髓調搽內以四物湯加升麻蒼朮丹皮枳殼服之而消一男子夏月好飲火酒熱毒流入肛門結腫堅硬形色紫黑墜痛便秘以黃連解毒湯加大黃枳殼二劑便通疼痛稍止又以四物湯合前湯數劑其腫漸消存堅腫慄大不散以臟連丸服至月餘而愈一婦人肛門腫突堅硬痛極用攻利解毒藥俱不應以神燈照法照之早晚二次其疼方減以蟾酥錠磨濃塗之堅硬漸腐為膿仍服內消沃雪湯二劑便通疼苦減其大半又以四物湯加黃柏知母厚朴蒼朮外以珍珠散加冰片豬髓調搽月餘而平一男子素有內痔便血常欲脫肛一朝肛門墜重不收腫痛突起光亮紫色此濕熱流注結腫固難收入以黃連除濕湯二劑外用珍珠散加冰片清蜜調塗其腫痛漸減後以補中益氣湯加生地黃連蒼朮天花粉牡丹皮服之數劑其腫痛漸減而平一監生素性急暴每縱膏粱因積毒流於大腸內如針刺外肛不腫常欲後重便則秘結診之脈空數而無力此真氣不足邪火有餘內臟虧損症也後必難痊辭不可治後請別醫用藥月餘肛門內腐敗水無禁復請視之予曰決不可療也脈來虛數邪勝正也手掌不澤脾氣敗也至夜發熱陰虛火旺敗水無禁幽門已壞面若塗脂元氣走散鼻如煙煤肺氣將絕口乾舌燥腎水已竭犯此豈有不死之理患者不服強用解毒滋陰藥餌不效而死臟毒主治方黃連除濕湯黃連除濕湯芩樸蒼朮陳歸枳殼翹防風甘草硝黃等臟毒懸癰此莫逃治臟毒初起濕熱流注肛門結腫疼痛小水不利大便秘結身熱口乾脈數有力或裡急後重黃連黃芩川芎當歸防風蒼朮厚朴枳殼連翹各一錢甘草五分大黃朴硝各二錢水二鍾煎八分空心服涼血地黃湯涼血地黃湯連芍生地芎歸術地榆人參花粉茯苓草山梔加上效應孚治臟毒已成未成或腫不腫肛門疼痛大便墜重或泄或秘常時便血頭暈眼花腰膝無力者川芎當歸白芍生地白朮茯苓各一錢黃連地榆人參山梔天花粉甘草各五分水二鍾煎八分食前服內托黃耆散內托黃耆散芍歸川芎山甲共陳皮角針白朮檳榔等臟毒將成此藥醫治臟毒已成紅色光亮已欲作膿不必內消宜服此藥潰膿川芎當歸陳皮白朮黃耆白芍穿山甲角針各一錢檳榔三分水二鍾煎八分食前服黃連解毒湯見癰疽腫瘍門治好飲法酒縱食膏粱積熱流入大腸致肛門結成腫痛疼刺如鍾堅硬如石宜服金液戊土膏見癰疽門治臟毒出於驕奢情性慣於急暴烈火猖狂思不如願水已枯竭火不發泄旺而又郁鬱而又旺以致肛門結腫毒攻內臟痛如芒刺熾如火炕臭水淋漓生命難望宜服此藥免生惆悵也珍珠散見下疳門治肛門腫泛如箍紅紫急脹堅硬痛極本方加冰片研極細豬脊髓調塗患上早晚日用二次應用方六味地黃丸見肺癰門四順清涼飲見湯潑火燒門內消沃雪湯神燈照法蟾酥錠俱見腫瘍門四物湯補中益氣湯俱見潰瘍門人中白散珍珠散俱見下疳門臟連丸見痔瘡門痔瘡論第三十夫痔者乃素積濕熱過食炙爆或因久坐而血脈不行又因七情而過傷生冷以及擔輕負重竭力遠行氣血縱橫經絡交錯又或酒色過度腸胃受傷以致濁氣瘀血流注肛門俱能發痔此患不論老幼男婦皆然蓋有生於肛門之內又突於肛外之傍治分內外各自隄防大者若蓮花蜂窠翻花雞冠菱角珊瑚等狀小者如櫻珠鼠尾牛奶雞心核桃蜆肉之形故積毒深者其形異而頑惡毒淺者其形正而平常久則崩潰成漏新則墜腫刺疼甚者糞從孔出血從竅流氣血日有所傷形容漸有所削若不早治終至傷人因常治法多用針刀砒硇線墜等法患者受之苦楚聞此因循都不醫治予療此症藥味數品從火煅煉性即純和百試百驗此方法由來異矣凡療內痔者先用通利藥湯滌臟腑然後用喚痔散塗入肛門片時內痔自然泛出即用蔥湯洗淨搽枯痔散早午晚每日三次次次溫湯洗淨搽藥輕者七日重者十一日其痔自然枯黑乾硬停止枯藥其時痔邊裂縫流膿換用起痔湯日洗一次待痔落之後換搽生肌散或鳳雛膏等藥生肌斂口虛者兼服補藥其口半月自可完矣外痔者用消毒散煎洗隨用枯痔散照內痔搽法用之首尾至終無異完口百日入房乃吉又至於穿腸久漏者此則另有二方亦具於後以致深患者服之又不用針刀掛線效如拾芥耳痔瘡看法初起形如牛奶不腫不紅無焮無痛行走不覺者輕已成腫痛有時遇勞而發或軟或硬頭出黃水者輕久如雞冠蜂窠蓮花翻花等狀流膿出血不止者重久漏竅通臀腿膿水淋漓疼痛不已糞從孔出者逆痔瘡治法初起及已成漸漸大而便澀作痛者宜潤燥及滋陰肛門下墜大便去血時或疼痛堅硬者宜清火滲濕紫色疼痛大便虛秘兼作癢者涼血祛風疏利濕熱腫痛堅硬後重墜刺便去難者外宜熏洗內當宣利內痔去血登廁脫肛而難上收者當健脾升舉中氣便前便後下血面色痿黃心忪耳鳴者宜養血健脾諸痔欲斷其根必須枯藥當完其竅必杜房勞乃愈痔瘡治驗一男子患痔六年每遇酒色勞役痔則發腫堅硬疼苦十餘日方得稍可彼欲斷其根以枯痔散上至七日外其痔漸黑裂縫至十六日痔枯脫落孔若雞心以生肌散逐日用之內補養血健脾藥而愈一男子患痔焮腫作痛大便結燥脈數有力以內疏黃連湯二服便行痛止又以四物湯加芩連枳殼天花粉數劑而腫消更以臟連丸一料而不復發一男子患痔凡遇勞發腫作痛以枳殼湯熏洗內服防風秦艽湯數服腫痛俱減令彼常洗前湯每月五六次內與六味地黃丸加黃柏知母服之不發一男子好飲多欲內痔虛墜下血以四物湯加芩連升麻葛根數服虛墜乃止又以當歸郁李仁湯二劑痔腫亦消更服臟連丸月餘便血亦止又月餘兼節酒色不發大抵醉飽入房經脈橫解或精氣一泄脈絡必虛酒食之毒乘虛流結或淫極強固精氣以致敗精濁血遂傳大腸又或飲食厚味燥濕流注俱成斯疾所受病者燥氣也為病者濕氣也初宜瀉火和血潤燥疏風久宜養血滋陰健脾滲濕治之自愈若不節酒色不慎起居不戒口味破必成漏久則穿腸串臀穢從孔出臭水淋漓晝夜無禁凡得此者雖不傷生每苦瘀汙可嘆息哉一男子患痔十餘年頭已穿潰未及通腸每發疼苦以三品一條槍插至七日痔變黑色瘡邊漸漸裂縫至十五日脫落以鳳雛膏搽至半月斂口而平一男子怯弱內痔便血面色痿黃自服涼藥止血藥不應診之脾脈虛而無力此中氣不足不能統血以補中益氣湯十餘服精神頓倍便血亦少又以加味四君子湯兼前湯間服月餘不發大抵此症所致之由不同當究其因治之如元氣有餘形黑氣盛先糞而後紫血者更兼脈實有力此屬有餘法當涼血止血藥應自效至若形體瘦弱面色痿黃先鮮血而後糞者更兼脈虛無力此屬不足豈可反用涼藥止之致傷脾胃此症若不溫中健脾升舉中氣其血不得歸原故藥難效遠其根本也痔瘡主治方防風秦艽湯防風秦艽湯芍歸芎芩草地地黃隨檳翹槐角山梔殼白芷還兼蒼朮宜治痔瘡不論新久肛門便血墜重作疼者並效防風秦艽當歸川芎生地白芍赤茯苓連翹各一錢檳榔甘草梔子地榆枳殼槐角白芷蒼朮各六分水二鍾煎八分食前服便秘者加大黃二錢提肛散提肛散內用芎歸參朮耆陳甘草隨升麻柴芩並白芷加上黃連效可奇治氣虛肛門下墜及脫肛便血脾胃虛弱等症川芎歸身白朮人參黃耆陳皮甘草各一錢升麻柴胡條芩黃連白芷各五分水二鍾煎八分食遠服渣再煎服加味四君子湯加味四君子湯術茯苓扁豆與人參黃耆甘草薑棗等痔瘡脾倦效如神治痔瘡痔漏下血不止面色痿黃心忪耳鳴腳弱氣乏及一切脾虛口淡食不知味又治中氣虛不能攝血致便血不禁者並效人參白朮茯苓白扁豆黃耆炙甘草炙各一錢水二鍾姜一片棗二枚煎八分食前服當歸郁李湯當歸郁李湯生地大黃澤瀉共秦艽麻仁枳實並蒼朮皂子相兼用莫逃治痔大便結燥大腸下墜出血苦痛不能忍者當歸郁李仁澤瀉生地黃大黃枳實蒼朮秦艽各一錢麻子仁研一錢五分皂角一錢水二鍾煎八分空心服芎歸湯芎歸湯內用芎歸失血虛羸大得宜婦人產後虛煩熱煎嘗頃刻脫藩籬治便血或失血過多兼婦人產後血虛煩熱頭眩昏暈盜汗等症並效川芎三錢當歸酒拌五錢水二鍾煎八分食前服自汗手足冷者加人參二錢三黃二地湯三黃二地湯蒼朮厚朴陳皮白朮歸人參防風兼甘草地榆澤瀉共烏梅治腸風諸痔便血不止及面色痿黃四肢無力生地黃熟地各一錢半蒼朮厚朴陳皮黃連黃柏黃芩歸身白朮人參各一錢甘草防風澤瀉地榆各六分烏梅二個水二鍾煎八分食前服粟殼散粟殼散內用歸耆生熟地黃蒼柏宜參芩厚朴陳皮草荷蒂艽升地骨皮治諸痔作疼及腸風下血諸藥不止者宜服之粟殼溫湯泡去內穰去蒂切絲蜜水拌炒二錢當歸陳皮秦艽黃耆生地黃熟地各一錢黃柏黃芩人參蒼朮厚朴升麻各六分荷葉蒂七個甘草五分地骨皮一錢二分水二鍾煎八分食前服或為細末每服二錢空心溫酒調服洗痔枳殼湯洗痔枳殼湯捐痛癩蝦蟆草相成共用此煎湯洗痔瘡諸般疼苦隨時送治