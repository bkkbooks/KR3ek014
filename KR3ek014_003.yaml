body:
  text: 卷之三下部癰毒門流注論第二十五夫流注者流者行也乃氣血之壯自無停息之機注者住也因氣血之衰是以凝滯之患故行者由其自然住者由其瘀壅其形漫腫無頭皮色不變所發毋論穴道隨處可生凡得此者多生於體虛之人勤勞之輩不慎調燮夏秋露臥縱意取涼熱體當風圖身快爽或中風邪發散未盡或欲後陰虛外寒所侵又或惱怒傷肝鬱結傷脾榮氣不從逆於肉裡又或跌打損傷瘀血凝滯或產後惡露未盡流縮經絡此等種種皆成斯疾也既成之後當分表裡寒熱虛實邪正新久而治之初因風寒相中表症發散未盡者人參敗毒散散之房欲之後體虛寒氣外侵者五積散加附子溫之勞傷鬱怒思慮傷脾而成者歸脾湯加香附青皮散之跌撲傷損瘀血凝滯而成者復元活血湯逐之產後惡露未盡流注經絡而成木香流氣飲導之此皆初起將成之法一服至三四服皆可外俱用琥珀膏敷貼其中亦有可消者十中五六如服前藥不得內消者法當大養氣血培助脾胃溫暖經絡通行關節木香流氣飲十全大補湯俱加熟附子香附培助根本此則未成者自消已成者自潰已潰者自斂而終無殘敗破漏不斂之症且如有膿宜急開之患者又當慎起居戒七情遠寒就溫俱可保全若誤用寒涼克伐內消等藥終至不救者多矣流注看法初起漫腫皮色光亮微熱微疼筋骨不欠強者為順已成身體微熱飲食有味疼痛有時腫生紅色者順已潰膿稠而黃腫消痛止身體輕便起坐如常者順潰後內肉易生膿水易止精神易復膿口易合者順初起身體發熱脈細而數皮色微腫痛徹筋骨者險已成飲食少思口乾作渴身體疼痛四肢沉重者險已潰膿水清稀腫仍不消虛熱不退疼痛下減者逆潰後膿穢不止肌膚瘦削飲食不餐發熱皮粗者死流注治法初因風寒表散未盡而後復生腫痛者再宜和解之表邪已盡而後復生流注者宜清熱消腫行散氣血暴怒所傷抑鬱所致胸膈痞悶中氣不舒順氣寬中腫硬已成而不得內消者宜和氣血更兼補助脾胃跌撲閃肭瘀血凝滯為患者宜調和氣血通行經絡寒邪所襲筋攣骨痛及遍身疼痛者溫經絡行氣血產後敗血流注關節致生腫痛者當散敗瘀養氣血潰後膿水不止而形衰食少者宜滋氣血峻補脾胃流注治驗一男子風寒表散未盡兩腮腫痛微熱不退小柴胡湯加川芎天花粉桔梗連翹二服餘熱頓退又以二陳湯加桔梗黃芩牛蒡子連翹四服十日而安一男子勞傷受寒背生三腫皮色不變寒熱交作至夜尤甚先以萬靈丹洗浴發汗寒熱頓退惟腫硬不消以琥珀膏敷之三次其腫消痛止漸漸而平一婦人因怒脅下結腫將近半年方痛此得之肝氣鬱結之症以木香流氣飲四服其腫漸紅此日久之病必欲作膿不可內消又以十全大補湯加木香香附青皮十餘服其腫漸高又以本方加皂角刺五服其膿方潰且清且多此勞中所得者元氣已經虧損其膿故多而清以人參養榮湯加熟附子月餘膿稠且少又本方倍參耆歸術兩月而愈一男子元氣素虛因暴怒膊生腫塊疼痛牽強寒熱往來飲食日減以補中益氣湯加香附貝母十餘服寒熱漸止又以益氣養榮湯月餘而腫潰間以八珍湯服之外用附子餅日灸二次脾胃健而安一孀婦項間乳上各腫一塊將近一年漸大方痛診之脈細數而無力此思慮過傷之病也以歸脾湯加桔梗香附十餘服其腫漸高外以琥珀膏敷之腫頂紅色欲其作膿又以十全大補湯加桔梗貝母服之半月膿熟針之後頭腐膿清虛熱復作食少不睡仍以歸脾湯間以逍遙散服之三月而愈一男子平素怯弱腰後微腫一塊飲食少思口乾發熱此得之腎傷之病也治當朝以附桂八味丸午用人參養榮湯扶植根本為要彼以口乾發熱內火之故欲投清涼之劑解之予辭不敢治請內醫視之以退熱為主正合病家之意投藥三劑腹痛作瀉又以豬苓澤瀉厚朴泄氣等藥大熱發作形體更變復請予治予曰死之速矣伊不知因虛致病法當滋補況是腰間腫塊內腎受傷口乾作渴腎水枯竭發熱不退陰虛血少今以有餘之藥而療不足之症豈有不死者始信前誤又半月而死流注主治方調和榮衛湯調和榮衛湯甘草陳獨芎歸耆大茴赤芍白芷並烏藥牛膝紅花相共隨治流注初起氣血凝聚結腫不散已成未成服川芎當歸陳皮獨活各一錢赤芍白芷烏藥大茴香黃耆各八分甘草炙紅花各五分牛膝下部加水二鍾煎八分入酒一杯量病上下服木香流氣飲木香流氣飲芎歸蘇桔青皮烏澤耆枳殼檳苓防半夏腹皮半芍膝甘隨治流注瘰癧及鬱結為腫或血氣凝滯遍身走注作痛或心胸痞悶嗌咽不利脅腹膨脹嘔吐不食上氣喘急咳嗽痰盛或四肢面目浮腫者並服之川芎當歸紫蘇桔梗青皮陳皮烏藥黃耆枳實茯苓防風半夏白芍各一錢甘草節大腹皮木香檳榔澤瀉枳殼各五分牛膝下部加一錢水三鍾姜三片棗一枚煎八分食遠服六郁湯六郁湯內用川芎半夏陳苓香附同甘梔蒼朮砂仁等濕痰流注即時通治諸鬱結腫及左右二搭相串濕痰流注等症川芎半夏茯苓香附陳皮山梔各一錢蒼朮砂仁甘草各五分姜三片水二鍾煎服附子八物湯附子八物湯芎芍熟地人參術茯苓甘草肉桂當歸等木香薑棗效通神治房欲後陰虛受寒致生腫塊又或遍身腿腳疼痛不能步履川芎白芍熟地人參白朮茯苓當歸附子各一錢肉桂五分木香甘草各三分水二鍾姜三片棗一枚煎八分食遠服瘡科流氣飲瘡科流氣飲芎歸甘桔蘇檳芍桂耆防風枳殼香烏藥白芷人參厚朴隨治流注及一切鬱怒凝滯氣血作腫疼痛或胸膈痞悶或風寒濕毒搏於經絡結成腫塊者服當歸甘草紫蘇人參白芍官桂黃耆防風枳殼烏藥桔梗厚朴各七分檳榔木香川芎白芷各五分水二鍾煎八分食遠服通經導滯湯通經導滯湯香附赤芍芎歸熟地隨陳皮丹皮蘇草節牛膝紅花獨活奇治婦人產後敗血流注經絡結成腫塊疼痛者香附赤芍川芎當歸熟地陳皮紫蘇牡丹皮紅花牛膝枳殼各一錢甘草節獨活各五分水二鍾煎八分入酒一小杯食前服香附餅香附餅最散風寒酒和調成患上安熨底熱攻寒氣散敢教苦楚即成歡治風寒流注襲於經絡結成腫痛用香附為末酒和量瘡大小做餅復患處熱熨斗熨藥上未成者自消已成者自潰風寒濕毒宜薑汁作餅醒脾湯醒脾湯中白朮耆人參酸棗地骨皮茯神遠志柴甘桔香附木香共得宜治懷抱鬱結思慮傷脾致脾氣不行逆於肉裡乃生壅腫疼痛不眠心煩不安神氣不清等症白朮黃耆人參茯神各一錢酸棗仁地骨皮遠志各七分柴胡甘草桔梗黃連木香香附各五分圓眼肉七個水二鍾姜三片棗二枚煎八分不拘時服調中大成湯調中大成湯朮附苓歸芎藥藿黃耆砂仁遠志丹皮草肉桂煨姜黑棗隨治流注潰後膿水清稀飲食減少不能生肌收斂白朮茯苓歸身白芍陳皮山藥黃耆牡丹皮各一錢人參二錢藿香砂仁遠志甘草各五分附子肉桂各八分水二鍾煨姜三片棗二枚煎八分食遠服黃耆六一湯黃耆六一湯甘草加上人參三味奇流注膿多並作渴更兼煩躁效堪推治流注潰後膿水出多口乾作渴煩躁不寧服之黃耆半生半蜜水炒六錢甘草半生半炙一錢五分人參一錢水二鍾煎八分食遠服散血葛根湯散血葛根湯半夏芎防羌葛芷升麻甘草細辛並蘇葉桔梗香附與紅花治跌撲傷損瘀血凝滯結成流注身發寒熱者乾葛半夏川芎防風羌活升麻桔梗各八分白芷甘草細辛蘇葉香附紅花各六分水二鍾蔥三根姜三片煎八分不拘時服先天大造丸先天大造丸歸杞熟地生苓兔肉黃烏茅巴骨香牛膝遠志青鹽故紙方治風寒濕毒襲於經絡初起皮色不變漫腫無頭或陰虛外寒侵入初起筋骨疼痛日久遂成腫痛潰後膿水清稀久而不愈漸成漏症者服紫河車酒煮搗膏一具熟地黃酒煮搗膏四兩歸身茯苓人參枸杞菟絲子肉蓯蓉酒洗搗膏黃精白朮何首烏去皮用黑豆同蒸搗膏川牛膝仙茅浸去赤汁蒸熟去皮搗膏各二兩骨碎補去毛微炒川巴戟去骨破故紙炒遠志去心炒各一兩木香青鹽各五錢丁香三錢黑棗肉二兩上為細末煉蜜丸如桐子大每服七十丸空心溫酒送下此方非獨流注成漏者又補一切氣血虛羸勞傷內損乃男婦久無嗣息並有奇功琥珀膏琥珀膏中用大黃南星白芷鬱金香同蒜搗稠敷患處管教流毒即安康治一切皮色不變漫腫無頭氣血凝滯結成流毒毋論身體上下年月新久但未成膿者並效大黃二兩鬱金南星白芷各一兩共為細末用大蒜頭去殼搗爛入上藥再搗稠入酒一二匙調勻遍敷腫上紙蓋隨即熱痛又有不痛俱待藥干便效次日又有起泡又有不起泡者如有泡起挑去泡中黃水膏貼之自效流注應用方十全大補湯人參養榮湯補中益氣湯益氣養榮湯八珍湯俱見癰疽潰瘍門萬靈丹見癰疽腫瘍門小柴胡湯二陳湯俱見瘰癧門乳癰論第二十六附乳岩夫乳病者乳房陽明胃經所司乳頭厥陰肝經所屬乳子之母不能調養以致胃汁濁而壅滯為膿又有憂鬱傷肝肝氣滯而結腫初起必煩渴嘔吐寒熱交作腫痛疼甚宜牛蒡子湯主之厚味飲食暴怒肝火妄動結腫者宜橘葉散散之又憂鬱傷肝思慮傷脾積想在心所願不得志者致經絡痞澀聚結成核初如豆大漸若棋子半年一年二載三載不疼不癢漸漸而大始生疼痛痛則無解日後腫如堆慄或如復碗紫色氣穢漸漸潰爛深者如巖穴凸者若泛蓮疼痛連心出血則臭其時五臟俱衰四大不救名曰乳岩凡犯此者百人百必死如此症知覺若早只可清肝解鬱湯或益氣養榮湯患者再加清心靜養無掛無礙服藥調理只可苟延歲月惟初生核時急用艾灸核頂待次日起泡挑破用披針針入四分用冰螄散條插入核內糊紙封蓋至十三日其核自落用玉紅膏生肌斂口再當保養不發又男子乳節與婦人微異女損肝胃男損肝腎蓋怒火房欲過度以此肝虛血燥腎虛精怯血脈不得上行肝經無以榮養遂結腫痛治當八珍湯加山梔牡丹皮口乾作渴者加減八味丸腎氣素虛者腎氣丸已潰作膿者十全大補湯懷孕之婦乳疾曰內吹因胎氣旺而上衝致陽明乳房作腫宜石膏散清之亦可消散遲則遷延日久將產出膿乳汁亦從乳竅流出其口難完有此者純用補託生肌其口亦易完矣乳癰乳岩看法初起紅赤腫痛身微寒熱無頭眩無口乾微痛者順已成焮腫發熱疼痛有時一囊結腫不侵別囊者輕已潰膿黃而稠腫消疼痛漸止四邊作癢生肌者順潰後膿水自止腫痛自消新肉易生膿口易合者順初起一乳通腫木痛不紅寒熱心煩嘔吐不食者逆已成不熱不紅堅硬如石口乾不眠胸痞食少者逆已潰無膿正頭腐爛腫勢愈高痛勢愈盛流血者死潰後肉色紫黑痛苦連心涴氣日深形體日削者死乳癰乳岩治法初起發熱惡寒頭眩體倦六脈浮數邪在表宜散之發熱無寒噁心嘔吐口乾作渴胸膈不利者宜清之憂鬱傷肝思慮傷脾結腫堅硬微痛者宜疏肝行氣已成焮腫發熱疼痛有時已欲作膿者宜托裡消毒膿已成而脹痛者宜急開之又脾胃虛弱更兼補托潰而不斂膿水清稀腫痛不消疼痛不止大補氣血結核不知疼痛久而漸大破後惟流汙水養血清肝乳癰治驗一婦人因怒左乳腫痛寒熱交作以人參敗毒散一劑表症已退又以牛蒡子湯二服腫消漸漸而安一婦人憂思過度久郁成癆左乳結核如桃半年似痛非痛咳嗽生痰身發潮熱診之脈微數而無力此真氣雖弱而邪火尚未有餘如用藥合理亦堪調治先用逍遙散加香附貝母十餘服而咳嗽漸止寒熱間作又以八珍湯加香附牡丹皮柴胡遠志十餘服身熱去其八九又以益氣養榮湯加青皮木香兩月餘其胸膈得利噯氣得舒飲食漸進肌膚漸澤外腫以阿魏化痞膏貼之半年餘而消一婦人右乳疼痛腫如復碗診之脈數有力此有餘症欲作膿也以托裡消毒散數服而脹痛即針之出膿碗許又以十全大補湯加香附十餘服而安一婦人暴怒左乳結腫疼痛自服仙方活命飲二服疼痛稍止結腫不消仍服清涼敗毒之劑腫痛反作形體日弱予診之脈浮數而無力此屬真氣虛而邪氣實也非補不可以益氣養榮湯四五服其腫始高寒熱亦退又十餘服而膿潰兼以十全大補湯兩月而痊此非純補之功其疾豈能得愈一男子年過五旬因妻喪子不成立憂鬱傷肝左乳結腫半年痛甚作腐肝脈弦數先以小柴胡湯加青皮山梔遠志貝母數服而肝脈稍平又以八珍湯仍加前藥十餘服其腫漸腐為膿更服益氣養榮湯庶保收斂彼為內醫所惑謂鬱怒傷肝肝經有火不必用補更服降火流氣寬中等劑致食少便秘發熱作渴復請予治肝脈復弦口乾作渴邪火內淫飲食減少脾土受傷便秘發熱陰血竭而為燥為熱已上俱內損症也辭不治後月餘果死一婦人左乳結核三年方生腫痛診之脈緊數而有力此陽有餘而陰不足也況結腫如石皮肉紫色不澤此乳岩症也辭不治又一婦左乳結腫或小或大或軟或硬俱不為痛已半年餘方發腫如復碗堅硬木痛近乳頭壘壘遍生疙瘩時痛時癢診之脈弦而數腫皮慘黑不澤此氣血已死辭不可治又一婦已潰腫如泛蓮流血不禁辭後果俱死乳癰主治方牛蒡子湯牛蒡子湯栝蔞仁銀花山梔甘草陳黃芩連翹柴花粉青皮牛子角針平治乳癰乳疽結腫疼痛毋論新久但未成膿服陳皮牛蒡子山梔金銀花甘草栝蔞仁黃芩天花粉連翹角針各一錢柴胡青皮各五分水二鍾煎八分入酒一杯和勻食遠服橘葉散橘葉散內有柴陳川芎山梔青皮迎石膏黃芩連翹行甘草加之效有靈治婦人有孕胎熱為內吹有兒吃乳名外吹致乳結成腫痛寒熱交作甚者噁心嘔吐並服之柴胡陳皮川芎山梔青皮石膏黃芩連翹各一錢甘草五分橘葉二十個水二鍾煎八分食遠服渣再煎服清肝解鬱湯清肝解鬱湯陳芍桔半芎歸貝茯神青皮生附並蘇葉通草山梔遠志評治一切憂鬱氣滯乳結腫硬不疼不癢久漸作疼或胸膈不利肢體倦怠面色痿黃飲食減少陳皮白芍川芎當歸生地半夏香附各八分青皮遠志茯神貝母蘇葉桔梗各六分甘草山梔木通各四分水二鍾姜三片煎八分食遠服鹿角散鹿角散效獨稱雄消乳專於建大功每服三錢酒調下能教腫痛永無蹤治乳癰新起結腫疼痛憎寒發熱但未成俱效鹿角尖三寸用炭火內煅稍紅存性碾末每服三錢食後熱酒一茶鐘調服甚者再一服必消回乳四物湯回乳四物湯最靈芎歸白芍熟地呈加上麥芽能散乳最消腫脹得和平治產婦無兒吃乳致乳汁腫脹堅硬疼痛難忍川芎當歸白芍熟地各二錢麥茅炒為粗末二兩水二鍾煎八分食遠服用腳布束緊兩乳以手按揉其腫自然消散甚者再用一服灸乳腫妙方灸乳腫痛方來異惱怒勞傷氣不調將碗復於患上灸諸般腫疼寂然消治氣惱勞傷或寒熱不調乳內忽生腫痛用碗一隻內用粗燈草四根十字排勻碗內燈草頭各露寸許再用平山粗紙裁成一寸五分闊紙條用水濕紙貼蓋碗內燈草上紙與碗口相齊將碗復於腫乳上留燈草頭在外將艾大圓放碗足底內點火灸之艾盡再添灸至碗口流出水氣內痛覺止方住甚者次日再灸一次必消保安萬靈丹見癰疽腫瘍門治乳癰初起發熱惡寒頭眩肢體作痛者立效益氣養榮湯見瘰癧門治鬱怒傷肝七情內結以致乳中生核不疼不癢日久方痛甚者胸膈不利吞酸嘔吐頭目昏眩四肢倦怠或已破潰膿水清稀不能收斂飲食減少口淡無味自汗盜汗肢體羸瘦者並效治乳便用方治乳蒲公英常說同酒煎來乘熱啜再加蔥湯催汗泄消腫猶如湯潑雪治乳癰初起腫痛未成膿者用蒲公英春秋間開黃花似菊取連根蒂葉二兩搗爛用好酒半斤同煎數沸存渣敷腫上用酒熱服蓋睡一時許再用連須蔥白湯一茶鍾催之得微汗而散此方鄉村偏僻無藥之所用之極妙亦且簡便下乳天漿散下乳天漿散四物茯苓花粉麥門冬王不留行並山甲漏蘆甘草木通逢治乳母元氣虛弱乳汁微少或生兒日久乳少川芎當歸白芍熟地茯苓天花粉甘草王不留行炒麥門冬漏蘆穿山甲炒通草各一錢用健豬前蹄一隻煮蹄爛取汁兩碗同藥煎至碗半二次頓熱食遠服之以熱木梳梳其乳房其汁如泉湧而來木香餅木香餅同生地黃二物和勻患上裝氣滯腫疼並閃肭用之一熨自無殃治一切氣滯結腫成核或痛或閃肭風寒所傷並效木香五錢生地黃搗膏一兩上木香為末同地黃和勻量患處大小作餅置腫上以熱熨斗熨之堅硬木痛者間日熨之妙乳癰應用方十全大補湯八珍湯見癰疽潰瘍門逍遙散冰螄散小柴胡湯見瘰癧門托裡消毒散見腫瘍門阿魏化痞膏見痞疾門附骨疽第二十七附鶴膝風夫附骨疽者乃陰寒入骨之病也但人之氣血生平壯實雖遇寒冷則邪不入骨凡入者皆由體虛之人夏秋露臥寒濕內襲或房欲之後蓋復單薄寒氣乘虛入里遂成斯疾也初起則寒熱交作稍似風邪隨後臀腿筋骨作疼不熱不紅疼至徹骨甚者曲伸不能轉側日久陰變為陽寒化為熱熱甚而腐肉為膿此疽已成也凡治此症初起寒熱作痛時便用五積散加牛膝紅花發汗散寒通行經絡或萬靈丹發汗亦可次以大防風湯行經活血滲濕補虛又有生於尻臀部位漫腫作疼者內托羌活湯腿內近膝股漫腫木痛者內托耆柴湯腿外側者內托酒煎湯初起通用人參敗毒散加木瓜牛膝蘇木紅花虛者十全大補湯加羌活防己牛膝已成欲作膿者附子八珍湯膿成脹痛者即針之膿稠而黃體實者十全大補湯膿清色白體虛者保元大成湯食少體倦者香砂六君子湯脾虛寒熱者補中益氣湯以此調理可也又有風濕相乘之症初起寒熱交作次傳腿腫作痛其形光亮微紅發熱腫痛按之如泥不便起者宜當歸拈痛湯或茯苓佐經湯間服萬靈丹和之以上之症皆由元氣不足中來不可誤用損脾泄氣敗毒等藥外禁寒涼等法如誤用之必致氣血冰凝內肉瘀腐日久化為汙水敗膿流而不禁者終死又有房欲勞傷寒熱互變氣血乖違經脈橫解受病日深以成斯疾者其患大腿漸漸腫如冬瓜上過胯腹下連足底牽連漫腫皮色不紅日久潰膿色白腥穢腫仍不消痛仍不減元氣日衰身體縮小唇舌乾焦二便枯秘諸藥不效飲食不進者終為不治又有鶴膝風乃足三陰虧損之症初起寒熱交作時亦宜五積散加牛膝紅花或萬靈丹發汗俱可如汗後腫痛仍不消減此陰寒深伏以大防風湯溫暖經絡重者兼灸膝眼二穴敷以琥珀膏亦可漸漸取效又如以上之法俱不效者終成痼疾不必強藥消之只宜先天大造丸史國公酒藥每常服之終年亦可轉重就輕移步行履尚可圖也附骨疽看法初起身微寒熱飲食如常結腫微紅疼不附骨者順已成舉動自便結腫成囊疼痛有時膿易成者為吉已潰膿稠腫消痛減身體輕便醒蘇睡穩不熱者吉潰後元氣易復飲食易進內肉易實膿水易乾者吉初起身發寒熱漫腫色白肢體牽強疼痛附骨者險已成舉動不便通腿漫腫不熱不紅不作膿者為險已潰膿水清稀氣穢腥臭腫痛不消形體日削者死潰後脾胃虛弱飲食無味口渴不止唇白皮枯者死附骨疽治法初起發熱惡寒身體拘急腿腳腫疼脈浮緊者散之已成腿腳腫痛皮色不變上下通腫者散寒溫經絡寒熱作腫色白光亮按之如泥不起者宜健脾滲濕身體無熱惡寒脈遲而澀腿腫不熱者養血溫經絡暑中三陰脈洪而數腿腳焮腫口乾便燥者宜下之已潰膿水清稀飲食減少形體消瘦者補中健脾胃潰後腫痛不減膿水不止虛熱不退者溫中養氣血愈後筋骨牽強曲伸不便者宜滋養氣血通利關節附骨疽治驗一男子中寒發散未盡大腿腫痛脈浮數而無力此風寒未盡內虛故也以五積散去麻黃加牛膝二服疼痛稍減又以內托黃耆酒煎湯四服通腫俱消惟腿外側結腫一塊不退此瘀血凝滯欲作膿也以托裡藥候膿熟針之更以十全大補湯而斂一男子勞碌遇寒每發腿痛發則寒熱嘔吐胸痞不食此因氣惱飲食不節脾胃受傷故脾氣有虧飲食不能運化痰滯中脘濕熱動而下流注為腳氣以開結導引丸二服行去停痰又以半夏佐經湯數服嘔止膈利更以附子六物湯數劑消而不發一老人年六旬過欲腎虛致筋攣痹縮腳膝無力不能步履外貼祛風逐濕膏內服三因勝駿丸而愈一男子右腿腫痛兩月餘予曰膿已成久何不開之彼曰二老醫同治俱稱內消無膿其膿不知真否此當再請二老決之又曰此必無膿但患者昏沉不醒命在危篤予強開之出膿盆許以獨參湯連進二服而蘇後以十全大補湯調理百日外而安一男子房事後陰寒大腿無形作痛至夜尤甚不能步履醫以散寒除濕消痰止痛藥治之其疼益增診之脈細澀而無力此氣血不足寒氣所乘之症當以大防風湯二劑疼痛頓減又四劑其疾痊安一男子暑月欲後當風睡臥致寒氣襲於左腿遂成腫痛寒熱交作胸痞不食以保安萬靈丹蔥湯化服洗浴發汗以散骨髓寒毒後以大防風湯去羌活加紅花破故紙溫暖腎經通行經絡腫痛漸消血脈漸和後以三因勝駿丸間服調理兩月而愈一監生似前欲後受寒致成腿痛予以暖腎經溫經絡散寒邪藥治之彼以為緩請內醫甘服表散之劑外邪雖散其內必虛又以小柴胡湯等藥調理致虛熱發作口燥咽乾煩渴不已又以知母石膏湯清其上防風木瓜威靈仙等劑攻其下眾議紛紛雜藥妄進致病愈劇仍復請治其時患腿愈腫其形縮小此必死症也況此症原從腎經受寒非附子破故紙不能通達關節非羌活防風牛膝不能通行閉滯非人參白朮炙甘草不能使脾氣行達四肢非川芎當歸白芍熟地紅花不能養血活血凡病從虛而入者先補其虛後攻其病況治此症不加溫補而反用發散解肌以正風寒有餘之法治之不死何愈後果死醫者眾誤始信而服之附骨疽主治方五積散五積散桂芎歸桔蒼半麻陳芍茯苓枳殼乾薑並厚朴白芷甘草共姜行治風寒濕毒客於經絡致筋攣骨痛或腰腳痠疼或遍身拘急或發熱惡寒頭痛者並宜服之蒼朮二錢陳皮桔梗川芎當歸白芍各一錢麻黃枳殼桂心乾薑厚朴各六分白芷半夏甘草茯苓各四分姜三片水二鍾煎八分不拘時服頭痛惡寒者加連須蔥頭三根蓋汗為效下部加木瓜牛膝內托羌活湯內托羌活湯蒼柏防桂連翹藁本耆歸尾陳皮兼甘草紅花加上效堪推治尻臀患癰堅硬腫痛兩尺脈緊數按之無力羌活黃柏防風歸尾藁本肉桂各一錢黃耆一錢五分連翹甘草蒼朮陳皮各六分紅花五分水酒各一茶鍾煎八分食前服當歸拈痛湯當歸拈痛湯二術羌活防芩澤瀉苓升麻茵陳甘草節人參知母要調勻治濕熱下注腿腳生瘡赤腫作痛或腰腳痠痛或四肢遍身重痛或下部頑麻作癢或成血風羌活當歸防風茵陳蒼朮各一錢苦參升麻白朮各七分葛根甘草黃芩知母澤瀉豬苓人參各五分黃柏三分水二鍾煎八分食前服內托黃耆湯內托黃耆湯黃柏羌活當歸生地黃柴胡肉桂連翹等木瓜加上效非常治濕熱腿內近膝股患癰或附骨癰初起腫痛此太陰厥陰之分也脈細而弦按之洪緩有力黃耆鹽水拌炒當歸柴胡木瓜連翹各一錢羌活肉桂生地黃黃柏各五分水酒各一鍾煎一半空心熱服內托酒煎湯內托酒煎湯桂耆柴胡連翹黃柏宜甘草升麻大力子煎同水酒效堪推治寒濕發於腿外側少陽經分患癰或