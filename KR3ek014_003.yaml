媾以致淫精傳襲而成者二也三由熱藥多致火鬱未發而成者三也男子萌念火鬱之症初起先必澀淋小便溺痛次流黃濁敗精陽物漸損甚則腫痛腐爛法當疏利肝腎邪火如八正散清肝導滯湯之類是也婦人陰器不潔初起先從皮腫光亮甚如水晶皮破流水腫痛日生癢麻時發治當解毒消風如龍膽瀉肝湯兼平胃散合而用之男婦房術所傷蘊毒所致初起陽物癢痛堅硬紫色疙瘩漸生腐爛漸作血水淋漓不時興舉治當瀉火解毒如黃連解毒湯蘆薈丸之類是也外以銀粉散珍珠散人中白散選用又有先發時瘡誤用熏條擦藥結毒於此者詳註結毒門不在此類推之下疳看法初起不紅不腫睡不舉陽玉莖微損小水自利者輕已成微熱微腫皮色光亮小便赤色更兼白濁者平已損肉色紅活焮無堅腫小便不疼大便不秘者可初起小便淋漓次損陽物堅硬作痛腐爛漸開者險已成腐潰內攻傷損玉莖色紫無膿疼如針刺者重下疳治法初起腫痛發熱小水澀滯肝經濕熱也宜瀉肝滲濕腫痛堅硬焮發寒熱口燥咽乾大便秘者通利二便玉莖腫痛小便如淋自汗盜汗時或尿血清心滋腎莖竅作癢時出白濁發熱口乾津液少者益腎清心潰後腫痛小便赤澀日則安靜夜則疼甚滋陰瀉火潰爛不已腫痛又作疼痛日深穢氣不回清肝解毒下疳治驗一童子十五歲玉莖腫痛外皮浮腫比常粗大一倍他醫治之以解毒清肝等藥愈腫愈痛予視之亦用瀉火清熱滲濕等劑俱不見效診之脈細數而無力此中氣不足脾經濕水乘虛流注停聚不散當行從治法也以四物湯合平胃散加木香熟附子人參各五分一服腫痛頓退又四五服而全消一男子腫痛發寒熱以荊防敗毒散二服而退又以龍膽瀉肝湯腫痛亦減用四物加黃柏知母而消一男子年四十色欲過度小便澀痛出如白漿結凍成塊此腎傷濕熱為患朝以八味丸午用八珍湯加山萸牡丹皮黃柏知母服之月餘而澀腫亦退小便漸清但竅中常有滑精不時滲出久致腰灣腳膝無力偶以三因勝駿丸服至月餘前症悉愈一男子莖頭腐爛小水澀痛外以珍珠散內服木通湯四服澀痛亦止更服四物湯加黃柏花粉而痊一男子初婚玉莖傷損出血疼甚先以蔥湯浸洗良久隨用珍珠散加冰片摻之腐皮漸干痛亦漸止內服四物湯加木通山梔四服其腫痛漸止而愈一男子皮腫光亮發熱疼甚外敷如意金黃散內服龍膽瀉肝湯加大黃便痛稍愈去大黃又服而消下疳主治方清肝導滯湯清肝導滯湯瞿麥滑石甘草並萹蓄大便秘之加大黃燈心為引空心服治肝經濕熱玉莖腫痛小水澀滯作疼者服之萹蓄四錢瞿麥三錢滑石二錢甘草一錢大黃二錢便秘加水二鍾燈心二十根煎八分空心服龍膽瀉肝湯龍膽瀉肝湯地黃車前澤瀉麥冬當黃芩梔子甘草等濕用黃連秘大黃治肝經濕熱玉莖患瘡或便毒懸癰小便赤澀或久潰爛不愈又治陰囊腫痛紅熱甚者並效龍膽草連翹生地黃澤瀉各一錢車前子木通歸尾山梔甘草黃連黃芩各五分大黃二錢便秘加水二鍾煎八分食前服清肝滲濕湯清肝滲濕湯二術苓樸昆陳粉木通山梔澤瀉川芎等當歸甘草木香同治陰囊玉莖濕腫如豬肚小水不利墜重作痛蒼朮白朮茯苓山梔厚朴澤瀉陳皮木通天花粉昆布各一錢甘草五分木香三分川芎當歸各六分水二鍾煎八分空心服作熱紅色加黃連龍膽草各七分清心蓮子飲清心蓮子飲黃耆赤茯人參地骨皮黃芩甘草並澤瀉麥冬加上效堪題治心經蘊熱小便赤澀玉莖腫痛或莖竅作疼及上盛下虛心火炎上口苦咽乾煩躁作渴治虛陽口乾小便白濁夜則安靜晝則發熱者石蓮肉黃耆黃芩赤茯苓人參各一錢炙甘草澤瀉麥門冬地骨皮各五分水二鍾煎八分空心並食前服八正散八正散中用木通車前瞿麥大黃同萹蓄山梔並滑石加之甘草效無窮治肝經積熱小便淋閉不通及一切淋病俱效大黃車前子瞿麥萹蓄山梔木通甘草各一錢滑石二錢水二鍾煎八分食前服解毒木通湯解毒木通湯柏連膽草山梔蘆薈全瞿麥滑石並甘草還用燈心作引煎治男婦房術熱藥所傷致玉莖陰戶癢痛小水澀滯白濁滑精至夜陽物興舉不得眠者服之木通黃連龍膽草瞿麥滑石山梔黃柏知母各一錢蘆薈甘草各五分水二鍾燈心二十根煎二分食前服蘆薈丸蘆薈丸中用二連蕪荑鶴蝨共雷丸青皮麝木香同等餅糊丸來共此全治下疳潰爛作痛又治婦人陰蝕瘡作癢及小兒肝積發熱口鼻生瘡牙齦蝕爛等症胡黃連黃連蘆薈白蕪荑青皮白雷丸鶴蝨草各一兩麝香一錢木香三錢上為末蒸餅糊丸如麻子大每服一錢空心清米湯送下銀粉散銀粉散效真罕稀錫炒硃砂數不微輕粉水銀並煅粉下疳結毒敢相違治下疳毋論新久但腐爛作痛及楊梅瘡熏後結毒玉莖腐爛或陽物半傷半全者並宜用之好錫六錢化開下硃砂末二錢攪炒砂枯去砂留錫再化開挍水銀一兩和勻傾出聽用杭粉一兩研細鋪夾紙平山上捲成一條一頭點火煨至紙盡為度吹去灰用粉同煎末錫加真輕粉一兩共成一家研細凡遇前患先用甘草湯淋洗挹干隨用此藥摻上止痛生肌收斂極妙珍珠散珍珠散效實堪誇輕粉還兼缸子花諸腫諸瘡諸痛疾用之一摻自無他治下疳皮損腐爛痛極難忍及諸瘡新肉已滿不能生皮又湯潑火燒皮損肉爛疼痛不止者青缸花五分如無用頭刀靛花輕虛色翠者代之終不及缸花為妙珍珠一錢不論大小以新白為上入豆腐內煮數滾研為極細無聲方用真輕粉一兩上三味共研千轉細如飛面方入罐收凡下疳初起皮損搽之即愈腐爛疼痛者甘草湯洗淨豬脊髓調搽如諸瘡不生皮者用此乾摻即可生皮又婦人陰蝕瘡或新嫁內傷痛甚者亦可此搽極效湯潑火燒痛甚者用玉紅膏調搽之疳瘡簡便方用油透羅緞舊帽沿燒灰杭粉瓦上煅黃色各等分共研極細瓷罐收貯先用紅棗十五個甘草三錢煎湯溫洗患上挹干搽藥即效太乙膏見腫瘍門治玉莖皮損疼痛不止者用此貼之其疼即止應用方四物湯八味丸八珍湯俱見潰瘍門三因勝駿丸見附骨疽門魚口便毒論第三十二夫魚便者左為魚口右為便毒總皆精血交錯生於兩胯合縫之間結腫是也近之生於小腹之下陰毛之傍結腫名曰橫痃又名外疝是也得之入房忍精強固不泄或欲念已萌停而不遂以致精血走動凝滯結而為腫治當散滯行瘀通利大小二便九龍丹山甲內消散是也七日以後服之根本堅固恐其作膿宜用火針法刺之亦妙已出膿者十全大補湯服之庶易收斂遲則恐生別症難愈魚口便毒看法初起結腫不紅微熱行走稍便無寒熱交作者為輕已成紅赤腫痛發熱焮痛舉動艱辛至夜尤甚者易已潰膿稠肉色紅活腫消痛止新肉易生作癢者順初起結腫堅硬如石牽強刺疼起坐不便寒熱者重已潰腐爛腫痛不減膿水清稀孔深口大不斂者險魚口便毒治法初起漫漫結腫疼痛兩胯牽強身發寒熱宜散表邪已成堅硬發熱疼痛內熱口乾大小便秘宜通利之發散疏利之後腫痛仍作欲其作膿宜用托裡消毒焮腫發熱疼痛日久急脹苦甚內膿已成宜急開之已潰之後膿水不幹新肉生遲不斂健脾胃補氣血魚口便毒治驗一男子左胯腫痛身發寒熱脈弦而數以人參敗毒散一劑表症悉退次以山甲內消散二劑而痊消一男子橫痃腫痛堅硬二便澀滯以九龍丹一服通利大便腫痛稍減間日又用一服二便通利而消一男子患此十餘日形勢已成腫痛日甚因公事急出不能行走以火針法針之出紫血鍾許外用膏貼拔出微膿服托裡消毒散而便可行亦且速愈一男子潰而口大不斂此先泄藥之過也以十全大補湯加澤瀉丹皮十餘劑外搽玉紅膏月餘而斂一男子先出疳瘡久而不愈後發橫痃十餘日始生腫痛予欲托裡潰膿以泄毒氣彼欲內消自服槐花酒蜈蚣全蠍等藥腫未得消元氣已損轉致筋骨疼痛舉動艱辛仍復請治形體瘦弱脈虛而數此真元受傷邪氣從之雖當補養後必欲發時瘡方愈彼不為信自仍服敗毒消風等藥元氣愈虛飲食不進筋骨疼甚徹夜不睡又復請治先用補中益氣湯倍參耆六服元氣稍醒又以八珍湯加麥門冬五味子遠志酸棗仁牡丹皮十餘服夜間方睡惟疼痛不能大減此內虛瘡毒下陷故難取效朝以六味丸午服十全大補湯又十餘服遍身方發紅點此瘡毒欲出仍服前藥紅點漸高始成瘡樣彼時瘡毒一出疼痛頓減元氣漸復更服八珍湯加米仁銀花土茯苓服至半年其瘡方得漸漸而痊彼悔執方治病之尤始信因病用方之妙魚口便毒主治方山甲內消散山甲內消散大黃加上姜蠶甘草當木鱉牽牛同協力角口便毒自無妨治魚口便毒騎馬癰橫痃等症初起未成膿者當歸梢甘草節大黃各三錢穿山甲炒三大片姜蠶黑牽牛各一錢土木鱉三個水酒各一碗煎八分空心服渣再煎服大便行三四次方吃稀粥淡味飲食為妙九龍丹九龍丹藥真堪羨血衄兒茶乳沒煉木香巴豆等分同魚便橫痃立消見治魚口便毒騎馬癰橫痃初起未成膿者服之兒茶血衄乳香沒藥巴豆不去油木香上各等分為末生蜜調成一塊瓷盒盛之臨時旋丸寒豆大每服九丸空心熱酒一杯送下行四五次方吃稀粥腫甚者間日再用一服自消紅花散瘀湯紅花散瘀湯蘇木翹貝姜蠶乳決明歸尾大黃角針等牽牛山甲酒煎行治入房忍精強固不泄以致瘀精濁血凝結兩胯或小腹之傍結成腫痛小水澀滯者並服之當歸尾皂角針紅花蘇木姜蠶連翹石決明穿山甲乳香貝母各一錢大黃三錢牽牛二錢水酒各一碗煎八分空心服行五六次方吃稀粥補之黃耆內托散黃耆內托散芎歸白朮銀花澤瀉隨花粉角針與甘草魚口便毒此能醫治魚口便毒橫痃等症已成不得內消者服之川芎當歸黃耆各二錢白朮金銀花天花粉皂角針各一錢甘草澤瀉各五分水二鍾煎八分食前服玉紅膏見潰瘍門治魚口便毒橫痃腐潰口不合者用此搽之效火針法火針之法由來異勝如服藥並奇治將針一點破皮囊腫消痛止隨遊戲治魚口便毒橫痃等症用行藥不得內消者用粗線針二條將竹筋一頭劈開將針離分半許夾在筋頭內以線紮緊用桐油燈盞內貯之燈草五根排入油內點著用針蘸油燒紅向患頂重手刺入五六分隨出或血或膿以膏蓋貼即得輕便以後漸愈虛者兼服十全大補湯完口應用方托裡消毒散見腫瘍門十全大補湯補中益氣湯八珍湯俱見潰瘍門六味地黃丸見肺癰門囊癰論第三十三夫囊癰者乃陰虛濕熱流注於囊結而為腫至潰後睪丸懸掛者猶不傷人以其毒從外發治當補陰清利濕熱取效者十有八九近時人誤用疝家熱藥多致熱甚為膿慮難收斂初宜龍膽瀉肝湯稍久滋陰內托散外敷如意金黃散俱可內消又一種水疝皮色光亮無熱無紅腫痛有時內有聚水宜用針從便處引去水氣則安如腫痛日久內膿已成脹痛者可即針之內服十全大補湯加山茱萸牡丹皮澤瀉治之間以六味地黃丸服之亦愈囊癰看法初起不紅微腫腎子引痛不作寒熱起坐自便者輕已成紅腫發熱形色光亮疼痛有時飲食有味者順已潰膿稠腫消痛止新肉漸生不痛作癢收斂者吉潰後腐爛囊皮脫落甚者睪丸突出能食不痛者可初起堅硬紫色日夜痛甚小便不利大便秘泄者重已成堅而不潰頭腐無膿疼痛無時常流血水者重潰後膿口開張腫痛不減身發寒熱睡臥不寧者重囊癰治法初起寒熱交作腎子腫痛疼連小腹者宜發散寒邪已成紅腫發熱口乾焮痛小水不利大便秘者利之已潰疼痛不減膿水清稀朝寒暮熱者宜滋陰內托潰後不能收斂日晡發熱飲食減少者宜養血健脾潰後睪丸懸掛不能收斂者當外用生肌內加補托囊癰治驗一男子風寒未經發散寒中腎囊作腫痛甚以萬靈丹一服洗浴發汗寒邪頓退又以四物湯加澤瀉蒼朮山梔天花粉外敷如意金黃散數次而痊消一男子囊腫甚大不熱脹痛按之軟而即起此濕水流注聚而不散以披針導去黃水碗許以導水消腎丸服月餘而腫消又以木香補腎丸服之不作一男子患此十餘日腫甚脹痛內膿已成針之出膿碗許以十全大補湯加澤瀉丹皮十餘劑而收斂一老年人素有疝氣因怒傷肝舉發疼痛自服盤蔥散熱藥腫痛益甚視之腎囊半邊堅硬皮損紫黑此欲腐爛見睪丸候也彼不為信尚欲內消請別醫治之內服龍膽瀉肝湯外敷四黃散寒涼等藥堅硬果腐飲食少進虛熱不睡痛甚昏憒又復請治予曰凡病有主末治有權宜初起以藥治疝非疝也凡疝為患小腹作疼牽引腎子多寒少熱好飲熱湯此症乃惱怒傷肝陰虛濕熱為患其囊紅腫發熱小便赤澀內熱口乾墜重作痛此為囊癰之候初宜清利濕熱而返用疝家熱藥已成宜用補陰況又用瀉肝涼劑此年老氣血有虧攻補機關已誤其疾豈有不致危亡者即當養氣血固根本為主而佐以安神定痛之藥接補元氣死生在進退之間尚可轉也隨以八珍湯加麥冬五味子遠志牡丹皮外以甘草湯淋洗腐上將已壞黑肉盡行剪落其睪丸已露數日後其患得於補力前症漸退飲食漸進外腐已盡腎子已突大半搽玉紅膏外以膏蓋長肌漸收調理半年外而得始安一男子腫痛十餘日堅硬無膿囊頭腫上紫色作爛此欲外腐以蟾酥錠為末摻上膏蓋三日腐肉脫下搽玉紅膏太乙膏掩之內服補陰滋腎藥而安一男子欲後受寒致陰囊牽引小腹作痛惡寒發熱診之脈緊數而無力以五積散一服寒熱乃退痛亦稍止更以八珍湯加肉桂丹皮澤瀉數服而愈囊癰主治方清肝摻濕湯清肝摻濕湯歸地芎芍柴通澤瀉芩山梔膽草天花粉燈心甘草效如神治囊癰肝經濕熱結腫小水不利發熱焮痛者川芎當歸白芍生地柴胡龍膽草山梔天花粉黃芩各一錢澤瀉木通甘草各五分水二鍾燈心二十根煎八分食前服滋陰內托散滋陰內托散芎歸白芍還兼熟地耆角針澤瀉並山甲囊癰日久服相宜治囊癰已成腫痛發熱服之有膿即可穿潰也當歸川芎白芍熟地黃耆各一錢半皂角針澤瀉穿山甲各五分水二鍾煎八分食前服導水消腎丸導水消腎丸功捷茅朮牽牛與木通更加肉桂老米等打糊丸成建大功治囊癰內傷生冷外受風寒以致寒濕侵人囊中小者如升小者若鬥皮膚頑厚陽物短縮小水不利不痛多冷俗稱沙痁是也宜服此藥引導水氣日久漸消終身不為廢疾也此方常驗茅山蒼朮一斤米泔水浸切片炒黃木通半斤肉桂一兩刮去粗皮牽牛二兩微炒木香一兩共為細末陳米粉打糊丸如桐子大每服百丸空心白滾湯清米湯任下忌生冷麵食此囊雖夏月炎天亦以衣被複之為妙灸偏墜法偏墜灸法最多靈晴日將來仰臥身木腎盡頭為灸穴安來七壯自然平候取天晴日患者平身仰臥取木腎子根下硬根盡處以墨點記用安豆大艾炷三年之內灸七壯年久者灸九壯十一壯為止內服木香補腎丸戒食生冷兼忌房事百日為妙木香補腎丸木香補腎丸精地棗膝蛇蓯菟志歸丁香茴香枸杞戟人參青鹽杜仲揮治偏墜一名木腎不疼不癢漸漸而大最為頑疾有妨行動多致不便但灸後宜服此藥俱可內消此藥功效不獨治疝中年後宜服之益壽延年黑髮壯筋填髓明目聰耳補腎助元陽調飲食其功不可盡述婦人服之顏如童女肌膚瑩潔如玉又精寒血冷久無嗣息者服之更妙淮慶生地四兩酒煮搗膏菟絲子肉蓯蓉黃精黑棗肉牛膝蛇床子微炒茯苓遠志各一兩二錢當歸身二兩四錢丁香三錢大茴香木香各六錢枸杞子一兩五錢巴戟杜仲各一兩青鹽五錢人參五錢上為細末煉蜜丸如梧桐子大每服六七十丸空心溫酒送下又諸疝不常舉發者服之亦宜如意金黃散見腫瘍門治囊癰初起紅赤腫痛發熱墜重者用蔥湯同蜜調敷夏月濕熱紅甚者溫茶湯同蜜調敷妙應用方萬靈丹蟾酥錠太乙膏玉紅膏俱見腫瘍門十全大補湯四物湯俱見潰瘍門五積散見附骨疽門龍膽瀉肝湯見下疳門懸癰論第三十四夫懸癰者乃三陰虧損濕熱結聚而成此穴在於穀道之前陰器之後又謂海底穴也初生狀如蓮子少癢多痛日久漸如桃李赤腫焮痛欲潰為膿破後輕則成漏重則瀝盡氣血變為癆瘵不起者多矣初起時元氣壯實宜用九龍丹瀉去病根稍虛者內消沃雪湯利去濕熱亦有可消者十中三四如十餘日後腫勢已成不得內消宜托裡消毒散加山甲皂角刺服之自破如腫高光亮膿熟不破頭者用針急破之穢膿一出其患易安如膿出之後朝以六味地黃丸午以十全大補湯加牡丹皮澤瀉溫補滋陰又有厚味膏粱氣體壯實者初服龍膽瀉肝湯潰服滋陰八味湯以清蘊熱體瘦房勞氣血虛弱者初服八珍湯加澤瀉制甘草潰後十全大補湯加牡丹皮熟附子脾弱者補中益氣湯以滋化源日久成漏者國老膏化湯吞服蠟礬丸首尾誤服寒涼損胃傷脾冰凝氣血以致患孔漸開穢膿不止者亦定變成虛羸癆瘵終為難愈懸癰看法初起如松子漸大若梅李紅赤腫痛光亮發熱者輕已成高腫作痛根腳不散皮薄易破膿成脹痛者易已潰膿稠而黃氣味不臭焮痛亦消痛止作癢者順初起色紫堅硬根腳漫腫痛連臀膝二便不利者重已成腫如黃瓜紫斑腐爛穢水無膿痛甚氣急者難已潰穢膿不絕瘡口開張肉不紅活虛熱食少者逆懸癰治法初起寒熱如瘧喜復衣被口乾好飲熱湯宜當發散已成焮熱作癰內熱口乾喜冷大便秘澀者微利之日久內膿已成不破頭而脹痛者急針之法當補托潰後膿水清稀虛熱不退腫痛不消者宜滋陰健脾瘡口不斂飲食減少余腫不消新肉不生峻補脾胃懸癰治驗一男子結腫四日作癢微痛以九龍丹一服利五六次其腫漸消又以四物湯加花粉黃柏知母而愈一男子患此十餘日焮腫作痛至晚發熱尤甚又兼小水不利以龍膽瀉肝湯二服小水稍通微痛不止此欲作膿以托裡消毒散加穿山甲皂角刺澤瀉二服而膿出又以十全大補湯服之月餘而斂一男子患此腫甚脹痛此內膿已成即針之出臭膿碗許疼痛頓減以十全大補湯十餘服而飲食漸進焮痛亦消惟瘡口原潰之甚不易完合間用制甘草吞蠟礬丸外以附子餅灸之調理三月而愈一男子素有痰火久服降下之藥致此結腫疼痛脈細而數此陰虛濕熱流注而成潰後必難收斂辭不治後果出臭膿不禁日漸開大發熱不止飲食不進強以溫中健脾補托氣血藥終至不應而歿懸癰主治方滋陰八物湯滋陰八物湯生地赤芍丹皮花粉歸甘草川芎澤瀉等燈心為引效堪推治懸癰初起狀如蓮子紅赤漸腫悠悠作痛者川芎當歸赤芍生地牡丹皮天花粉甘草節各一錢澤瀉五分大黃便秘加蜜炒一錢水二鍾燈心二十根煎八分食前服炙粉草膏炙粉草膏藥二般當歸甘草效常堪制度熬膏好酒服懸癰腫痛盡成歡治懸癰已成服藥不得內消者服之未成者即消已成者即潰既潰者即斂此治懸癰良藥也大粉草四兩用長流水浸透炭火上炙乾再浸再炙如此三度切片甘草三兩當歸身三兩水三碗慢火煎至稠膏去渣再煎稠厚為度每日三錢無灰好熱酒一大杯化膏空心服之最妙還元保真湯還元保真湯四物參苓丹皮並白朮甘草黃耆枸杞同附子肉桂澤瀉入治懸癰已潰瘡口開張膿水淋漓不能收斂者當歸川芎白芍熟地白朮茯苓人參黃耆各一錢牡丹皮枸杞子各八分甘草炙熟附子各五分肉桂澤瀉各三分水二鍾煨姜三片大棗二枚煎八分食前服滋陰九寶飲滋陰九寶飲芎歸白芍黃連生地隨花粉知母並黃柏大黃煎服效堪題治懸癰厚味膏粱蘊熱結腫小水澀滯大便秘結內熱口乾煩渴飲冷及六脈沉實有力者服川芎當歸白芍生地黃連天花粉知母黃柏大黃蜜水拌炒各二錢水二鍾煎八分空心服應用方托裡消毒散見腫瘍門腎氣丸見肺癰門十全大補湯八珍湯補中益氣湯四物湯俱見潰瘍門內消沃雪湯蠟礬丸見腫瘍門九龍丹見魚口門龍膽瀉肝湯見下疳門附子餅見附骨疽門臀癰論第三十五臀癰生於小腹之後位遠僻奧氣亦罕到血亦少來凡生此者濕熱凝滯結聚乃成得此毒必外發庶不內攻初起毒從五臟蘊積者患必有頭紅熱墜重如石內必口乾發熱宜內消沃雪湯通利積熱外以膏貼瘡頂四邊以如意金黃散敷之拔出瘀膿紫血內兼托藥自愈常有不知內服敗毒寒劑外敷涼藥氣血冰凝毒氣不得外發反致內攻其瘡頭軟陷無膿根腳平散不痛內熱口乾煩躁譫語痰喘氣粗恍惚不寧者俱為不治但此多從毒積於內自里至表者十有八九而從風寒暑濕自外至里者百中一二既出而復入里者終為死候臀癰看法初起有頭紅赤腫痛頂高發熱根腳高聳者為易治已成焮熱發腫疼痛有時皮薄光亮色紅易膿為順已潰膿稠而黃色如豬腦腫消痛止起坐自便者易初起粟米形或黃泡一點平塌作癢根腳散漫者重已成色紫堅硬臀腿俱腫小便澀滯日久無膿者險潰後無稠膿頂空根軟塌手按不知疼神昏無治法臀癰治法初起惡寒體倦喜復衣被脈浮緊而在表者微散之已成內熱口乾好飲冷物小水澀而大便秘者通之頂高色赤焮痛發熱疼痛有時者宜托裡更兼解毒腫已高而作疼膿已熟而不破脹痛難忍宜即針之潰後堅硬不消膿水不止飲食無味者宜補虛健脾臀癰治驗一男子患此四五日始生疼痛至晚作寒六脈浮而帶數以人參敗毒散二劑寒熱頓退疼痛稍止彼值公務相關欲出乃用針點入患頂五六分流出紫血用蟾酥條插入膏蓋以活血散瘀湯二服次日流出紫血隨便可行更服托裡藥五六服而安一男子患此六七日焮痛發熱口乾便燥以托裡消毒散加花粉大黃二服便通渴止仍用前湯加角針山甲數服而膿潰又以十全大補湯半月而斂一男子患此堅硬不潰此先寒涼之過也以十全大補湯加角針蒼朮丹皮四劑堅硬漸軟又以透膿散二服膿熟針之以前湯倍參耆歸術月餘而斂一男子暑月患此自為內毒外用老鴉藤搗爛敷之每日續飲涼水十餘碗如此三日瘡毒內陷患上平塌冰冷口噤不言六脈虛細如絲辭不可治至夜而死又一人冬月患此外用四黃散涼水調敷內服敗毒涼藥毒亦內陷煩躁口乾鼻焮氣急患上平塌原頭存一空孔無水無膿予曰瘡毒已陷定不可治復請別醫俱曰無事予曰臀居小腹之後肌肉頑厚毒既到此必須內托為膿潰後最易收斂今已內外寒涼毒既內入豈能再出眾醫強投內消解毒定燥除煩之藥終至不應半月而死臀癰主治方活血散瘀湯活血散瘀湯枳殼芎歸蘇木角紅花連翹花粉防風等大黃赤芍一齊加治臀癰初起紅赤腫痛墜重如石及大便秘澀川芎當歸防風赤芍蘇木連翹天花粉皂角針紅花黃芩枳殼各一錢大黃二錢水二鍾煎八分食前服便通者去大黃加乳香黃耆內托散黃耆內托散堪誇山甲芎歸皂刺加金銀花與甘草節臀癰諸腫樂無涯治臀癰已成服前藥勢定者欲其潰膿宜服之黃耆二錢當歸川芎金銀花皂角針穿山甲甘草節各一錢水二鍾煎八分入酒一杯食前服應用方內消沃雪湯如意金黃散人參敗毒散托裡消毒散透膿散俱見腫瘍門蟾酥條見疔瘡門十全大補湯見潰瘍門楊梅瘡論第三十六夫楊梅瘡者以其形似楊梅又名時瘡因時氣乖變邪氣湊襲又名綿花瘡自期綿綿難絕有此三者之稱總由濕熱邪火之化但氣化傳染者輕精化欲染者重故氣化乃脾肺受毒其患先從上部見之皮膚作癢筋骨不疼其形小而且干精化乃肝腎受毒其患先從下部見之筋骨多疼小水澀淋其形大而且硬如氣化者毒在皮膚未經入里宜服萬靈丹洗浴發汗解散皮膚之毒精化者毒在骨髓未透肌膚宜服九龍丹通利大小二便以瀉骨中之毒甚者二服皆可行散之後體實者升麻解毒湯體弱者歸靈內托散服至筋骨不疼瘡根淡白內毒已解方用點藥輕者半年重則一載始方得愈如患者不遵此法欲其速愈妄用熏條擦藥哈吸等法往往致成後患者多矣患者熟思之楊梅瘡看法初起無頭疼筋骨不作痛小水無澀淋瘡干細者輕已生頭面稀少口角無瘡項下胸背雖多穀道無可初生瘡發下疳次生魚口復作筋骨疼痛瘡發非祥瘡生紅紫堅硬手足多生形如湯潑泡生害非輕淺楊梅瘡治法初起先從澀淋次傳筋骨作疼後發其瘡亦宜攻利生此外無疳瘡內無筋骨作痛時氣所感者微散之瘡從交媾不潔乃生下疳小水澀滯不通當行導利上部作癢瘡多消風清熱下部作疼癢甚瀉濕為先紅紫毒盛瘡高涼血解毒淡白毒輕瘡薄攻利兼行手足皮膚枯槁鵝掌風生柏葉二礬煎湯熏洗即好頭髮眉毛脫油風何須說神應養真丹早服稀疏脫點點楊花癬片片癩風瘡宜服換肌丸效應如同掃楊梅瘡治驗一男子患此兩月餘自服敗毒涼劑不應筋骨疼痛尚在此表裡寒涼毒沉難出必以辛熱發之用萬靈丹蔥酒煎服洗浴蓋之先出冷汗如雨次出熱汗疼痛減其大半以歸靈湯服至月餘瘡勢始定又以萆薢湯兼補中益氣湯又兩月餘而始痊愈一男子小便白濁作痛次出疳瘡發腫作爛筋骨微痛予曰欲發時瘡彼不為信請他醫以熏藥照之雖然疳瘡稍愈而筋骨更疼頭脹欲破又復請治其時紅點滿面此火氣鬱遏難出先用黃連解毒湯二服瀉其火毒次以蟾酥丸發汗使毒透出肌表已後紅點漸漸為瘡筋骨頭疼從此漸減以加味遺糧湯服至兩月瘡始出盡骨疼方止又以解毒天漿散相兼服至百日其瘡始退又百日而平一女人丈夫生瘡所襲筋骨至疼遇晚寒甚以人參敗毒散四劑其寒乃退疼尚不止又以萬靈丹發汗二次方出點如豆大頭面及背肉無餘隙此毒之盛也以防風通聖散二劑通利大小二便去硝黃加皂角針金銀花又十餘劑其瘡漸大小者如錢大者若杯氣穢作爛起坐不堪外以石珍散摻爛上結疤又爛又摻內服加味遺糧湯兩月餘瘡始漸干輕者收斂而脫重者又半年方得痊愈矣一庠生患此月餘乃求速愈予曰此患非他恙所比若速愈必遺毒於後日辭不敢治更醫對曰半月全愈後亦無患因喜不勝用水銀膽礬等藥搽擦手足二心半月內其瘡果愈隨後骨疼諸藥不應半年後內毒方出作爛疼不堪言遍腿相串並無一空又二年腿腳曲而不直徑成疲疾終身又兼耳聾全不相聽又一人嫖妓生瘡筋骨疼痛予曰升發方可彼欲內消請他醫以丸藥七丸每用一丸置炭上燃著以口吸菸至三丸鼻流鮮血至夜而死又一妓者患此欲其速愈以照藥熏之三日後吐鮮血數盆亦死此求速愈自取危亡者無怨楊梅瘡主治方加味遺糧湯加味遺糧湯木瓜芎歸防苡術銀花癬皮皂子靈仙等木通甘草共參誇示楊梅瘡初起筋骨疼痛及已成數月延綿不已並楊梅風毒誤服輕粉癱瘓骨疼不能動履川芎當歸防風薏苡仁木瓜金銀花木通白癬皮蒼朮威靈仙各一錢甘草五分皂莢子五個切片微炒仙遺糧二兩人參瘡久氣虛者加水二碗煎八分量病上下食前後服腿腳之下加牛膝一錢病淺者一月可退病深者百日可痊忌牛肉燒酒海腥煎炒此瘡發時多先起於下疳若以此方預服之可以止其不發梅瘡也解毒天漿散解毒天漿散角針防風防己膝風藤芎歸翹粉銀花草木瓜蟬蛻薏苡仁治楊梅瘡不問新久遍身潰爛及筋骨作疼者天花粉二錢防風防己皂角針白癬皮連翹川芎當歸風藤木瓜金銀花蟬蛻薏苡仁各一錢甘草五分土茯苓二兩牛膝下部加水二鍾煎八分臨服入酒一杯量病上下服之升麻解毒湯升麻解毒湯傳易去病應知卻不難同煎皂刺加油服那怕多年結毒頑治楊梅瘡筋骨疼痛久而不愈及治遠年近日流注結毒皮肉破爛咽喉損破者並宜服之川升麻新鮮皂角針各四錢上白土茯苓一斤項之以上加白芷咽內加桔梗胸腹加白芍肩背加羌活下部加牛膝各一錢用水八碗煎至四碗作四次一日服盡每次頓熱加麻油三茶匙和勻量病上下食前後服之瘡甚者不過十服歸靈湯歸靈湯中四物宜木瓜防己白癬皮米仁參朮銀花粉甘草白芷牛膝隨治楊梅瘡不論新久但元氣虛弱者宜服此藥川芎當歸白芍熟地米仁木瓜防己天花粉金銀花白癬皮人參白朮各一錢甘草五分威靈仙六分牛膝下部加五分土茯苓二兩水三鍾煎二鍾二次量病上下食前後服之渣再煎八分服防風必效散防風必效散荊防槐術翹藤癬芷當角針木通番白草銀花花粉木瓜商治楊梅瘡濕熱太盛瘡高稠密元氣素實者服防風防己荊芥白癬皮連翹槐花蒼朮皂角針風藤木通白芷天花粉木瓜金銀花蕃白草各一錢甘草五分土茯苓四兩大黃初起加三錢水三碗煎二碗二次服渣再煎一碗服後飲灑一大杯即靜睡一時許更妙金蟾脫甲酒治楊梅瘡不拘新久輕重皆效好酒五斤用大蝦蟆一個浸酒封瓶口煮香二枝取起待次日隨量之大小以醉為度冬夏蓋暖出汗為效存酒次日只服量之一半酒盡瘡愈又治楊梅結毒筋骨疼痛諸藥不效者更妙服酒七日後不許見風為要忌口及房事百日絕根矣翠雲散翠雲散中用銅綠膽礬輕粉石膏加濕用膽調幹末摻梅瘡一點便生疤治楊梅瘡已服內藥根腳不紅瘡勢已退者用銅綠膽礬各五錢輕粉石膏煅各一兩共研極細瓷罐收貯濕瘡乾摻干瘡公豬膽汁調點三日點三次其瘡自干而愈又點藥方點藥方中用杏仁雄黃輕粉共相稱豬膽汁調瘡上點敢教三日自承平杏仁四十九粒去皮尖雄黃一錢輕粉二錢先將杏仁搗細加雄黃輕粉細末再研勻豬膽調點鵝黃散鵝黃散用真輕粉石膏黃柏要稱准等分為末摻爛瘡楊梅腐痛最安穩治楊梅瘡潰爛成片膿穢多而疼甚者宜用之石膏煅輕粉黃柏炒以上各等分為極細末乾摻爛上即可生疤再爛再摻毒盡乃愈此解毒止痛收干之效藥也應用方萬靈丹黃連解毒湯見腫瘍門人參敗毒散防風通聖散見時毒門蟾酥丸見疔瘡門補中益氣湯見潰瘍門九龍丹見魚口門神應養真丹見鶴膝風門祛風換肌散見風癬門柏葉二礬湯見鵝掌風門結毒論第三十七結毒者熏火收遏瘡毒而沉於骨髓也又有未經熏擦見苗未久服藥不多內毒未盡便用點藥收斂郁遏毒氣者亦能致之發則先從筋骨疼痛日後漸漸腫起發無定處隨便可生發在關節中則損筋傷骨縱愈曲直不便發於口鼻則崩梁缺唇雖痊破形更相發於咽喉者更變聲音發在手足者妨於行走原來苦楚一生毒遺數代情關一錯禍起百端初起筋骨冷痛金蟾脫甲酒發汗自愈虛弱者芎歸二術湯頭疼欲破者天麻餅子並吹鼻碧雲散年餘流串筋骨不愈者五寶散虛弱潰爛疼痛不斂者十全大補湯同土茯苓煎服初起筋骨痛甚者雷火針法已潰腐爛者解毒紫金膏依法施治年遠毒盛者玄武丹兼外搽靈藥年近毒淺者只在百日自然可愈毋得再熏為禍傷人耳以下看法治法俱照本論醫治自有條款未及重錄結毒治驗一男子熏藥之過六年後兩腿骨痛半年始腫以雷火針腫小者一處腫大者三處針之七日後作膿腐潰內服仙遺糧湯兩月餘其疼漸止腫亦漸消又兩月方得腐盡肌生更十全大補湯三月而斂一男子玉莖患此半年陽物已損七八遇一方士以熏藥照之患上流血不止人似鬼形予曰毒發已傷元氣再加熏火一逼血得熱而妄行故去盆許此有限之物也恐其難保先以四物湯兼黃連解毒湯合而服之二劑其血乃止更八珍湯加麥冬五味子黃柏知母十餘服元氣乃定外以甘草湯浴洗患上以銀粉散搽之如此月餘氣血漸醒紅肉漸生陽物復長大半仍用前湯加土茯苓二兩煎服此不捨其根本共約有四月之餘其疾乃愈一男子患此頭疼欲破至夜尤甚苦楚不睡自以解毒藥治之俱不相應診之寸關脈細數而無力此虛陽之火上攻以補中益氣湯加土茯苓一兩服至三劑其疼漸止又十餘劑其疾全安而不再發一男子患此自膝以下腐爛無空伏枕半年內以芎歸二術湯外以甘草白芷歸尾蔥白煎洗三日一度以解毒紫金膏搽之如此三月餘漸漸而安惟足不能步履以史國公酒藥加土茯苓一斤浸煮又服半年其足方能步履又一料行步亦然如舊一婦人患此頭疼手腕俱痛診之脈滑而弦此痰毒相兼之病也以天麻餅子服之半月頭痛痊安又以二陳兼四物加紅花升麻黃芩服至月餘而愈一男子頭額腐爛外搽解毒紫金膏內以萆薢湯兩月餘而斂又一人小腿患之年餘仍以前藥而愈一婦人咽間損壞半年湯藥難下幾死服結毒紫金丹外吹結毒靈藥一月內其疾痊安又一女人手膊頭背腫痛六七年不潰諸藥不應仍服前藥而安一男子咽喉腐爛予以遺糧湯內服外用解毒生肌藥治之彼以為緩仍用熏藥照之口爛幾死大便純去黑血及遍身浮腫飲食不進肌破三月而死結毒主治方仙遺糧湯仙遺糧湯荊芷防銀花花粉葛芎當蒺薏靈仙梔膝草芩連翹共水煎嘗治楊梅結毒初起筋骨疼痛已破肌肉潰爛者仙遺糧即俗稱土茯苓四兩防風荊芥川芎當歸天花粉金銀花白蒺藜薏苡仁威靈仙各一錢山梔黃連連翹乾葛白芷甘草黃芩各六分牛膝下部加水三碗煎二碗量病上下食前後服渣再煎一碗服後飲酒一杯忌牛肉火酒房事等件更妙芎歸二術湯芎歸二術湯防樸獨活參苓薏苡仁木瓜皂刺精豬肉草甲銀通土茯苓治楊梅結毒已成未成筋骨疼痛步履艱辛及潰後腐肉臭敗不能生肌收斂者宜服之並效白朮蒼朮川芎當歸人參茯苓薏苡仁皂角針厚朴防風木瓜木通穿山甲炒獨活各一錢金銀花二錢甘草精豬肉二兩土茯苓水三碗煎一半量病上下服之渣再煎服消風脫甲散消風脫甲散紅花番白靈仙梔蛻瓜風子薄藤銀皂刺翹通蒼朮草齊加治楊梅結毒筋骨疼痛腐爛作臭氣血壯實者歌曰十年十五半年五二十年來三十補縱然臭爛不堪聞管教逢人再不吐番白草紅花甘草威靈仙山梔蟾蛻連翹皂角針大風子肉薄荷風藤金銀花冬瓜皮木通蒼朮各一錢土茯苓四兩水三碗煎二碗二次服用好酒一大杯過口渣再煎服熏洗結毒方熏洗結毒方堪效蒼朮川椒共水煎任是腐痛多徹骨將來一洗即時捐蒼朮一兩點紅川椒三錢水五碗煎至四碗入罐內將患上對罐口以熱氣熏之半熱傾藥盆內淋洗患上以潔淨布挹干搽後解毒紫金膏解毒紫金膏解毒紫金膏最易取功奏效識應難礬紅只與松香等去腐生新解笑顏治楊梅結毒腐爛作臭膿水淋漓諸藥不效者細塊礬紅明淨松香各一斤共碾極細末麻油調稠先將患上用前湯熏洗潔淨搽上此藥油紙蓋上以軟布條要扎至緊毋令血行三日一換如無前湯熏洗只煎蔥艾甘草等湯俱可洗換又治諸毒頑臁等瘡神效愈後忌發物煎炒神仙碧玉膏神仙碧玉膏朝腦輕粉杭粉豈可饒乳香沒藥並白占豬油調搽腐爛好治結毒潰爛臭穢疼痛不斂及風臁等瘡俱效輕粉一兩杭粉一兩白占五錢乳香沒藥各三錢章冰二錢用公豬淨熟油五兩同白占熬化傾入碗內入上藥和勻水內頓一時取起臨用抿腳挑膏手心中捺化攤油紙上用蔥湯洗淨瘡對患貼之五寶散五寶散內用硃砂琥珀珍珠冰片加飛羅面同滴乳石飯糰煎和效堪誇治結毒筋骨疼痛腐爛口鼻諸藥不效者服之滴乳石如乳頭下垂敲破易碎亮似蜻蜒翅者方真四錢琥珀珍珠硃砂各二錢冰片一錢上各研極細對準共為一處再研數百轉瓷罐密收用藥二錢加飛羅面八錢再研和勻每用土茯苓一斤水八碗煎至五碗濾清作五次每次加五寶散一分和勻量病上下服一日服完十服自愈如鼻子腐爛每日土茯苓內加辛夷二錢煎服引藥上下忌食海腥煎炒房事等件結毒紫金丹結毒紫金丹罕稀此方原不欲人知決明龜板硃砂等米飯為丸脫苦籬治遠年近日楊梅結毒筋骨疼痛日久腐爛臭敗不堪聞者或咽喉唇鼻破壞諸藥不效者妙龜板放炭火上炙焦用新安酒漿濃筆蘸漿塗上反復炙塗三次以焦黃為末二兩石決明用九孔大者煅紅童便內漬之一次硃砂明亮者各末二錢共再碾極細爛米飯為丸麻子大每服一錢量病上下食前後筋骨疼痛酒下腐爛者土茯苓湯下至重者四十日而愈此功力勝於五寶散結毒靈藥方結毒靈藥方水銀硃砂雄黃硫黃稱加上輕粉共研成摻於腐上效如神治楊梅結毒腐爛作臭或咽喉唇鼻腐壞日甚者並效水銀一兩硃砂雄黃硫黃各三錢共研細入陽城罐內泥固鐵盞梁兜固緊封口點三香為度用水擦盞內火畢次日取出盞底靈藥約有一兩五六錢治尋常腐爛之症靈藥五錢輕粉五錢和勻碾細小罐盛貯紗封罐口臨用甘草湯洗淨患上將罐倒懸紗眼內篩藥患上用後單油膏藥蓋之一日一換自效男子婦人咽爛者靈藥一錢加人中白二分研細吹之日用三次內服不二散其疼即止隨可飲食硫黃不二散硫黃不二散功奇止痛除危效不疑加上靛花研細末服之猶自遇神醫治楊梅結毒發於咽內腐爛疼痛湯水難入者硫黃一錢靛花一分共為細末涼水一大酒杯調服其疼即止飲食可用鉛回散鉛回散內藥蹊蹺筋骨多疼功不饒加上硫黃為末服敢教苦楚寂然消治楊梅結毒筋骨疼痛朝輕夜重喜熱手按揉者用鉛半斤銅杓內化開傾入水內將鉛取起再化再傾如此百遍鉛盡為度候半日待水澄清傾去用缽底內沉下鉛灰傾在三重紙上下用灰收乾水氣取起曬乾與硫黃等分研細罐收每服一錢溫酒調服至重者不過三次即效單油膏單油膏藥用麻油杭粉將來漸漸投熬化成膏傾水內護肌護藥不開流貼結毒摻藥上用麻油二斤熬滴水成珠續下杭粉十三兩攪勻成膏傾水內片時取起攤用萆薢湯萆薢湯蒲芷柏蒼靈仙龜板草紅當胡麻羌活川椒等結毒筋毒皆可嘗治結毒筋骨疼痛頭脹欲破及已潰腐爛並效川萆薢二錢苦參防風何首烏各五錢威靈仙當歸白芷蒼朮胡麻石菖蒲黃柏各六分羌活川椒各四分龜板一錢五分紅花三分甘草五分水二鍾煎八分臨服入酒一杯量病上下服之碧雲散吹鼻碧雲散川芎鵝不食草一般同青黛共研為細末吹之鼻內有神功治結毒入於顛頂以致頭疼脹痛如破者吹之鵝不食草一兩川芎一兩青黛一錢共為細末患者口噙涼水以蘆筒吹藥疼之左右鼻內取嚏為效應用方十全大補湯補中益氣湯四物湯八珍湯俱見潰瘍門金蟾脫甲酒見楊梅瘡門天麻餅子見頭痛門雷火神針見附骨疽門史國公酒藥見風濕門二陳湯見瘰癧門黃連解毒湯見疔瘡門銀粉散見下疳門多骨疽論第三十八多骨疽者由瘡潰久不收口乃氣血不能運行至此骨無榮養所致細骨由毒氣結聚化成大骨由受胎時精血交錯而結日後必成此疽也但腎主骨宜服腎氣丸十全大補湯先補脾腎次用艾附餅灸之令溫暖腐毒朽骨自然脫盡生肌斂口而愈多骨疽治驗一男子上齶腫痛月餘以散風清熱藥俱已不效又兩月破流血水百日外方出細骨大小三十餘塊以十全大補湯並吹生肌散兩月餘而斂中存一小孔簪腳大通鼻透氣致難全斂為愈而不愈也一男子左手上膊結腫年餘方出爛斑破流稀膿延至半年方出多骨一條如鵝膊骨一同長約四寸內服養血健脾藥外搽玉紅膏膏蓋又月餘而斂一男子小腿正面臁骨腫痛二年諸藥不應此多骨瘡也後破出骨一塊肌肉腐爛元氣虛弱以十全大補湯加山茱萸牛膝木瓜服至兩月餘不斂每日以神燈照法將火氣助之又出朽骨一塊上有蛀眼數十孔以二骨炭火煅紅為末入生肌藥中用之收斂問曰用骨者何此骨原廩氣血結成故用之復還元氣也後人聞之知理合天然之數矣一女人左口上牙根突腫如慄堅硬如石不痛此多骨疽也藥亦不效後三年始痛破流臭膿後出多骨形如小鱉腫仍不退此骨未盡稍入又出小骨二塊枯色稜磳其腫方退以四君子湯加升麻陳皮外以甘草煎湯漱口生肌散日搽三次而收斂多骨疽主治方固本養榮湯固本養榮湯四物山藥人參並白朮山萸甘草牡丹皮肉掛黃耆五味宜治骨疽已成骨不吐出或既出不能收斂由氣血之虛脾胃弱也宜服之骨不出者自出不收斂者自斂川芎當歸白芍熟地白朮山藥人參牡丹皮山萸肉黃耆各一錢甘草肉桂五味子各五分水二鍾姜三片棗二枚煎八分食前服生肌散生肌散內石膏丹石脂輕粉衄乳香龍骨再加朝腦和用之完口不須難治磨骨脫出肌肉生遲不能收斂者用此搽之石膏輕粉赤石脂各一兩黃丹飛二錢龍骨血衄乳香朝腦各三錢上為細末先用甘草當歸白芷各一錢煎湯洗淨患上用此乾摻軟油紙蓋扎二日一洗一換應用方神燈照法玉紅膏俱見腫瘍門十全大補湯四君子湯俱見潰瘍門腎氣丸見肺癰門
