餅三日三枚後用珍珠散豬脊髓調搽膏蓋焮腫上真君妙貼散敷之其腫漸消戒便步履蟾酥餅見疔瘡門珍珠散見下疳門真君妙貼散見癰疽腫瘍門牛程蹇第一百二十牛程蹇程途奔急熱腳下水見風以致氣滯血枯結成頑硬皮肉榮衛不滋漸生腫痛腫高突起支腳難行久則破裂膿水相流每日溫湯淨洗搽牛角散又有內膿攻注皮頑難破者以大線針眠頭挑破出膿乃寬硬皮敲破者剪而去之肉不生者玉紅膏長之肉滿不生皮者珍珠散搽上生皮乃愈牛角散牛角散中牛角燒松香輕粉不相饒本方加上水龍骨醜髓相兼好和調牛角尖燒灰水龍骨松香輕粉各等分共為末牛骨髓調搽虛弱者兼服十全大補湯玉紅膏見腫瘍門珍珠散見下疳門僵螂蛀第一百二十一僵螂蛀多生手指節中不紅不熱腫如蟬腹乃手少陰痰氣凝滯而生初起不疼日久方痛痛久方腐腫仍不消蟾酥餅膏貼漸作稀膿近者一載遠者三年此屬體弱者有之內兼補劑免變癆瘵之病蟾酥餅見疔瘡門田螺泡第一百二十二田螺泡多生手足忽如火燃隨生紫白黃泡此脾經風濕攻注不久漸大脹痛不安線針挑破泄去毒水太乙膏蓋挑破又生者內服解毒瀉脾湯可愈解毒瀉脾湯解毒瀉脾湯牛子防風蒼朮共山梔石膏甘草黃芩等木通燈草效堪推防風牛子山梔石膏黃芩蒼朮甘草木通各一錢水二鍾燈心二十根煎八分量病食前後服之太乙膏見腫瘍門蟾酥條見疔瘡門玉紅膏見腫瘍門皴痛第一百二十三皴痛皆起於手足乃風寒氣鬱於皮毛致血不榮於肌表謂皮槁則多痛似無皮之狀是皴苦生焉將患上蔥湯浸洗良久隨以潤肌膏擦之就暖勿見風冷自愈又每久逢冬即發者須三伏時曬搗爛大蒜間擦三次不再發謂寒因熱治其理甚明矣陰蝨第一百二十四陰蝨又名八腳蟲也乃肝腎二經濁氣而成生此不為清吉銀杏散津調擦之內服六味地黃丸每斤加蜜炒黃柏一兩蘆薈五錢以清化源愈後不發銀杏無憂散銀杏無憂散麝香水銀輕粉杏仁良雄黃狼毒並蘆薈一擦何須不笑顏水銀鉛製杏仁去皮搗膏輕粉雄黃狼毒蘆薈各一錢麝香一分除水銀杏仁膏余藥共碾篩細入上二味再研勻先用土菖蒲煎湯洗之用針挑去蝨孔隨用津唾調擦使藥氣入內愈不復生切忌牛犬鱉肉六味地黃丸見肺癰門葡萄疫第一百二十五葡萄疫其患多生小兒感受四時不正之氣鬱於皮膚不散結成大小青紫斑點色若葡萄發在遍體頭面乃為腑症自無表裡邪毒傳胃牙根出血久則虛人斑漸方退初起宜服羚羊散清熱涼血久則胃脾湯滋益其內又有牙根腐爛者人中白散羚羊角散羚羊角散同知母黃芩牛子共玄參甘草麥冬淡竹葉止血消斑功最靈羚羊角防風麥冬玄參知母黃芩牛子各八分甘草二分水二鍾淡竹葉十片煎六分食遠服胃脾湯胃脾湯內甘草陳麥冬五味共沙參茯神白朮並遠志脈虛有汗服安寧白朮茯神陳皮遠志麥冬沙參各六分五味子甘草各五分水二鍾煎六分食遠服虛弱自汗者去沙參加人參黃耆各五分人中白散見口疳門百蟲入耳第一百二十六百蟲入耳乃偶然誤入之如蠅蚊細蟲入耳以麻油數點滴入竅中蟲亦自死取出如蜈蚣蜜蜂等大蟲入者以肉炙香安耳邊其蟲聞香自出有蟲夜間暗入者切勿驚慌響叫逼蟲內攻宜正坐點燈光向耳竅其蟲見光自出對面有人見其蟲不出惡蟲叮咬第一百二十七惡蟲乃各稟陰陽毒種而生見之者勿觸其惡且如蜈蚣用鉗蠍蜂用尾惡蛇以舌螫人自出有意附毒害人必自知其惡也凡有所傷各尋類而推治蜈蚣咬傷疼腫驟發用蟾酥餅磨濃塗傷處用粗紙捻蘸麻油點火用煙焰熏之疼腫自消又方用雄雞糞擂水塗之又方用頭垢搽傷處以捻焰熏之蠍有雌雄二種雄者螫人痛在一處雌者痛牽遍體用井底泥敷痛處干則易之一時無泥取新汲水以青布隨痛處搭之溫則再易又方五月五日用黃蠟二兩溶化將凝時投雄黃硃砂細末各三錢和勻捏成餅窩仍用貓兒眼草白汁端午時滴入窩內陰乾愈久愈佳復捏成塊密收臨用一米許刺針尖上以燈焰化開滴正螫之處其疼即止矣蛇毒傷人用雄黃末蘭葉搗汁調敷腫上內用半枝蓮搗爛取汁二兩熱酒四兩和汁服之蓋汗為效仍用渣敷傷處亦妙又方隨傷即用端午收採蒼耳草末五錢水煎一鍾熱服蓋汗即安如無端午收採者便用常日採取陰乾煎服一兩發汗亦效七寸蛇青色扁形尖尾短足紅口者毒輕青口者毒重以舌螫人其毒最惡初螫時用雄黃末一錢生礬二錢杓內溶化將箸頭點藥傷處冷則易之連點七次遂愈毒氣入里者解毒紫金丹酒磨服一錢蓋汗即愈遲延毒走腫痛者麻油焰熏之亦瘥河豚毒血毒中人舌麻心悶白茅根搗汁冷飲子毒中人昏悶腹脹口噤難言金汁解之非此不能也人面瘡第一百二十八人面瘡古言有生者近世之罕聞矣其生病異而受之必異瘡象全似人面眼鼻俱全多生膝上亦有臂患者服十全流氣飲外用貝母為末敷之乃聚眉閉口次用生肌斂口藥亦可得愈矣十全流氣飲見流注門誤吞針鐵骨哽咽喉第一百二十九誤吞針刺哽咽疼痛者用亂麻筋一團搓龍眼大以線穿系留線頭在外湯濕急吞下咽頃刻扯出其針頭必刺入麻中同出如不中節再吞再扯以出為度誤吞銅物者多食荸薺化堅為軟若吞鐵骨之物腸中不能轉送覺墜者多食青菜豬脂自然送入大腸從糞同出諸骨哽喉用玉簪花根八錢各隨所犯之肉為引煎湯服之轉出乃愈又諸骨哽於嚥下不能外出者烏龍針推之骨下則安矣烏龍針治骨哽於嚥下難出者用細鐵線燒軟雙頭處用黃蠟作丸龍眼大裹鐵絲頭上外用絲綿裹之推入咽內梗骨處其骨自然順下矣不下再推又方治諸骨哽喉玉簪花根切片煎湯漱之徐徐吐出其骨自軟再用乾飯咽之自下中砒毒第一百三十砒毒者陽精大毒之物服之令人臟腑乾涸皮膚紫黑氣血乖逆敗絕則死初服知覺早者大蘭根葉搗汁灌之輕則可解無蘭處以生綠豆同水研爛以水灌之多則為效如不解者以金汁灌之必蘇蘇後如顛不語者每日以綠豆水飲之毒盡則愈取金汁法用大毛竹一連二節用刀劈去外青一半用磚扎節中沉入大糞池內一年後取起以長流水浸一日取起鑽開節孔內蓄糞清瓷罐收貯凡遇有中砒毒河豚傷寒陽毒發狂疔瘡痧症毒氣入里煩躁口乾渴欲飲水脈大有力者並宜此藥落下頦拿法第一百三十一落下頦者氣虛之故不能收束關竅也患者平身正坐以兩手托住下頦左右大指入口內納槽牙上端緊下頦用力往肩下捺開關竅向腦後送上即投關竅隨用絹條兜頦於頂上半時許去之即愈救自刎斷喉法第一百三十二自刎者乃迅速之變須救在早遲則額冷氣絕必難救矣初刎時氣未絕身未冷急用絲線縫合刀口摻上桃花散多摻為要急以綿紙四五層蓋刀口藥上以舊布將頭抬起周圍纏繞五六轉扎之患者仰臥以高枕枕在腦後使項鬱而不直刀口不開冬夏避風衣被複暖待患者氣從口鼻通出以姜五片人參二錢川米一合煎湯或稀粥每日隨便食之接補元氣三日後急手解去前藥用桃花散摻刀口上仍急纏扎扎二日急用濃蔥湯軟絹蘸洗傷處挹乾用抿腳挑玉紅膏放手心上捺化搽於傷口處再用舊綿花薄片蓋之外用長黑膏貼裹周圍交扎不脫近喉刀口兩傍再用黑膏長四寸闊二寸豎貼膏上兩頭黏貼好肉庶不脫落外再用絹條圍裹三轉針線縫頭冬月三日夏月二日每用蔥湯洗挹換藥自然再不疼痛其肉漸從兩頭長合內服八珍湯調理月餘如大便結燥用豬膽套法不可利藥利之雙顙俱斷者百日單斷者四十日必收功完口此法曾治強盜郭忠皂隸沙萬家人顧興俱雙顙齊斷將危者用之全活單顙傷斷者十餘人治之俱保無虞矣桃花散見跌撲門玉紅膏見腫瘍門如聖金刀散見金瘡門八珍湯見潰瘍門陰毒第一百三十三陰毒乃純陰無陽被天時寒冷肅殺之氣侵入肌膚沉於骨髓致氣不能升血不能行凝滯經絡疼痛切骨初起不腫不熱朝輕暮重久則作腫漸紅爛斑黑靨臭水淋漓穢氣熏蒸腐爛漸開終久必死一人年三十歲冬月隔溝與鄰婦私交房事方畢忽婦夫回慌忙隔溝赴水而走熱身受寒五日後小腹大臀陰痛不腫日夜響叫至一月後穀道傍生一爛斑黑靨倒陷諸藥不效至半月大臀連黑腐爛作臭干靨無膿十日大臟俱壞黑敗而死也又一人年四十歲夏月好飲火酒至夜赤身露臥手膊連背陰疼難忍一月後肩發爛斑一塊周圍微硬色如紅棗日漸延開半月後手膊半背共成黑靨臭穢不堪一月不食而死一人中年肥胖亦冬夏好飲火酒飲後隨吃涼水方臥一日頸項作疼微腫堅硬如石二月外項大如頭石硬不熱此陰毒也辭不可治後請別醫治之項同身大乃異症不食而死失榮症第一百三十四失榮者先得後失始富終貧亦有雖居富貴其心或因六慾不遂損傷中氣鬱火相凝隧痰失道停結而成其患多生肩之以上初起微腫皮色不變日久漸大堅硬如石推之不移按之不動半載一年方生陰痛氣血漸衰形容瘦削破爛紫斑滲流血水或腫泛如蓮穢氣熏蒸晝夜不歇平生疙瘩愈久愈大越潰越堅犯此俱為不治予立二方曾治數人雖不獲全愈而不夭札速死者誠緩命藥也和榮散堅丸和榮散堅歸地參茯陳朮附貝南星丹酸遠柏並龍齒蘆薈硃砂與角沉治失榮症堅硬如石不熱不紅漸腫漸大者服歸身熟地茯神香附人參白朮橘紅各二兩貝母南星酸棗仁遠志柏子仁丹皮各一兩龍齒一對煅無龍齒鹿角尖二兩煅代之蘆薈角沉各八錢硃砂六錢為衣上為細末煉蜜丸桐子大每服八十丸食後用合歡樹根皮煎湯送下患者若改往從新淡薄甘命其中有得愈者十中一二否則難脫然也飛龍阿魏化堅膏治失榮症及癭瘤乳岩瘰癧結毒初起堅硬如石皮色不紅日久漸大或疼不疼但未破者俱用此貼用蟾酥丸藥末一料加金頭蜈蚣五條炙黃去頭足研末同入熬就乾坤一氣膏二十四兩化開攪和重湯內頓化紅緞攤貼半月一換輕者漸消重者亦可停止常貼保後無虞矣試知百病死生法第一百三十五死生非神聖不能洞其機關疾病無明醫亦不能決其凶吉匪則使人疑或決斷不常予異授呂祖一枝梅真仙方也不敢私秘一例刊注以傳概世云呂祖一枝梅堪羨呂祖一枝梅芭豆萆仁靈脂隨雄麝銀硃硃砂等識死知生不改移治大人男婦小兒新久諸病生死難定之間用藥芡實大一餅貼印堂之中點官香一枝香盡去藥以後一時許藥處有紅斑暈色腫氣飛散謂紅霞捧日病雖危篤其人不死如貼藥處一時後無腫無紅皮肉照舊不變謂白雪漫野病雖輕淺終歸冥路小兒急慢驚風一切老幼痢疾俱貼之紅腫即愈此方用之可預知生死也硃砂三錢銀硃一錢五分五靈脂三錢麝香二分萆麻仁五分雄黃芭豆仁各五錢不去油上各研細於端午日淨室中午時共研加油胭脂為膏瓷盒收藏臨用豆大一丸捏餅貼印堂中其功立見用過餅送入河中造孽報病說第一百三十六佚仙方活命飲今古不同論第一百三十七古人樸實其七情干涉者少而從風寒暑濕外感凝滯者多故設仙方活命飲攻散所滯之腫服此得效者十常八九乃患者五臟不虛耳今人穿鑿太過七情煩擾之甚而內臟無有不傷每見此症曾服過此藥其瘡必不起發脾胃再無不損若瘡不起發脾胃傷敗患者豈有得生今之治法不論首尾標本先必固脾胃次行托藥謂本立而道生病無不活予見如此幸同道者察焉拾遺症第一百三十八拾遺者因條款分門遺失未及細詳但本病立門以正病為主而從病故有失焉今查補註以便觀治之鼻疔生於鼻內痛引腦門不能運氣脹塞鼻竅甚者唇腮俱腫牙疔生於牙縫之中頂高突起痛連腮項破則流血黑疔生於耳竅之內黑硬腐爛破流血水疼及腮顴以上之症俱先針刺次行發汗仍照疔類調治喉癰生於咽外正中腫痛妨礙飲食紅腫發熱必欲潰膿軟而脹痛者針之內服補托之藥玉紅膏搽貼長肌完口又有腐潰內通湯水隨孔出者曾治數人俱亦無妨臑疽生在膊上連肩通腫長堅而硬兌疽生在當手動脈之處腫痛寒熱痛徹手膊舉動不便鳳眉疽發在兩目之間形長皮赤痛引腦戶二目合縫光腫發熱透腦疽發在額上髮際之間多發寒熱頭疼如斫不可忍耐先用萬靈丹發汗解散風邪次宜清托附陰疽生在內踝上三寸初生小泡漸生赤腫破流血水痛亦徹骨不能步履咬骨疽發在大腿內股不腫不紅痛徹骨髓初宜雷火針針之內服萬靈丹酒調服效陰疽生於右腿夾縫之下三寸痛連陰子小腹亦痛玄疽生於左腿夾縫之下三寸漫腫連陰疼及大腿淵疽發在脅下初起不紅堅硬久則破潰有聲如嬰兒啼狀膏蓋無聲去膏仍有異哉難治哂不能也玉枕疽生在腦後枕骨中堅而難潰痛引肩項鼻塞氣粗此太陽膀胱濕熱凝滯而成大抵以上之症有名而生者鮮矣初起有表症者便宜解表有里症者即與通利潰後宜補托久則宜收斂此為一定治法不可混亂妄投藥餌致其危亡也唇風第一百三十九唇風陽明胃火上攻其患下唇發癢作腫破裂流水不疼難愈宜銅粉丸泡洗內服六味地黃丸自愈銅粉丸銅粉丸中官粉礬輕粉銅青與麝香黃連膏子同冰片爛眼唇風並不難銅青五錢官粉三錢明礬一錢五分輕粉一錢五分麝香一分五釐冰片一分二釐黃連二兩切片煎稠膏上共為細末黃連膏丸如芡實大每用一丸湯泡紙蓋每洗頓熱上面清水勤洗之其患自愈繃縛背瘡第一百四十至於發背對口大瘡等疾已潰流膿時冬夏宜絹帛四五層放貼膏藥外再用綿布見方八寸四角用蛇皮細帶紵之安蓋絹上以帶紮在前胸繃實瘡上庶使瘡中暖氣不泄易於腐潰洗瘡時預備二繃更換務要患內暖氣烘烘此法最善故亦補之癰疽內肉不合法第一百四十一癰疽對口大瘡內外腐肉已盡惟結痂膿時內肉不黏連者用軟綿帛七八層放患上以絹紮緊將患處睡實數次內外之肉自然黏連一片如長生成之肉矣有患口未完處再搽玉紅膏其肉自平矣煉玄明粉法第一百四十二冬至後用潔淨朴硝十斤用水一斗五升白蘿蔔五斤打碎同硝入鍋內煮化候湯滾足撈去蘿蔔將竹絲箕以綿紙二層攤鋪箕內架在新缸上以硝湯徐入箕內候折再添以湯濾盡為度將缸搭在天井露三日其硝結在缸邊傾去余水瀝乾為止將硝取下再用砂鍋頓炭爐上將硝一碗化開煎滾以銅匙鏟攪將成凝結時鏟入小魚酢罐內上空寸許再下硝煉如此已畢每一罐下用三丁品字樣釘入土地上留寸半在外將罐浮頓釘頭上用瓦片蓋口周圍用段磚砌百眼壚圍繞離罐寸半許將著炭火入壚內四圍底火頂火一概相護候罐硝紅為度次日取出硝來預用大綿紙攤在潔淨陰土地上將硝碾細用絹篩篩在紙上一錢厚再不許多將門榻俱已關閉不許與人見之三日後其硝自然復活色白如粉輕虛成片將缽盛收紙蓋之上再用亂紙寸許以收潮氣庶不凝結此品最能降火化痰清利臟腑怪症服之可蠲狂躁用之即愈搜除百病安斂心神況此服之不傷元氣惟久病瀉痢者不宜大人每服三四錢小兒五分至一錢皆可俱用白滾湯或蔥湯空心化服候行二三次隨飲稀粥自然爽健精神調和臟腑津液頓生百病如失又煅過硝石六兩加硃砂三錢青黛一錢冰片一錢五分共碾細末照前篩紙上再用紙蓋一層四邊以戒尺壓緊勿令走氣候三日外取起密收又名陽春紫雪最治失心忘志癲癇健忘小兒急驚大人異症每服五分至一錢俱用淡竹葉燈心湯化服屢有奇效不可盡述玄明粉乃神仙保命服食每一斤加生熟甘草末一兩蔥湯化服二三錢令人悅澤容顏輕身耐老矣取紅鉛法第一百四十三佚鍊金頂砒法第一百四十四用鉛一斤小罐內炭火煨化投白砒二兩於化烊鉛上煉煙盡為度取起冷定打開金頂砒結在鉛面上取下聽用煉消石法第一百四十五用潔淨朴硝半斤罐內炭火熔化煎乾煅紅住火冷定取出即成硝石罐收聽用利實火不利虛火也取蟾酥法第一百四十六用蟾不拘大小其酥俱有用闊銅鑷鑷蟾眉稜高肉上微緊拔出酥來凝聚鑷里多則刮下陰乾聽用其取過之蟾避風二日仍送青草園中自然不傷其生如取之便見風下水俱成破傷風顛狽而死製附子法第一百四十七大附子一兩之外方用隨數幾枚以童便浸淹三寸每日換便浸至夏三冬五再換童便煮盡二香為度去皮臍線穿陰乾或日中曬硬亦可收藏聽用升白靈藥法第一百四十八水銀二兩用鉛一兩化開投入水銀聽用火硝二兩綠礬二兩明礬二兩共碾為末投入鍋內化開炒乾同水銀碾細入泥護陽成罐內上用鐵盞蓋之以鐵梁鐵兜左右用燒熟軟鐵線上下紮緊用紫土鹽泥如法固口要烘十分乾燥為要架三釘上砌百眼爐先加底火二寸點香一枝中火點香一枝頂火點香一枝隨用小罐安滾湯在傍以筆蘸湯搽擦盞內常濕勿干候三香已畢去火罐待次日取起開出藥來如粉凝結盞底上刮下靈藥收藏聽用凡瘡久不收口用此研細摻上少許其口易完若入於一概收斂藥中用之其功奇甚捷制寒食麵法第一百四十九用白麵一斤外再以面半斤調稠厚捍成薄片二塊將前面包合於中周圍捏緊合口於清明正日蒸熟掛透風處陰乾用麵包藏越久越效逐日人神歌第一百五十佚十二時人神歌第一百五十一佚尻神歌訣第一百五十二佚制炒諸藥第一百五十三前方諸藥未注炮炙今開於後凡藥必遵雷公炮炙入藥乃效如未制生藥入煎不為治病反為無益譬如人食餚饌不用烹炮生食者豈不害人當熟思之人參潤色明亮堅實為主輕匏不堪天門冬湯泡去心麥門冬去心生地黃酒浸熟地黃酒蒸白朮米泔浸炒蒼朮米泔浸炒黃耆蜜水拌炒甘草消毒生用補托炙熟酸棗仁炒研遠志湯泡去心微炒五味子炒研肉蓯蓉去鱗酒洗牛膝酒洗破故紙炒當歸酒洗白芍微炒黃色白蒺藜去刺玄參去根香附童便浸炒柴胡去蘆黃芩酒炒黃連解毒生用止嘔薑汁拌炒龍膽草酒炒知母鹽水拌炒栝蔞仁去殼去油貝母去心陳皮去白桔梗微炒防風去蘆乾薑炒黑附子童便浸煮半夏薑汁水煮川烏湯泡去皮草烏湯泡去皮尖巴戟湯泡去心微焙南星煨有為末入牛膽內者威靈仙去根仙茅米泔浸蒸去皮三稜湯泡澤瀉蒸大黃實人生用虛人炙用海藻酒洗昆布酒洗切絲牡丹皮去桔王不留行炒碾牛蒡子炒碾連翹去梗碾金銀去梗葉牽牛生用炒用地骨皮去梗肉桂去粗皮茯苓去匏粗皮枸杞子去蒂琥珀布包捶碎燈心同碾研如面細山梔碾炒焦黃柏鹽水拌炒山茱萸去核杜仲鹽水拌炒斷絲桑皮蜜水拌炒辛夷去蒂乳香去油為末沒藥去油為末枳殼麩皮炒厚朴薑汁製炒巴豆去油為霜皂莢去皮弦子煨五倍子去蛀末炒蓮肉泡去皮心山楂去核桃仁泡去皮尖杏仁泡去皮尖微炒芒硝湯煮提淨石膏煅碾末雄黃透紅明亮硫黃去腳硇砂淨明潔白硼砂白色透明砒霜白色明亮者有生煨兩用自然銅醋煅七次黃丹水飛炒紫龍骨生用煅用牛黃輕虛色黃麝香去毛皮犀角鎊末羚羊角鎊末龍齒煅存性蜂蜜煉去白沫蟬蛻去土斑蝥川米炒去翅足姜蠶去絲微炒全蠍酒洗去毒蜈蚣炙去頭足蚯蚓翻去腹土田螺去殼曬乾牡蠣煅研石決明煅珍珠豆腐內煮數滾布包捶碎同燈心碾末人中末煅研紅鉛以上藥品凡本書內應用制炒泡炙者錄之不泡炙者未錄醫家五戒第一百五十四佚醫家十要第一百五十五佚開割披針喉針形第一百五十六披針古之多用馬銜鐵為之此性軟不鋒利用之多難入肉今以鋼鐵選善火候鐵工造之長二寸闊二分半圓梗扁身劍脊鋒尖兩邊芒利用之藏手不覺入肉深淺自不難也如膿深欲其口大直針進而斜針出劃開外肉口則大矣喉針長六寸細柄扁頭鋒尖刺喉膿血者皆善補遺方一百五十七汗斑方蜜陀僧散硫黃雄黃蛇床子各二錢石黃蜜陀僧各一錢輕粉五分為末醋調搽患上歸脾湯白朮茯神黃耆棗仁龍眼肉各一錢木香人參甘草炙各五分姜一片水煎食遠服
