body:
  text: 卷之四雜瘡毒門陰瘡論第三十九婦人陰瘡乃七情鬱火傷損肝脾濕熱下注為患其形固多不一總由邪火所化也陰中有如挺出一條蛇形尺許墜重流水溺澀者乃脾氣下陷肝火從之朝服補中益氣湯晚服龍膽瀉肝湯外塗雄黃藜蘆散其患漸收陰中突出如菌子如雞冠四邊腫痛者乃肝鬱脾虛所致先以補中益氣湯加山梔茯苓青皮清肝補脾兼升中氣更以歸脾湯加山梔川芎茯神香附陳皮調理陰戶忽然腫突作痛因勞傷血分濕火下流宜四物湯加丹皮澤瀉花粉柴胡治之陰中生蟲慝如小蛆者乃心氣鬱而邪火所化宜四物加黃連膽草木通石菖蒲以通散心竅鬱滯外以銀杏散納入陰中陰器外生疙瘩內生細蟲作癢不可忍者此蟲食人臟腑即死令人多發寒熱與癆瘵相似有此症之婦人畏羞都不肯說因循日久面黃肌瘦身發寒熱咳嗽生痰往往不治者多矣如有此症急與逍遙散吞蘆薈丸早晚二服外用銀杏散綿裹塞入陰中殺蟲止癢半月漸愈陰戶開而不閉者憂思過也逍遙散歸脾湯俱加柴胡山梔白芍丹皮間服交接出血者肝虛有火不能藏血四物湯加膽草黃芩山梔柴胡新交房事傷而腫痛者珍珠散豬脊髓調搽又婦人久居寡室淫火妄而又郁鬱而又妄邪火久注多致陰中作癢生蟲此蟲食人內臟陰中腐爛攻刺疼痛臭水淋漓口乾發熱形削不食有此症者非藥能愈終歸於死又名失合症也陰瘡治驗一婦人陰器腫痛小水澀滯遇晚寒熱交作此肝經濕熱為患以龍膽瀉肝湯二服小水通利又以四物湯兼小柴胡加天花粉木通炒山梔服之而愈一婦人無辜發熱月餘忽陰中突出一物如雞冠一片此肝鬱脾虛所致以補中益氣湯加青皮山梔柴胡黃芩外以甘草白芷蒼朮紫蘇煎湯每日熏洗十餘日其患漸小仍用前湯倍參術月餘而安一婦人陰中作癢遇夜五心煩熱作渴不睡此思慮太過致心腎不交以四物湯加龍膽草山梔黃連知母外以銀杏散納入陰中二日其癢漸止又朝以八味丸午用歸脾湯加銀柴胡茵陳月餘而愈一婦人陰器半邊腫痛身發寒熱口乾便秘脈實有力以內疏黃連湯一劑大便通利口乾乃止惟腫痛尤甚此濕毒結聚欲為膿也以四物湯加角針澤瀉二劑膿熟脹痛又以透膿散一服出臭膿鍾許疼痛頓止以八珍湯加丹皮澤瀉十餘劑而安一婦人肝經風濕下流陰器浮腫癢甚致抓出血不痛以消風散加苦參膽草澤瀉木通山梔外以蛇床子湯熏洗搽擦銀杏散十餘日癢止腫消而愈一婦人孀居十餘載陰器作癢生蟲含忍不說後陰器食爛已食內臟人形消瘦發熱作渴脈洪浮數方請醫治詢問間癢痛日久陰器黑腐小水不禁內臟已壞不可用藥彼苦求治予曰癢者蟲也痛者損也先用鯽魚數枚以香料摻炙魚熟以絲綿薄裹納入陰中夾之良久取出紅蟲長者一寸短者五六分細如絲線約有二十餘條置溫水中搖擺片時方死彼家歡悅以為可治予曰非也再取再有生化無窮強投養血清肝藥終至不痊而死陰瘡主治方清肝滲濕湯清肝滲濕湯四物澤瀉翹連膽草梔木通滑石銀柴等甘草防風蘆薈宜治肝經鬱滯邪火流行致陰腫痛或風熱作癢川芎當歸白芍生地山梔黃連連翹龍膽草各一錢銀柴胡澤瀉木通各六分滑石二錢蘆薈五分甘草三分防風八分水二鍾淡竹葉燈心各二十件煎八分食前服涼榮瀉火湯涼榮瀉火湯黃芩四物山梔知母全柴胡木通茵陳草麥冬龍膽大黃煎治婦人懷抱憂鬱不清致生內熱小水澀滯大便秘結及陰中火鬱作痛亦如澀淋宜此瀉之川芎當歸白芍生地黃芩黃連山梔木通柴胡茵陳膽草知母麥門冬各一錢甘草五分大黃酒炒二錢水二鍾煎八分空心服便利去大黃銀杏散銀杏散內用杏仁水銀輕粉雄黃稱棗肉為丸綿裹成陰中作癢功效靈治婦人濕熱下注陰中作癢及內外生瘡並用杏仁去皮尖研輕粉水銀鉛製雄黃各一錢上各為細末共和一處每用五分棗肉一枚和丸用絲綿包裹留一綿條拈線在外用塌癢湯煎洗藥棗安入陰內留線在外恐小便取出再入一日一換重者只四五枚痊愈仍兼服前藥塌癢湯塌癢湯中有苦參狼毒靈仙床子真歸尾鶴蝨同煎洗搔癢之人笑眼生治症同上以此熏洗之苦參威靈仙蛇床子當歸尾狼毒各五錢鶴蝨草一兩用河水十碗煎數滾濾清貯盆內乘熱先熏待溫後洗臨洗和入公豬膽汁二三枚同洗更妙雄黃藜蘆散雄黃藜蘆散鱉頭輕粉冰片共相求芎歸湯沸乘溫洗蛇菌雞冠不久留治婦人陰中突出如蛇或似雞冠菌樣者並治雄黃一錢蔥管藜蘆二錢碾細如面輕粉鱉頭煅黃色各一錢冰片二分已上各研極細末和勻再研瓷罐收貯先用芎歸湯煎洗隨後搽藥早晚二次其患漸收芎歸湯芎歸湯洗陰中癢蛇菌雞冠並此求白芷甘草並膽草熏洗餘殃盡縮頭治症同上以此洗之川芎當歸白芷甘草膽草上各等分每用五錢煎湯浴洗患上隨後搽藥應用方內疏黃連湯透膿散俱見腫瘍門補中益氣湯八珍湯四物湯八味丸俱見潰瘍門逍遙散小柴胡湯俱見瘰癧門龍膽瀉肝湯珍珠散俱見下疳門歸脾湯見痔瘡門消風散見風疹門蛇床子湯見腎囊風門蘆薈丸見下疳門傷寒發頤第四十傷寒發頤亦名汗毒此因原受風寒用藥發散未盡日久傳化為熱不散以致項之前後結腫疼痛初起身熱口渴者用柴胡葛根湯清熱解毒患上紅色熱甚者如意金黃散敷之初起身涼不渴者牛蒡甘桔湯散之患上微熱不紅疼痛者沖和膏和之腫深不退欲作膿者托裡消毒散已潰氣血虛弱食少者補中益氣湯以此治之未成者消已成者潰已潰者斂亦為平常黃道之法也用之最穩柴胡葛根湯柴胡葛根湯花粉甘草連翹牛子芩石膏桔梗升麻等傷寒頤毒效多靈治頤毒表散未盡身熱不解紅腫堅硬作痛者柴胡天花粉乾葛黃芩桔梗連翹牛蒡子石膏各一錢甘草五分升麻三分水二鍾煎八分不拘時服牛蒡甘桔湯牛蒡甘桔湯赤芍花粉黃連蘇木陳加上川芎為效藥傷寒頤毒盡承平治頤毒表邪已盡耳項結腫微熱不紅疼痛者牛蒡子桔梗陳皮天花粉黃連川芎赤芍甘草蘇木各一錢水二鍾煎八分食後服如意金黃散沖和膏俱見腫瘍門補中益氣湯見潰瘍門托裡消毒散腫瘍門痼發第四十一痼發乃天時不正之氣感而發之非毒內作也此患多生於手足掌心或腰腿臀下伸縮之處漫腫無頭憎寒發熱四肢沉重煩渴為甚初起宜服萬靈丹發汗解表腫仍不消者必欲作膿托裡消毒散兼蠟礬丸間服後法俱照癰疽潰瘍法推治為當萬靈丹托裡消毒散蠟礬丸俱見腫瘍門瘭疽第四十二瘭疽一名蛇瘴川廣煙瘴地面有之初出先作紅點次變黑色腐爛筋骨小者如粟如豆大者如梅如李發無定處初用蟾酥餅膏貼患上寒熱交作者黍米寸金丹或飛龍奪命丹亦可紅腫遊走不定者真君妙貼散加雄黃敷之自然截住破後脾胃虛弱食少乾嘔者補中益氣湯加黃連麥冬補而不應腫高疼甚惟出清水穢汁者俱為不治之症飛龍奪命丹即蟾酥丸加金頭蜈蚣二條黍米寸金丹真君妙貼散見腫瘍門補中益氣湯見潰瘍門小腹癰第四十三小腹癰乃七情火鬱以致脾虛氣滯而成其患小腹漫腫堅硬肉色不變有熱漸紅者屬陽易治無熱不紅者屬陰難治初起七日以前用艾當腫頂灸七壯膏蓋首尾內服壯脾胃養氣血行經補托之劑可保終吉如誤用克伐攻利涼藥者敗症必出十全大補湯倍加參耆薑附以救之內腐深陷者玉紅膏長肌收斂又補托不應者終久縱愈成漏十全大補湯玉紅膏俱見潰瘍門鸛口疽第四十四鸛口疽乃三陰虧損督脈之經濁氣濕痰流結而成其患發在尾閭之穴高骨頭尖初起形似魚肫久則突如鸛嘴朝寒暮熱日輕夜重潰後稀膿出而無禁又或鮮血出而不停凡發此者壯年猶可老年為慮初起宜滋陰除濕湯和之已成未潰者和氣養榮湯托之潰而不斂者滋腎保元湯補之久而成漏者琥珀蠟礬丸兼先天大造丸服之甚妙滋陰除濕湯滋陰除濕湯知母白芍芎歸熟地芩柴陳貝母兼澤瀉骨皮甘草效多靈治鸛口疽初起朝寒暮熱日輕夜重如瘧等症川芎當歸白芍熟地各一錢柴胡黃芩陳皮知母貝母各八分澤瀉地骨皮甘草各五分水二鍾姜三片煎八分食前服和氣養榮湯和氣養榮湯術耆參苓熟地共陳皮丹皮甘草沉香等還有當歸在後隨治前症已成不得內消者宜此藥托之人參陳皮白朮黃耆茯苓丹皮當歸熟地各一錢沉香甘草各五分水二鍾煎八分食前服滋腎保元湯滋腎保元湯杜仲參耆朮附桂丹皮歸苓萸肉並甘草棗姜熟地要相隨治前症元氣虛弱膿水淋漓久而不斂者服之人參黃耆白朮茯苓歸身杜仲山萸肉牡丹皮熟地各一錢附子肉桂甘草各五分水二鍾姜三片棗二枚蓮肉七枚食前煎服琥珀蠟礬丸見腫瘍門先天大造丸見流注門龍泉疽虎鬚毒第四十五此二毒乃腎督二脈分合行布驟被外邪所搏而成龍泉疽發在人中之間虎鬚毒生於地角之上初起疙瘩次生腫痛漸發寒熱甚者噁心乾嘔腮項俱腫此穴忌灸初起宜線針挑破患頂以蟾酥餅放上膏蓋使毒有門而泄四邊焮腫上如意金黃散敷之內有表症者荊防敗毒散加芩連牛子里症內疏黃連湯已成欲其作膿芎歸內托散膿成脹痛者針之即愈潰膿後只宜膏藥換貼其口易完此症多生於元氣壯實者故多不必服藥自愈芎歸內托散芎歸內托散陳皮桔梗花粉茯苓隨黃耆甘草銀花等虎毒龍泉服最宜川芎當歸陳皮茯苓天花粉桔梗銀花黃耆各一錢甘草五分水二鍾煎八分食後服如意金黃散內疏黃連湯荊防敗毒散見時毒門石榴疽第四十六石榴疽者乃少陽相火與外濕煎搏而成其患生在肘尖上一寸是也初起一點黃粟小泡根便開大色紅堅硬腫如復碗皮破泛出疊如榴子令人寒戰猶如重瘧初起即灸九壯內服蟾酥丸發汗以解蘊毒灸頂上蟾酥餅貼之膏蓋焮痛處金黃散敷之內服菊花清燥湯琥珀蠟礬丸煩躁熱甚者護心散金液戊土丹九日後患上作膿稠黃疼苦稍減表裡症退飲食微進者可保無虞反此為逆潰後元氣虛弱雜症相兼者照癰疽調理法治之菊花清燥湯菊花清燥湯生地知母川歸熟地皮柴芩甘草升麻等犀角門冬白芍宜甘菊二錢川芎當歸知母貝母白芍生地麥門冬地骨皮各一錢升麻犀角甘草柴胡黃芩各五分水二鍾淡竹葉燈心各二十件煎八分食後服蟾酥丸見疔瘡門琥珀蠟礬丸護心散如意金黃散俱見腫瘍門金液戊土丹見脫疽門穿踝疽第四十七穿踝疽乃足三陰濕熱下流停滯而成初起內踝腫痛疼徹骨底舉動艱辛甚則串及外踝通腫有頭者屬陽易破無頭者屬陰難潰此二者初起必寒熱交作宜荊防敗毒散加牛膝散之日久膿成脹痛者針之腐而不斂孔大者玉紅膏培之形體虛弱者補之此症若不早治因循致成廢疾也有矣荊防敗毒散見時毒門玉紅膏見腫瘍門大麻風第四十八大麻風症乃天地間異症也但感受不同有體虛之人因驟被陰陽暴曬露霧風雨之氣所侵感之不覺未經發泄凝滯肌膚積久必作又有房欲後體虛為風邪所襲或露臥當風睡眠濕地或洗浴乘涼希圖快意此等相感俱能致之其患先從麻木不仁次發紅斑久則破爛浮腫無膿又謂皮死麻木不仁肉死刀割不痛血死破爛流水筋死指節脫落骨死鼻梁崩塌有此五症俱為不治又曰心受之先損於目肝受之面發紫泡脾受之遍身如癬肺受之眉毛先脫腎受之足底先穿又為五敗症也總皆風濕相乘氣血凝滯表裡不和臟腑痞塞陽火所變此其根蒂也初起麻木不仁肌肉未死者宜萬靈丹洗浴發汗以散凝滯之風