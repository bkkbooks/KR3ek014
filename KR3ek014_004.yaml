之物人之皮毛腠理不密故感其毒先發為癢抓之漸似癮疹出現皮膚傳遍肢體皮破爛斑流水作痛甚者寒熱交作宜韭菜汁調三白散塗之服化斑解毒湯忌浴熱水兼戒口味不然變為頑風癬癩愈而又發者多矣三白散三白散中用石膏杭粉輕粉不相饒調搽必用生韭汁漆瘡敷上即時消杭粉一兩石膏三錢輕粉五錢各為末韭菜汁調敷紙蓋如無菜汁涼水調敷化斑解毒湯見火丹門竹木刺第八十七竹木刺外入之患有軟硬之分淺深之異軟淺者以針頭撥見刺形拔出則愈硬深難出者用螻蛄搗爛塗刺上一時許其刺自然吐出取去之則愈矣花蕊石散見跌撲門治竹木刺傷腫痛流膿以蔥湯洗淨用此摻之痤痱瘡第八十八痤痱者密如撒粟尖如芒刺癢痛非常渾身草刺此因熱體見風毛竅所閉宜服消風散洗用苦參湯甚者皮損匝匝成瘡以鵝黃散軟絹帛蘸藥撲之苦參湯苦參湯用大菖蒲河水煎來患上磨臨洗再加豬膽汁可教諸癢自然除治痤痱瘡作癢抓之又疼坐如糠穩難以安睡用苦參四兩大菖蒲二兩河水五瓢同煎數滾添水二瓢蓋片時臨洗和入公豬膽汁四五枚淋洗患上不二三次全愈愈後避風忌食發物鵝黃散鵝黃散中真豆粉黃柏滑石輕粉稱四味將來研細末止痛收干遂吾心治痤痱瘡作癢抓之皮損隨後又疼用此撲之綠豆粉一兩滑石五錢黃柏三錢輕粉二錢上為細末以軟絹帛蘸藥撲於患上止痛收干消風散見疥瘡門痄𤸛第八十九癢𤸛乃風熱濕痰所生有冬溫後天時不正感發傳染者多兩腮腫痛初發寒熱以柴胡葛根湯散之外敷如意金黃散在裡內熱口乾二便不利者四順清涼飲利之表裡俱解腫仍不消必欲作膿托裡消毒散膿成者即針之體虛人兼服補托自愈柴胡葛根湯見傷寒發頤門四順清涼飲見湯潑門痰包第九十痰包乃痰飲乘火流行凝注舌下結而匏腫綿軟不硬有妨言語作痛不安用利剪刀當包剪破流出黃痰若蛋清稠黏難斷捺盡以冰硼散搽之內服二陳湯加黃芩黃連薄荷數服忌煎炒火酒等件加味二陳湯加味二陳湯半夏茯苓甘草共陳皮芩連薄荷姜三片痰飲生來服此宜治痰飲流注舌下發腫作痛針刺已破者服之陳皮半夏茯苓甘草黃芩各八分黃連薄荷各五分水二鍾姜三片煎八分食前服冰硼散見咽喉門癩風第九十一癩風乃陽明濕熱沸騰於肌表或外受風寒侵襲而成其患初起水泡作癢成瘡破流脂水癢至徹骨久則成片傳及遍身好浴熱湯形如風癩初起上體多者防風通聖散去硝黃加蔥頭三莖發汗以散外毒下體多者去麻黃以攻內毒久服祛風換肌丸初服消風消燥湯外搽諸瘡一掃光成片流水者真君妙貼散皮膚頑厚有蟲者麥餞散搽之消風清燥湯消風清燥湯生地芎芍防歸芩黃連花粉苦參並蟬蛻甘草靈仙共此全川芎當歸白芍生地防風黃芩黃連天花粉蟬蛻苦參靈仙各一錢甘草五分水二鍾煎八分食遠服應用方防風通聖散見時毒門祛風換肌丸見白屑風門真君妙貼散見腫瘍門諸瘡一掃光見疥瘡門濕腫第九十二濕腫者皆脾氣受傷之病或飲食後驟受風寒所侵或飢渴時誤餐生冷所滯寒積於中食不克化其患胸膈不寬小水不利面目浮腫漸至遍身此土傷不能生化之故也宜用二蛟散疏通稼土溫養脾元其小水自利浮腫自消此方百發百中之妙二蛟散二蚊散內焙皮硝陳米三年要炒焦濕腫糖湯調服下如蛟行水自然消治生冷惱怒傷脾致胸膈不寬小水不利面目四肢浮腫諸藥不效用三年老黃米炒焦黃色為末提淨芒硝三兩鍋內溶化炒乾為末每用一平杯和勻再碾極細大人壯實者每服三錢小兒十歲上下者一錢二分俱用赤砂糖三茶匙和白滾湯半茶鍾空心調服至午大便一次至晚再便一次其疾先從眼胞消起日久元氣虛者與加味胃苓湯間服至重者不過五服愈加味胃苓湯加味胃苓湯術苓參查芍半藿香陳澤瀉豬苓並厚朴甘草香附效如神治脾胃受傷胸膈不寬兩脅膨脹小水不利面目四肢浮腫者服之陳皮茯苓白朮白芍各一錢藿香人參厚朴山楂澤瀉半夏各五分甘草豬苓各三分香附女人加一錢姜三片燈心二十根水二鍾煎八分食前服咬傷第九十三人咬為患良肉受傷但齒乃陽明胃經有餘臟腑多火多熱生穴於此凡食經此無不燖爛下咽又飲食炙爆之毒無不侵襲故人發腫其痛異常臭膿腐爛痛徹連心是感牙之毒也初咬時一日內眾撒熱小便浸傷處洗淨牙黃瘀血咬孔上蟾酥餅貼之膏蓋後出微膿漸愈如咬時未經此法致腫痛發胖疼甚者亦與童便浸洗挹乾用粗紙捻蘸麻油點火用煙焰熏腫痛上良久方住以解牙毒仍以蟾酥條插入孔內膏蓋候腫消時換玉紅膏搽之長肉完口如有雜症相兼者亦隨症而治蟾酥餅條見疔瘡門玉紅膏見腫瘍門蔥白甘草湯蔥白甘草湯容易咬傷疼痛兼臭穢每日常將頻洗之消瘀散腫功全備治咬傷焮腫疼痛膿血淋漓臭穢腐爛者用蔥白二兩粉草五錢水三碗煎至二碗每日洗淨傷處瘀腐膿血方用玉紅膏搽之黑膏蓋漸愈瘋犬傷第九十四瘋犬乃朝夕露臥非時不正之氣所感故心受之其舌外出肝受之其目昏蒙脾受之其涎自流肺受之其音不出腎受之其尾下拖此五臟受毒成為瘋犬乃稟陰陽肅殺之氣故經此必致傷人隨咬即服救生散小便中行出血片忌諸口味麻物赤豆等俱不可見百日乃安治之遲者毒大而小便難出必攻臟腑久則成形腹脹攻急人聲若犬眼神露白者俱為不治有愈後復犯前禁觸之仍死救生散救生散用七斑蝥惟用全身翅足饒杭粉一錢同作末空心酒服效功高治瘋犬咬傷用生斑蝥七個去頭翅足杭粉一錢同研空心溫黃酒調服一時許小便行出血片白脂乃惡物也如便痛煎甘草湯飲之自利如毒未盡次早再一服以小便清白方為毒盡又方治瘋犬咬有效其人頂中必有紅髮一根急須拔去以追風如聖散敷傷處抽毒氣服救生散追風如聖散追風如聖散防風川草烏芎薄荷同白芷細辛蒼朮等雄黃加上效無窮治瘋犬咬傷隨用敷之其毒即可拔出細辛防風川烏薄荷草烏川芎白芷蒼朮各一兩雄黃四錢共為末溫酒調敷傷處以紙蓋扎早晚換二次瘋犬傷之要靜居諸麻赤豆大葷祛百日之中都忌見敢教患者樂年餘女人面生黧黑斑第九十五黧黑斑者水虧不能制火血弱不能華肉以致火燥結成斑黑色枯不澤朝服腎氣丸以滋化源早晚以玉容丸洗面斑上日久漸退兼戒憂思動火勞傷等件腎氣丸見肺癰門玉容丸見雀斑門鈕釦風第九十六鈕釦風皆原風濕凝聚生瘡久則搔癢如癬不治則沿漫項背當以冰硫散擦之甚者服消風散亦妙冰硫散冰硫散內用川椒朝腦生礬豈可饒蘿蔔內藏煨熟藥還將豬膽共相調硫黃一兩獐冰川椒生礬各二錢共為末先用白蘿蔔一個摳空其內將藥填滿復將原皮蓋之濕紙包三四層灰火內煨半時許待冷取開用藥同熟豬油調稠搽患上自愈消風散見疥瘡門枯筋箭第九十七枯筋箭乃憂鬱傷肝肝無榮養以致筋氣外發初起如赤豆大枯點微高日久破裂趲出筋頭髼鬆枯槁多生胸乳間宜用絲藥線齊根系緊七日後其患自落以珍珠散摻之其疤自收兼戒口味不發絲藥線見癭瘤門珍珠散見下疳門婦人腳丫作癢第九十八婦人腳丫作癢乃從三陽風濕下流凝聚不散故先作癢而後生濕爛又或足底彎曲之處癢濕皆然枯礬散枯礬散中煅石膏黃丹輕粉不相饒四味將來為末摻腳丫濕癢即時消枯礬五錢石膏煅輕粉黃丹各三錢上為末溫湯洗淨搽藥即愈手足破裂第九十九手足破裂破裂者乾枯之象氣血不能榮養故也因熱肌驟被風寒所逼凝滯血脈以致皮膚漸枯漸槁乃生破裂日襲於風風熱相乘故多作痛以玉肌散洗擦潤肌膏潤之甚者兼服當歸飲子為妙玉肌散見雀斑門潤肌膏見白禿瘡門當歸飲子見疥瘡門眼丹第一百眼丹脾經有風胃經多熱共結為腫風多者則浮腫易消熱甚者則堅腫難收初起宜用金黃散敷之有表症者荊防敗毒散里症者清胃散加大黃利之如後不散必欲作膿宜換膏貼之膿成者即針遲則眼頭自破此乃晴明穴內空難斂成漏者多荊防散毒散見時毒門清胃散見牙縫出血門金黃散見腫瘍門黑子第一百一黑子痣名也此腎中濁氣混滯於陽陽氣收束結成黑子堅而不散宜細銅管將痣套入孔內捻六七轉令痣入管一拔便去有痣浮淺不能拔者用針挑損痣上搽冰螄散少許糊紙蓋之三日自脫或灰米膏點之亦可落後珍珠散乾摻生皮而愈忌醬醋無斑灰米膏用成塊火灰鹼水調稠將白川米插入灰內留半米在外片時許候米熟用米點痣上可落矣冰螄散見瘰癧門珍珠散見下疳門眼胞菌毒第一百二菌毒者乃脾經蘊熱凝結而成其患眼胞內生出如菌頭大蒂小漸長垂出甚者眼翻流淚亦致昏蒙治宜用軟綿紙蘸水蔭之眼胞上少頃用左手大指甲佃於患根右手以披針尖頭齊根切下血出不妨隨用翠云靛磨濃塗之其血自止內服涼膈清脾飲二服仍忌海腥煎炒椒薑火酒等件不發涼膈清脾飲涼膈清脾飲薄荷荊防生地石膏圖黃芩赤芍連翹等甘草山梔豈可無防風荊芥黃芩石膏山梔薄荷赤芍連翹生地各一錢甘草五分水二鍾燈心二十根煎八分食後服翠云靛治眼胞菌毒用針割後塗之杭粉五兩銅綠末一兩輕粉一錢共研極細用黃連一兩同川米百粒水一碗煎一半再熬折去二分和藥作錠陰乾臨用清水少許淨硯上磨濃雞翎蘸搽患上又治爛弦風眼或暴赤腫痛者箍搽更效體氣第一百三體氣一名狐氣此因父母有所傳染者又有狐胎而受生者故不脫本來氣質凡此腋下多有棕紋數孔出此氣味常以五香散擦之內用蒜肚時常作饌食之亦可解其氣味可漸而退此法常取效也五香散五香散內用沉檀還有零零並木香加上麝香功更捷敢教體氣不相妨沉香檀香木香零零香各三錢麝香三分共為細末每用五釐津調搽擦兩腋下三日一次或用香末二錢絹袋盛貯掛於腋下亦效蒜肚方用公豬肚一具入大蒜囊四十丸枚去殼入肚內以線扎口水煮極爛用鹽醋蘸肚隨便食之氣味甚者用癩蝦蟆一個入內同煮肚爛去蝦蟆大蒜用熱酒食之洗浴發汗避風三日其氣頓改白禿瘡第一百四白禿瘡因剃髮腠理司開外風襲入結聚不散致氣血不潮皮肉乾枯發為白禿久則發落根無榮養如禿斑光潤不癢內血已潮以姜蘸潤肌膏常擦其發漸生禿斑乾枯作癢者內必有蟲宜用麥餞散搽之蟲死風散發生可愈後忌動風發物等件麥餞散見痘風瘡門治禿瘡頭毛脫落白斑如癬瘡痂壘壘疊起癢甚猶若蟲行蔥湯洗淨瘡癡潔淨用麻油調搽以氈帽戴之隨後作疼發腫忍之三日後其痂漸漸而脫愈之後不復作其發亦生戒諸發物諸瘡一掃光見疥瘡門治禿瘡發脫作癢本藥一錢加倒掛塵二分加燈窩宿油調搽自愈潤肌膏潤肌膏內用麻油紫草當歸一處投能搽禿瘡枯槁色加之黃蠟效應收治禿瘡乾枯白斑作癢發脫用麻油四兩當歸五錢紫草一錢同熬藥枯濾清將油再熬加黃蠟五錢化盡傾入碗內頓冷搽擦患上漸愈矣奶癬第一百五奶癬兒在胎中母食五辛父餐炙爆遺熱與兒生後頭面遍身發為奶癬流脂成片睡臥不安搔癢不絕以文蛤散治之或解毒雄黃散甚則翠雲散妙文蛤散文蛤散用點胡椒二味將來同炒焦加上輕粉香油和嬰兒奶癬即時消文蛤四兩點紅川椒二兩輕粉五錢先將文蛤打成細塊鍋內炒黃色次下川椒同炒黑色煙起為度入罐內封口存性次日入輕粉碾為細末罐收貯香油調搽奶母戒口為妙解毒雄黃散見血風瘡門翠雲散青缸汁調搽見楊梅瘡門蟮拱興第一百六蟮拱頭俗名㺁猪是也患小而稟受悠遠皆父精母血蓄毒而成生後受毒者只發一次其患腫高破之又腫皆稟受時原有衣膜相裹毒雖出而膜未除故愈又發腫甚膿熟者用針刺破以三品一條槍插入孔內化盡內膜自愈又有不腫而不收口者此必風襲患口宜敗銅散搽之兼戒口味自愈敗銅散敗銅散效為何因銅錫鉛硇總化成性熱亦能收濕水一干再不復回津治蟮拱頭已破後膿水不幹愈之又發久不收口用化銅舊罐為末洗淨患上香油調搽忌口三品一條槍見痔毒門小兒遺毒爛斑第一百七遺毒乃未生前在於胞胎稟受因父母楊梅瘡後餘毒未盡精血孕成故既生之後熱湯洗浴烘燻衣物外熱觸動內毒必發於肌膚之表先出紅點次成爛斑甚者口角穀道眼眶鼻麵皮肉俱壞多妨乳哺啼叫不安初治宜早內與土茯苓湯調人中黃末每日數次共飲四五分外用解毒紫金丹磨塗患上效者可保十中三四遲延毒甚爛斑遍身不乳者百中難活一二此由根蒂受毒之深故也人中黃治小兒諸胎毒痘疹黑陷內收唇焦口乾風熱斑疹赤遊丹毒兼治大人傷寒陽症發狂或諸惡瘡毒氣入里口燥咽乾煩渴悶亂中諸砒草河豚等毒諸般急病無有不效用毛竹一段兩頭留節一頭鑽一小孔用粉草磨為細末從孔灌滿以木條塞緊孔眼用磚扎之沉入大糞池內半年取起長流水浸一日帶竹風乾瓷罐收貯大人每服二錢小兒每服三四分涼水調服小兒胎毒爛斑土茯苓湯調服尋常熱病入應病藥中調服即效真君妙貼散見腫瘍門治小兒胎毒皮肉腐爛疼痛不安用此敷即效解毒紫金丹見疔瘡門螻蛄串第一百八螻蛄串者乃得於思慮傷脾脾氣鬱結所生是疾氣血澆薄者多蓋四肢屬脾土其患多生於兩手初起骨中作痛漸生漫腫堅硬不熱不紅手背及內關前後連腫數塊不能轉側日久出如豆腐漿汁串通諸竅日夜相流腫痛仍在患者面黃肌瘦飲食減少日則寒熱交作內症並出首尾俱宜益氣養榮湯加味逍遙散調和氣血扶助脾胃其中可生者十有二三矣補而不應氣血瀝盡而亡者多益氣養榮湯加味逍遙散見瘰癧門小兒痘風瘡第一百九痘風瘡因痧痘後毒發未盡留熱肌膚覆被外風侵入其患先從細瘡作癢次漸沿開成片脂水生痂搔之無度因用麥餞散搽之兼戒口味避風自愈麥餞散麥餞散治痘風瘡硫黃人信要相當川椒生熟枯礬等麻油調擦自然光治小兒痘風作癢疊疊成片甚則頑麻不知痛用小麥一升炒枯黃色乘熱入缽內和硫黃四兩白砒一兩細末攪勻待冷取起加煙膠半斤川椒三兩生枯礬各二兩共碾細末臨用蔥湯洗淨用麻油調搽油紙蓋扎三日一換三次愈小兒赤遊丹第一百十赤遊丹受毒於未生前發病於有生後蓋身在胞胎皆賴父精母血藉以生養父母不能節其欲多致淫火猖熾胎必侵受又不能戒諸厚味以及炭火烘燻重衾疊褥往往受熱子無弗有及致生後熱湯洗浴烘燻衣物觸動內毒而欲發之時先發身熱啼叫驚搐次生紅腫光亮發熱瞬息遊走發無定處先從頭額起者名天奪丹以升麻葛根湯母子同服余皆起於腹背流入四肢者輕起於四肢流入胸腹者重有此總皆先砭惡血為要砭血之後先用精豬肉縫片貼之一時許換如意金黃散用水芭蕉根搗汁調敷甚者日換二次內以大連翹飲消毒犀角飲五福化毒丹毒氣入里腹脹堅硬不乳者紫雪散下之三日後身漸徹涼砭血之處肉便軟活聲清腹軟乳哺如常者順反此為逆升麻葛根湯升麻葛根湯芍藥柴胡梔子共連翹木通甘草同煎服丹毒遊行效最高治丹毒身體發熱面紅氣急啼叫驚搐等症服升麻乾葛白芍柴胡黃芩山梔各一錢木通甘草各五分水二鍾煎八分不拘時母子同服大連翹飲大連翹飲梔芍歸車前滑石石膏隨荊防甘麥柴芩等蟬蛻木通牛子宜治小兒丹毒發熱痰涎壅盛一切諸瘡痧疹頸項生核或傷風傷寒時行發熱等症並宜服之連翹瞿麥滑石車前子牛蒡子赤芍山梔木通當歸防風黃芩柴胡甘草荊芥蟬蛻石膏各五分水二鍾燈心二十根煎八分母子同服消毒犀角飲消毒犀角飲防風加上黃連甘草同還用燈心為引使赤遊丹腫效神功治小兒丹毒身熱氣粗啼叫驚搐不寧等症服犀角鎊防風各一錢甘草五分黃連三分上水二鍾燈心二十根煎四分徐徐服之紫雪散紫雪羚羊犀角同升麻寒水石膏逢玄參沉木香甘草硝片硃砂金箔從治小兒赤遊丹毒甚者毒氣入里肚腹膨脹氣急不乳即宜此藥救之又治傷寒熱燥發狂及外科一切蓄毒在內煩躁口乾恍惚不寧等症升麻寒水石石膏犀角羚羊角各一兩玄參二兩沉香木香各五錢甘草八錢水五碗同藥煎至五碗濾清再煎滾投提淨朴硝三兩六錢微火漫煎水氣將盡欲凝結之時傾入碗內下硃砂冰片各二錢金箔一百張各預研細和勻碗頓水內候冷凝成雪也大人每用一錢小兒二分十歲者五分徐徐咽之即效病重者加一錢亦可或用淡竹葉燈心湯化服針砭法針砭法來針砭法披針頭向患中插箸頭復向針上敲敲出血來以箸刮治小兒赤遊丹毒紅赤焮腫遊走不定須砭之用披針鋒尖向患上以烏木重箸在針上面擊之密砭去血多者為妙血紅者輕紫者重黑者死砭畢溫湯洗淨用干精豬肉縫大片貼砭處一時許方換如意金黃散水芭蕉根搗汁調敷如意金黃散見腫瘍門治小兒赤遊丹毒紅如朱熱如火走如雲散及遍身不定者用水芭蕉根搗汁調敷加蜜亦可五福化毒丹見胎瘤門走馬疳第一百十一走馬疳言患迅速不可遲延故也其患多在痧痘餘毒所中又有雜病熱甚而成者其患牙根作爛隨便黑腐作臭甚者牙根脫落根柯黑朽不數日間以效穿腮破唇誠為不治初起宜用蘆薈消疳飲外用人中白散或冰硼散