處七壯知疼痛者乃為吉兆跌撲第五十八跌撲者有已破未破之分亡血瘀血之故且如從高墜墮而未經損破皮肉者必有瘀血流注臟腑人必昏沉不省二便必難當以大成湯通利二便其人自蘇不醒者獨參湯救之尋常墜墮輕者以復元活血湯調之又如損傷骨節筋斷血流不止者獨勝散止之次用花蕊石散搽之又有跌斷骨節大損等症此則另有專門接骨扎縛未及詳註也大成湯大成湯內朴硝黃蘇木當歸甘草良陳皮厚朴紅花等木通枳殼共煎嘗治跌撲傷損或從高墜下以致瘀血流入臟腑昏沉不醒大小便秘及木杖後瘀血內攻肚腹膨脹結胸不食噁心乾嘔大便燥結者並服之陳皮當歸蘇木木通紅花厚朴甘草各一錢枳殼二錢大黃三錢朴硝二錢上水一碗煎八分不拘時服服後二時不行渣再煎臨臥服入蜜三匙亦妙調中二陳湯調中二陳湯枳殼耆芍芎歸烏藥芩青皮紫蘇防風實桔紅蘇木腹檳靈治前症已服行藥之後當進此藥二三服調之陳皮半夏茯苓甘草枳殼大腹皮紅花川芎當歸白芍各八分防風檳榔黃耆桔梗青皮烏藥蘇木枳實黃芩紫蘇各六分木香三分上水二鍾姜三片棗二枚煎八分不拘時服獨參湯獨參湯力最專功跌撲金瘡出血多昏沉不省人事者灌之入腹起疲癃治跌撲損傷或金瘡出血過多昏沉不醒者服人參一兩切片水二碗煎一半不拘時通口服之渣再煎服其人自蘇再用渣加川米一合煎湯溫服花蕊石散花蕊石散麝檀香乳沒辛蘇烏樸當羌龍白芷蛇含石木降香南星粉霜治跌撲傷損及金瘡刀箭兵刃所傷斷筋損骨疼痛不止新肉不生者並效乳香沒藥羌活紫蘇細辛草烏蛇含石便煅三次厚朴白芷降香當歸蘇木檀香龍骨南星輕粉各二錢麝香三分花蕊石童便煅七次五錢上共研極細罐收聽用蔥湯洗淨用此摻之軟綿紙蓋扎一日一換神效此藥一時未備可用多骨疽門生肌散代之暫用亦可取效危急也玉紅膏見腫瘍門治跌撲損傷或金瘡斷損筋骨已經血止疼痛作膿宜用此膏蔥湯洗淨日搽傷處黑膏蓋之金瘡第五十九金瘡乃刀刃所傷或有磁鋒割損淺者皮破血流而已深者筋斷血飛不住皮破者桃花散摻之其血自止筋斷者如聖金刀散摻扎止復又流者此症急用玉紅膏塗傷處膏蓋長肉蓋筋骨肉方斷斯人面色必黃外避風寒內忌冷物終保無妨有失血過多者獨參湯八珍湯補助為要此無外法矣如聖金刀散如聖金刀散二礬松香細末共加參刀傷損破肌流血摻上應知效不難治刀刃所傷皮破筋斷飛血不止者用松香淨末七兩枯礬生礬各一兩五錢共為極細末罐密收摻傷處紙蓋絹扎止後三四日後必焮痛作膿換摻生肌散三日三次其疼即止以後日用蔥湯洗之換搽玉紅膏長肉生肌避風為要桃花散桃花散最治金瘡止血消瘀效莫量大黃同與石灰炒將來一摻即無妨治金瘡出血不止用石灰半升同大黃一兩五錢切片同炒石灰變紅色為度去大黃篩細摻損上紙蓋絹扎止血後用蔥湯洗淨換搽玉紅膏長肌收斂兼戒口味房事為要獨參湯見跌撲門八珍湯見潰瘍門杖瘡第六十杖瘡乃良肉受傷之患有已破未破之分正刑酷刑之說已破肌肉者隨杖後以清涼拈痛膏敷之疼腫即消未破瘀血內攻者用針放出內蓄瘀血再以大成湯下之便通自愈如傷處瘀腐已作疼痛者玉紅膏搽之自然腐化生新而愈至於辱刑重刑難受之時宜預服鐵布衫丸方得保身全命也鐵布衫丸鐵布衫丸乳沒歸地龍蘇木自然隨木鱉再加無名異救盡人間苦杖危治情不由己事出不虞受害一身重刑難免當預服之受刑不痛亦且保命自然銅煅紅醋浸七次當歸酒洗搗膏無名異洗去浮土木鱉子香油搽殼上灰焙用肉乳香沒藥地龍去土曬乾蘇木上八味各等分為細末煉蜜丸如雞頭實大每服三丸預用白湯送下縱非刑辱拷可保無虞散瘀拈痛膏散瘀拈痛膏罕稀麻油石灰水共齊加上獐冰金黃散杖瘡敷上笑嘻嘻治杖後皮肉損破紅紫青斑焮腫疼痛重墜者用腫瘍門如意金黃散一兩加獐冰三錢碾勻以白石灰一升用水二碗和勻候一時許用灰上面清水傾入碗內加麻油對分和勻以竹箸攪百轉自成稠膏調前藥稀稠得所聽用杖後帶血不用湯洗將藥通便敷之紙蓋布扎夏月一日冬月二日方用蔥湯淋洗乾淨仍再敷之痛止腫消青紫即退傷重者另搽玉紅膏完口又方杖刑之後肉不破瘀血攻疼沒門路將針點破膿血流管教患者隨行步大成湯見跌撲門治杖後瘀血內攻肚腹膨脹噁心便秘者服之珍珠散見下疳門治杖瘡已經長肉平滿惟不生皮用此搽即愈湯潑火燒第六十一湯潑火燒此患原無內症皆從外來也有湯火熱極逼毒內攻又有外傷寒涼極毒入里外皮損爛者以清涼膏粟殼膏塗之毒氣入里煩躁口乾二便秘澀者四順清涼飲下之泡破珍珠散搽之自愈四順清涼飲四順清涼飲赤芍防風羌活共連翹當歸甘草山梔等大黃加上熱俱消治湯潑火燒熱極逼毒入里或外被涼水所汲火毒內攻致生煩躁內熱口乾大便秘實者服連翹赤芍羌活防風當歸山梔甘草各一錢大黃炒二錢上水二鍾燈心二十根煎八分食遠服罌粟膏罌粟膏醫湯火燒麻油白蠟共煎熬將凝加上真輕粉塗於患上痛隨消治湯潑火燒皮肉損爛疼苦焮熱起泡流水者麻油四兩罌粟花十五朵無花以殼代之浸油內煎枯濾清將油再入杓內下白佔三錢熬化傾入罐內待四邊將凝時下真輕粉細末二錢攪勻水內頓冷取起臨用將泡挑破用抿腳挑膏手心中捺化搽患上軟綿紙蓋扎日換二次其疼即止次日將軟帛挹淨腐皮再搽之自愈珍珠散見下疳門治湯潑火燒腐皮已盡疼痛已止用此摻即愈前杖瘡門中石灰水調麻油成膏即清涼膏也搽湯潑火燒亦效甲疽第六十二甲疽者或因甲長侵肌又因修甲損傷良肉靴鞋窄小俱易生之其患胬肉裹上指甲腫痛異常難於步履初宜三品一條槍貼胬肉上化儘自愈日久胬肉堅硬須冰螄散化之後用珍珠摻上必瘥三品一條槍見痔瘡門珍珠散見下疳門繭唇第六十三繭唇乃陽明胃經症也因食煎炒過餐炙爆又兼思慮暴急痰隨火行留注於唇初結似豆漸大若蠶繭突腫堅硬甚則作痛飲食妨礙或破血流久則變為消渴消中難治之症初起及已成無內症者用麻子大艾炷灸三壯貼蟾酥餅膏蓋日久漸消內症作渴者早服加減八味丸午服清涼甘露飲以滋化源日久流血不止形體瘦弱虛熱痰生面色黧黑腮顴紅現口乾渴甚者俱為不治之症也清涼甘露飲清涼甘露飲柴芩麥冬犀角共茵陳石斛枳殼甘生地知母枇杷葉可尋治繭唇膏粱所釀暴怒所結遂成斯疾高突堅硬或損破流血或虛熱生痰或渴症久作並治犀角銀柴胡茵陳石斛枳殼麥門冬甘草生地黃芩知母枇杷葉各一錢水二鍾淡竹葉燈心各二十件煎八分食後服加減八味丸見潰瘍門蟾酥餅見疔瘡門痞癖第六十四痞癬皆緣內傷過度氣血橫逆結聚而生初起腹中覺有小塊舉動撁引作疼久則漸大成形甚者翕翕內動斯時必氣血衰弱飲食減少內服阿魏化痞散外貼乾坤一氣膏祛邪養正氣攻補自全安阿魏化痞散阿魏化痞散芎歸白朮紅花赤茯隨蕎麵大黃並鱉甲空心還用酒調宜川芎當歸白朮赤茯苓紅花阿魏鱉甲尖酥炙研各一錢大黃酒炒八錢蕎麥麵一兩微炒上共為末每服三錢空心好酒一茶鐘調稀服三日後腹痛便出膿血為驗忌生冷腥葷等件乾坤一氣膏一氣膏歸芷附稜巴萆蓬甲續靈成赤白芍玄生熟地桂阿乳沒鱉香能此膏專治痞疾毋論新久立效又治諸風癱瘓濕痰流注各樣惡瘡百般怪症男子夜夢遺精婦人赤白帶下又男女精寒血冷久無嗣息者並貼之當歸白附子赤芍白芍白芷生地熟地穿山甲木鱉肉巴豆仁萆麻仁三稜蓬朮五靈脂續斷肉桂玄參各一兩乳香沒藥各一兩二錢麝香三錢真阿魏二兩切薄片聽用上咀片用香油五斤存下四味余皆入油浸春三夏五秋七冬十期畢桑柴火熬至藥枯細絹濾清每淨油一斤入飛丹十二兩將油入鍋內下丹槐枝攪摟其膏候成端下鍋來用木盆坐穩漸下阿魏片泛化已盡方下乳沒麝香再攪勻乘熱傾入瓷罐內分三處盛之臨用湯中頓化痞病紅緞攤貼余病綾絹俱可攤之有腫者對患貼之男子遺精婦人白帶俱貼丹田諸風癱瘓貼腎俞穴並效天蛇毒第六十五天蛇毒一名蛇頭疔也乃心火旺動攻注而成其患指大腫若蛇頭赤腫焮痛疼及連心甚者寒熱交作腫痛延上腫頂上小艾灸五壯以雄黃散塗之內服蟾酥丸發汗解毒輕者漸消腫者潰膿甚則腐爛破後腫仍不消者以蟾酥條插入孔內膏蓋自效腐爛者玉紅膏搽之虛而不斂者兼服補劑雄黃散雄黃散內用蟾酥冰片還將輕粉和四味同來為細末水調患處日三塗治天蛇毒初起紅腫發熱疼痛徹心者宜用之雄黃明亮者二錢蟾酥二分微焙冰片一分輕粉五分共為細末新汲水調塗紙蓋日用三次極效蟾酥丸見疔瘡門玉紅膏見腫瘍門興痛第六十六頭痛者風火濕痰四者皆能致之又楊梅瘡毒上攻亦有此症或婦人產後梳洗當風大早亦致之名曰頭風宜用後方毋論病之新久受之真似並效天麻餅子天麻餅子草川烏芎芷甘防蒼朮呼薄荷細辛松白附雄黃全蠍一相途治頭痛因風火濕痰上攻及楊梅瘡毒所致兼治頭目昏眩項背拘急肢體煩痛肌肉蠕動耳哨蟬鳴鼻塞多嚏皮膚頑麻瘙癢癮疹又治婦人頭風作痛眉稜骨疼牙齒腫痛痰逆噁心者並皆治之天麻草烏湯泡去皮川芎細辛蒼朮甘草川烏湯泡去皮薄荷甘松防風白芷白附子去皮各五錢雄黃全蠍各三錢上為細末寒食麵打糊搗稠如寒豆大捻作餅子每服二三十餅食後細嚼蔥頭湯送下屬火熱痰痛者茶湯下甚者日進二服忌諸般發物三聖散三聖散用鬧楊花槿樹紅花總一家二味再加風子肉頭風偏正樂無涯治男婦頭痛不論偏正新久但夏月欲重綿包裹者並效鬧楊花淨末一錢槿樹花淨末一錢大風子白肉去油五分共研每服六分蔥酒調服洗浴發汗自愈合谷毒第六十七合谷疔俗稱虎口百丫也此患多有疙瘩泡起亦有紅絲走上故有疔名之稱此手陽明胃經濕毒攻注作癢癢熱焮疼初起挑破貼蟾酥餅膏蓋金黃散敷之三日後腫聚必欲作膿換膏貼之軟腫脹痛者膿已成針之即愈腫甚寒熱者必內外消托金黃散見腫瘍門蟾酥餅見疔瘡門鼻出血第六十八鼻中出血乃肺經火旺逼血妄行而從鼻竅出也外用紫土散敷囟頂上內服羚羊清肺湯亦可自止羚羊清肺湯羚羊清肺湯柴芍甘藕蒲黃地骨皮玄地芎歸石膏等梔連蘆薈白茅宜治鼻中無故出血不止及尋常吐血咳血並效羚羊角鎊黃連銀柴胡玄參石膏川芎當歸身白芍生地蒲黃地骨皮山梔各一錢蘆薈甘草各五分藕節三個白茅根四兩搗汁用水一碗和絞去渣用茅根汁一大碗煎七分入童便一杯食後服紫土散紫土散須從治法更兼火酒要調稠將藥敷於囪頂上自然血止不相流治鼻中無辜出血不止用傾銀紫土新罐碾細以火酒調敷囟門上其血自止此從治之法也牙縫出血第六十九牙縫出血陽明胃經實火上攻而出也又有胃虛火動腐爛牙齦以致淡血常常滲流不已實火清胃散楝果裘塞之虛火蘆薈丸人中白散服搽自愈清胃散清胃散中用石膏芩連生地不相饒丹皮加上升麻好陽明胃熱即時消治胃經有熱牙齒或牙齦作腫出血不止並效黃芩黃連生地丹皮升麻石膏各一錢水二鍾煎八分食後服楝果裘治陽明胃經實火上攻血從牙縫流出用楝樹果二個連肉核搗爛絲綿包裹先用溫湯漱淨瘀血塞於牙縫內其血自止蘆薈丸人中白散見口疳門血箭血痣第七十血箭出於心經火盛逼血從毛竅出也血痣由於肝經怒火鬱結其形初起色紅如痣漸大如豆揩之血流治血箭以桃花散涼水調敷或金墨塗搽自止血痣須用冰螄散枯去本痣以珍珠散搽之生皮乃愈血甚者內服涼血地黃湯兼戒口味始痊涼血地黃湯涼血地黃湯黃連當歸甘草山梔全加上玄參效更添無辜出血即安然治血箭血痣內熱甚而逼血妄行出血如飛者黃連當歸生地山梔玄參甘草各等分水二鍾煎八分量病上下服之桃花散見跌撲門冰螄散見瘰癧門珍珠散見下疳門鵝掌風第七十一鵝掌風由手陽明胃經火熱血燥外受寒涼所凝致皮枯槁又或時瘡餘毒未盡亦能致此初起紅斑白點久則皮膚枯厚破裂不已二礬湯熏洗即愈二礬湯二礬湯中白皂礬兒茶柏葉在其間先熏後洗油煙照鵝掌風頑愈不難治鵝掌風皮膚枯厚破裂作痛宜用此湯熏洗輕則不宜越重越效白礬皂礬各四兩孩兒茶五錢柏葉半斤用水十碗同上藥四味煎數滾候用先用桐油搽抹患上以桐油蘸紙拈點著以煙焰向患上熏之片時方將前湯乘滾貯淨桶內手架上用布蓋以湯氣熏之勿令泄氣待微熱傾入盆內蘸洗良久一次可愈七日忌下湯水永不再發腎囊風第七十二腎囊風乃肝經風濕而成其患作癢喜浴熱湯甚者疙瘩頑麻破流脂水宜蛇床子湯熏洗二次即愈蛇床子湯蛇床子湯當歸尾苦參畢竟用靈仙河水同煎熏患處腎囊風癢得安然治腎囊風濕熱為患疙瘩作癢搔之作疼宜洗蛇床子當歸尾威靈仙苦參各五錢水五碗煎數滾入盆內先熏待溫浸洗二次愈狼毒膏狼毒膏內風子肉檳榔五倍子相同川椒床子硫豬膽油沸投硝共此求治症同前狼毒檳榔硫黃五倍子川椒楓子肉蛇床子各三錢上為末用香油一大杯煎滾入皮硝三錢再煎滾次下公豬膽汁一個和勻調前藥搽擦患上此藥諸癢瘡用之並效疥瘡論第七十三夫疥者微芒之疾也發之令人搔手不閒但不知其何以生者疥曰吾不根而生無母而成乃稟陰陽氣育濕熱化形常列於王侯掌上何妨士庶之身可使文人怕筆繡女停針毋分貴賤一例施行醫問曰不生於身獨攻於手者又何也疥曰手掌乃太陰濕土所主手心又少陽相火所司土能生我火能化我此生皆賴濕土陽火所化故生者必自出於手掌醫曰然哉但其形知動而不知靜能進而不能退自非清氣所化也又脾主消納胃主傳化人之飲食未有不從厚味者厚味之中濕熱並化致生此瘡又清氣隨脈循行濁氣留滯不散停留肌膚積日不解隨後生熱發癢故癢熱之中濕火混化為蟲形隨濕化動隨火化此無情而之有情也既化之後潛隱皮膚展轉攻行發癢鑽刺化化生生傳遍肢體近則變為疥癬久則變成頑風多致皮膚枯槁浸淫血脈搔癢無度得湯方解外以繡球丸搽擦堪為止癢殺蟲內服消風散亦可散風涼血必得兼戒口味辛熱莫啜忌洗熱湯其煩自脫此為小恙不當陳說閒中之言隨筆而曰消風散消風散內歸生地蟬脫荊防蒼苦參胡麻知母牛蒡等石膏甘草木通行治風濕浸淫血脈致生瘡疥搔癢不絕及大人小兒風熱癮疹遍身云片斑點乍有乍無並效當歸生地防風蟬脫知母苦參胡麻荊芥蒼朮牛蒡子石膏各一錢甘草木通各五分水二鍾煎八分食遠服當歸飲子當歸飲子芍芎耆生地防風白蒺藜甘草何首烏荊芥諸風瘡癢服相宜治血燥皮膚作癢及風熱瘡疥瘙癢或作疼痛當歸川芎白芍生地防風白蒺藜荊芥何首烏各一錢黃耆甘草各五分水二鍾煎八分食遠服繡球丸繡球丸內用獐冰輕粉川椒共水銀雄黃枯礬楓子肉諸瘡癢疥擦安寧治一切乾溼疥瘡及膿窠爛瘡瘙癢無度者效獐冰輕粉川椒枯礬水銀雄黃各二錢楓子肉一百枚另碾以上共為細末同大楓子肉再碾和勻加柏油一兩化開和藥攪勻作丸圓眼大於瘡上擦之諸瘡一掃光諸瘡一掃光硫柏木鱉床椒枯白礬水銀風子獐冰等砒苦參煙膠共參此藥凡治癢瘡不論新久及身上下或干或濕異類殊形但多癢少痛者並宜用之俱各有效苦參黃柏各一斤煙膠一升木鱉肉蛇床子點紅椒明礬枯礬硫黃風子肉獐冰水銀輕粉各二兩白砒五錢共為細末熟豬油二斤四兩化開入藥攪勻作丸龍眼大瓷瓶收貯用時搽擦患上二次即愈洗癢瘡方洗癢瘡方只二般苦參豬膽共相攢河水煎湯頻浴洗管教諸癢即當安苦參半斤切片用河水三四瓢煎藥數滾摻水二瓢住火片時濾去渣臨洗和公豬膽汁四五枚攪勻淋洗癢上三日一洗三次亦可痊愈矣臁瘡論第七十四臁瘡者風熱濕毒相聚而成有新久之別內外之殊新者只有三香膏乳香法紙貼之自愈稍久紫黑者以解毒紫金膏搽扎漸可又年久頑臁皮肉烏黑下陷臭穢不堪者用蜈蚣餞法去風毒化瘀腐方可得愈外臁多服四生丸內臁多服腎氣丸妙三香膏三香膏內乳松香輕粉油調紙內藏先洗蔥湯方貼扎何妨新久爛臁瘡治臁瘡初起多疼少癢未經受風紫黑者宜用乳香松香輕粉各等分上為細末香油調稠用夾紙一面以針密刺細孔將藥夾搽紙內先以蔥湯洗淨將紙有孔一面對瘡貼之三日一換自效忌房事煎炒等件乳香法紙乳香法紙有奇功疼痛臁瘡欲此逢功在粉霜相協力三朝一換笑顏濃治臁瘡作痛不愈先用乳香碾細末一兩聽用以呈文油紙四張每紙一張攤平篩乳香末二錢五分勻篩紙上雙摺卷一寸闊將捲紙復作三折兩頭以線扎之用甘草一兩二錢水三碗將捲過藥紙浸入甘草湯內上用重物壓之煮數滾取起紙來解去扎線將紙攤開桌上每張用輕粉三錢摻乳香上用棕糊刷排刷相勻提起藥紙帶濕以無藥一面對板壁上貼之陰乾收用臨時隨患大小剪紙多少先用溫湯洗瘡隨將紙有藥一面對瘡貼之絹扎三日一換自然止痛生肌如貼後內無水出不必換貼自愈蜈蚣餞蜈蚣餞治久頑臁獨活桐油白芷煎甘草加上同煎煮傾入瘡中黑腐蠲治臁瘡多年黑腐臭爛作疼諸藥不效者用桐油二兩獨活白芷甘草蜈蚣各一錢入油內煎滾先將臁瘡洗淨用白麵水調作圈圍在瘡之四邊毋令泄氣走油將腳放平以茶匙挑油漸漸乘熱加滿待油溫取去已後腐肉風毒自然脫下用解毒紫金膏搽上紙蓋絹扎三日一換解毒紫金膏見結毒門治臁瘡毋論新久及頑瘡年久不愈者並用之四生丸四生丸療久臁瘡骨節多疼舉動妨地龍白附姜蠶等草烏靈脂莫相忘治外臁血風頑瘡骨節疼痛不能舉動或行步不前或渾身瘙癢或麻痹不仁或生斑疹並效地龍去土姜蠶炒去絲白附子五靈脂草烏去皮尖泡各等分上為細末米糊丸桐子大每服三四十丸食前茶酒任下腎氣丸見肺癰門血風瘡第七十五血風瘡乃風熱濕熱血熱三者交感而生發則搔癢無度破流脂水日漸沿開甚者內服消風散加牛膝黃柏外搽解毒雄黃散或如意金黃散俱可敷之如年久紫黑堅硬氣血不行者用針砭去黑血以神燈照法熏之以解鬱毒次以前藥敷之方效解毒雄黃散治風濕流注腿腳致生血風頑瘡紫黑瘙癢者雄黃四兩硫黃八兩上二味共碾細末柏油調搽紙蓋之三日一換如意金黃散見腫瘍門治症同前用公豬膽汁調稠敷患上油紙蓋托勿動待其自脫脫後色紅再敷之以色白為度神燈照法見腫瘍門治年久紫黑血風頑瘡流水作癢不絕先用蔥湯洗淨患上點火以燈焰熏之每熏二拈為度涼血消風散見疥瘡門頑癬第七十六頑癬乃風熱濕蟲四者為患發之大小圓斜不一乾溼新久之殊風癬如雲朵皮膚嬌嫩抓之則起白屑濕癬如蟲形瘙之則有汁出頑癬抓之則全然不痛牛皮癬如半項之皮頑硬且堅抓之如朽木馬皮癬微癢白點相連狗皮癬白斑相簇此等總皆血燥風毒克於脾肺二經初起用消風散加浮萍一兩蔥鼓作引取汗發散久者服首烏丸蠟礬丸外擦土大黃膏用槿皮散選而用之亦可漸效土大黃膏土大黃膏用白礬硫黃八兩共加參川椒三味研成末頑癬搽之不費難治乾溼頑癬不論新久但皮膚頑厚串走不定惟癢不痛者硫黃八兩生礬四兩點紅川椒二兩上各為末用土大黃根搗汁和前藥調成膏碗貯新癬抓損擦之多年頑癬加醋和擦如日久藥干以醋調搽牛皮癬用穿山甲抓損擦之妙頑癬必效方頑癬必效川槿皮輕粉雄黃巴豆宜斑蝥大黃百藥煎陰陽水和海桐皮治多年頑癬諸藥熏擦搽洗不效者用之即愈川槿皮四兩輕粉雄黃各四錢百藥煎四餅斑蝥全用一錢巴豆去油一錢五分大黃二兩海桐皮二兩上為極細末用陰陽水調抓損敷藥必待自落又頑癬方頑癬方中川槿皮斑蝥輕粉各相宜再加七個楓子肉新筆塗將患處醫川槿皮二錢輕粉五分斑蝥七個大楓子七個河井水共一鍾煎一半露一宿筆蘸塗之頑癬浮萍丸浮萍丸內蒼耳草蒼朮黃芩共苦參姜蠶鉤藤並豨薟酒丸服下可回春紫背浮萍蒼朮蒼耳草各二兩苦參四兩黃芩姜蠶各一兩鉤藤一兩五錢豨薟草二兩酒蒸共為末酒糊丸白滾湯每服二錢隨病上下服膿窠瘡第七十七膿窠瘡乃肺經有熱脾經有濕二氣交感其患先從小泡作癢後變膿泡作疼所成膿窠瘡也甚者清熱散風涼血除濕治之涼血清風散是也外以蛇床子散或諸瘡一掃光搽之亦效兼戒口味自愈蛇床子散蛇床子散用黃丹輕粉枯礬楓肉良大黃不少鬆香末麻油調許治膿瘡治膿窠瘡生於手足遍身根硬作脹癢痛非常蛇床子大楓子肉松香枯礬各一兩黃丹大黃各五錢輕粉三錢上為細末麻油調搽濕爛者乾摻之膿窠又方膿窠方中用石膏黃柏黃丹輕粉饒還有枯礬能燥濕搽之痛癢即時逃黃柏一兩以公豬膽汁搽之火上炙三錢石膏煅一兩輕粉二錢黃丹枯礬各三錢上為末麻油調搽濕者乾摻應用方涼血消風散諸瘡一掃光俱見疥瘡門凍風第七十八凍風者肌肉寒極氣血不行謂肌死患也初起紫斑久則變黑腐爛作膿者以碧玉膏主之生肌斂口碧玉膏見結毒門治凍風皮肉損爛膿水淋漓疼痛不止者用之獨勝膏獨勝膏來最散寒凍風凍耳一般安六月每逢三六日搽之冬凍不相干治凍風凍跟凍耳每逢冬寒則發六月初六十六二十六日用獨蒜搗膏日中曬熱在於遇冬所發之處擦之忌下湯水一日共擦三次不發又每常凍風用茄根同蔥湯浸洗再不重發火丹第七十九火丹者心火妄動三焦風熱乘之故發於肌膚之表有乾溼不同紅白之異乾者色紅形如雲片上起風粟作癢發熱此屬心肝二經之火治以涼心瀉肝化斑解毒湯是也濕者色多黃白大小不等流水作爛又且多疼此屬脾肺二經濕熱宜清肺瀉脾除濕胃苓湯是也腰脅生之肝火妄動名曰纏腰丹柴胡清肝湯外以柏葉散如意金黃散敷之化斑解毒湯化斑解毒湯石膏玄參知母共連翹黃連升麻蒡子等甘草人中黃更高治三焦風熱上攻致生火丹延及遍身癢痛者玄參知母石膏人中黃黃連升麻連翹牛蒡子各等分甘草五分水二鍾淡竹葉二十片煎八分不拘時服除濕胃苓湯除濕胃苓湯草朴陳皮二術澤豬苓防風滑石山梔等木通薄桂赤苓名治脾肺二經濕熱壅遏致生火丹作爛疼痛者防風蒼朮白朮赤茯苓陳皮厚朴豬苓山梔木通澤瀉滑石各一錢甘草薄桂各三分水二鍾燈心二十根煎八分食前服柏葉散柏葉散中蚯蚓糞赤豆大黃君莫混加上黃柏輕粉霜水調敷上何須問治三焦火甚致生火丹作癢或作痛延及遍身側柏葉炒黃為末五錢蚯蚓糞韭菜田內者佳黃柏大黃各五錢赤豆輕粉各三錢上為細末新汲水調搽纏腰火丹方用寶鈔一張燒化存性研為細末用米醋調稀雞翎蘸塗患上一日三次即愈忌食發物如