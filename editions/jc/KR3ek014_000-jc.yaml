body:
  text: 自序歷下李滄溟先生嘗謂醫之別內外也治外較難於治內何者內之症或不及其外外之症則必根於其內也此而不得其方膚俞之疾亦膏肓之莫救矣乃今古治外者豈少良法神術哉或緣禁忌而秘於傳或又蹈襲久而傳之訛即無所訛而其法術未該其全百千萬症局於數方以之療常症且不免束手設以異症當之則病者其何冀焉余少日即研精此業內主以活人心而外悉諸刀圭之法歷四十餘年心習方目習症或常或異輒應手而愈雖徼及岐黃之靈肉骨而生死不無小補於人間自叩之靈臺則其思慮垂竭矣既念余不過方技中一人耳此業終吾之身施亦有限人之好善誰不如我可不一廣其傳而僅韜之肘後乎於是賈其餘力合外科諸症分門逐類統以論系以歌淆以法則微至疥癬亦所不遺而論之下從以注見陰陽虛實之元委也方之下括以四語見君臣佐使之調停也圖形之後又綴以瘡名十律見病不可猜藥石之不可亂投也他若針灸若炮煉若五戒十要造孽報病之說不啻詳哉其言之也余心其益熯矣集既成付之梓名曰外科正宗既而攬鏡自照須鬢已白歷下所云治外較難於治內庶幾識余之苦心哉里中顧比部諸君似亦嘉余之有裨於世各褒以言而弁其端余則惶悚遜謝曰韓伯休名根未剗耶第諸君且褒余余敢不益廣諸君意謹唯命而以是公之養生家前萬曆丁巳之秋七月既望東海陳實功謹識
