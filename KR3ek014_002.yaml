味丸人參養榮湯見潰瘍門珍珠散下疳門冰螄散瘰癧門脫疽論第十八夫脫疽者外腐而內壞也此因平昔厚味膏粱熏蒸臟腑丹石補藥消爍腎水房勞過度氣竭精傷多致陽精煽惑淫火猖狂其蘊蓄於臟腑者終成燥熱火症其毒積於骨髓者終為疽毒陰瘡誠為巧人行拙誰防禍起蕭牆智者多愚自謂喜從天降不顧後日也骨枯髓涸臟敗腑亡方知今日罹殃有故解脫無方凡患此者多生於手足故手足乃五臟枝幹瘡之初生形如粟米頭便一點黃泡其皮猶如煮熟紅棗黑氣侵漫相傳五指傳遍上至腳面其疼如湯潑火燃其形則骨枯筋練其穢異香難解其命仙方難活故謂血死心敗筋死肝敗肉死脾敗皮死肺敗骨死腎敗此五敗者雖有靈丹竟喪命而已是生此疾者死生付於度外孫真人曰在肉則割在指則切即此病也治之得早乘其未及延散時用頭髮十餘根纏患指本節盡處繞扎十餘轉漸漸緊之毋得毒氣攻延良肉隨用蟾酥餅放原起粟米頭上加艾灸至肉枯瘡死為度次日本指盡黑方用利刀尋至本節縫中將患指徐順取下血流不住用金刀如聖散止之余腫以妙貼散敷之次日倘有黑氣未盡單用蟾酥錠研末摻之膏蓋黑氣自退患上生膿照常法用玉紅膏等藥生肉護骨完口此為吉兆內服滋腎水養氣血健脾安神之劑若內無變症外無混雜此十中可保其三四矣若割取之後黑色仍漫痛腫尤甚敗惡無膿口乾舌硬精神不爽食不知味者終死凡治此不可一己醫治必與高明衆議聽患者願情割取況此症首尾吉凶變駁難定故不可輕易用之又有形似而來非穴真而受異詳注在後宜參觀之脫疽看法起瘡不渴口潤舌和性志尋常無妄暴急循禮為吉初出形如麻子焮熱作痛一指皆腫根腳收束者吉已成頭便作腐肉不紫黑疼痛有時膿出腫消者吉已潰先膿後腐肉色紅活毒不走散氣不腥穢者吉未瘡先渴喜冷無度昏睡舌乾小便頻數陽痿者逆初起形如粟米肉便紫色不腫刺疼黑氣延散者逆已成瘡形枯癟肉黑皮焦痛如刀剜毒傳好指者逆已潰肉枯筋腐血水臭汗疼苦應心零仃徹骨者逆脫疽治法脫疽多生足指少生手指初起水窠黃泡者即灸之初生如粟里可容谷皮色紫赤不作焮腫發扎仍灸已灸之後瘡受火氣發泡作膿外藥箍之內兼補托毒勢已成瘡形稍陷但紫色未攻腳面者評議割取既割取之後血水淋漓疼痛不減和氣血補脾胃已成飲食減少身體倦怠便數口乾滋津液壯腎水破後氣血受傷脾胃虛弱自汗盜汗噁心乾嘔睡臥不寧日晡發熱疼痛苦楚煩悶譫妄俱宜大補氣血富貴及膏粱素叨色欲每淤房術縱恣日久禁止割法脫疽治驗一男子年近五旬右足小指初生如粟米漸成白泡三日始痛請治頭已腐爛一指紫腫此脫疽也隨用艾火明灸十三壯始大痛乃止又用針刺灸頂以蟾酥餅貼灸上膏蓋本指腫上用披針擊刺七八處發泄毒血用蟾酥錠磨濃塗之腫外以真君妙貼散敷護良肉庶不外侵其時患者脈數身發寒熱噁心體倦先用人參敗毒散解其表症次用黃連內疏湯通其大便而噁心煩熱亦止又以托裡消毒散加金銀花牛膝數服早以八味丸晚用蠟礬丸相兼服之喜其火疏毒氣隨又針刺並泄其毒故不變作解毒為膿腫方不散後用十全大補湯加山萸五味麥冬等藥調理月餘而愈此疽若不針灸發泄毒氣專假藥力敷圍再加峻藥攻利必致傷其元氣豈能保固毒不侵犯得安之理一客商右足次指生一紫泡癢痛異常次日指甲俱紫欲黑視之乃肝腎二經之毒彼曰何別也豫曰甲乃肝之餘氣甲紫則肝受毒也骨乃腎之餘腎傷則骨黑此理甚明彼又曰何以致之豫曰凡人勞疲筋力傷於肝誤服熱藥傷於腎傍者曰情實有此因彼久居客旅交結私妓情懷最密極力承奉旦夜並服興陽細丸期許常至立交戲謔有此二年矣前言正中其病此勞力熱藥傷腎傷筋之實也其病尤險欲辭不治彼哀告客途欲得生返再三求治豫又斟酌先取妓者頂發十餘根拈線纏扎患指盡處隨將艾炷安於所扎上面紫色處排勻三處每灸七壯各放蟾酥餅膏蓋次後脹痛相忍不捨解去扎發過夜一指皆黑相量筋骨皮肉俱死仍用利刀順節取脫患指乃冰冷惡物預煎甘草湯浸洗良久候瘀血稍盡以止血散摻之次日灸上紫色不退恐其上延又以神燈照法照之候血散皮皺旋合蟾酥丸料多加海羊研爛敷之早晚二次腫不復作紫色變紅紅色潰膿外用生肌止痛活血收斂之藥又熬參朮地黃膏朝服接補真元午服健脾藥以回胃氣晚用金液丹以解藥毒如此調理三月而愈一婦人中年肥胖生渴三載右手食指麻癢月餘後節間生一小泡隨後本指漸腫疼脹不堪視之原泡處已生黑斑半指已變紫黑此亢陽之極乃成脫疽診之脈洪大數而有力此與肥人相反如再黑色上延壞人迅速詢問此婦先居富室無嗣每縱膏粱架烘爐炭又兼多服種子熱藥中年喪夫家業盡被嗣人侵費致久懷憂鬱後與寡母同棲身耽寂寞此先富後貧所願不得又為失榮症也辭不可治彼婦母子再三哀懇豫亦無之奈何乃遵孫真人治法在肉則割在指則切此外無他彼願從之先用人參養榮湯隨用軟絹條尺許纏裹黑色盡處好肉節上以漸收緊扎之庶不通行血絡次用利刀放準依節切下將手隨浸甘草溫湯中片時其血不大多其疼亦不大甚患者曰惟心之懼不知而下以神力之佑也豫曰所嫌者切而不痛此為氣血筋骨俱死此物雖脫其症未可得愈每以八味丸料加人參麥冬大劑煎服先救腎水次扶脾胃間用金液戊土丹以解藥毒後三日所扎指上漸漸放鬆以通血脈搽貼紅黑二膏生肉止痛次後手背手掌日漸發腫勢惡之甚惟不黑色此內毒已出之故仍用神燈照法兼以豬蹄湯淋洗後又腫上皆出數頭流出膿血不許其許兩月外方得原腫稍退膿穢稍減又以參朮膏人參養榮湯兼服半年外方妥此婦雖活五指失矣一男僕冬月嚴寒主使赤腳履地不敢移隨後血冰麻木次日十指俱紫又數日全變黑色麻木不痛請視之強用辛熱散寒活血熏洗等藥終至不應後必十指齊脫又延黑腳面骨節一段甚作疼痛彼主恐脫疽也豫曰似是而來非後必不妨令患者常用桑木火灸之取其溫暖活血又能解散郁毒其患漸腐漸脫自不走散內服健脾養血之藥調理外用生肌紅黑二膏培長肌肉百日外愈矣一侍女年十二歲容貌頗通新主嫌其腳大用腳布任意纏緊以線密縫其腳脹痛不堪訴主不聽至半月後流出臭水方解視之其雙足前半段盡皆黑腐請視之骨肉已死豫曰此已壞者不能復活只救將來未壞者可也先煮參粥食之次煎蔥湯令彼家侍婦將患足浸入湯內淋洗再換湯浸但腐肉不痛者逐一剪割連續知痛者又以花蕊石散搽之保將患者復其生已壞者得其脫內服補中益氣湯接其勞外搽生肌玉紅膏長其肉後雖得愈但二者俱致疲疾終身此為穴真而受異也一男人右足小指縫中初生一點黃粟泡皮肉隨變紫色陰疼不腫常如刀刺視其形色真脫疽也診其脈又得細數無力此腎經傷敗症也但患者生平大飲內有正副三人此必精力已竭縱治無功豫強辭之後必延至腳面足底皆穿痛徹不已又飲食日少氣血日衰形體日削兩月後百苦而終脫疽主治方解毒濟生湯解毒濟生湯草芎花粉柴芩歸茯苓知柏紅花並遠志犀角升麻牛膝同治脫疽初起惡寒體倦發熱作渴或腫或紫或麻或痛四肢倦怠心志恍惚不寧者並宜服之川芎當歸黃柏知母天花粉金銀花麥門冬遠志柴胡黃芩犀角茯神各一錢甘草紅花升麻手指加牛膝足趾加各五分水二鍾煎八分臨服入童便一杯隨病上下服陰陽二氣丹陰陽二氣麥天冬片柏玄參青黛同澤瀉辰砂礬五味人參甘草解煩癃治脫疽久服丹石補藥致虧腎水多成口燥咽乾至飲冰雪不知其冷此孤陽獨旺宜服此解天門冬搗膏麥門冬搗膏五味子砂研黃柏人中白小兒溺者生用研玄參湯泡去粗皮搗膏各一兩青黛色嬌嫩者甘草枯礬辰砂為衣澤瀉各三錢冰片一錢各為細末同玄參二冬膏子加煉蜜少許再搗千餘下軟硬得中丸如桐子大每服六十丸童便乳汁各一鍾空心送下安睡一時其功如神清神散清神散內用硃砂豆粉梅花冰片佳解毒共於甘草節諸瘡煩嘔自無他治脫疽疔瘡發背毒積甚者腠理髮越不盡多致煩躁悶亂睡則譫言嘔吐不食者並宜服之甘草節五錢真豆粉一兩大硃砂三錢梅花片五分牛黃三分上為細末每服一錢淡竹葉燈心湯調服雌雄霹靂火雌雄霹靂火純陽蘄艾雙黃丁麝香陰毒陰疽陰發背逢之一灸自回陽治脫疽及一切發背初起不疼痛者並宜灸之艾茸二錢丁香雌黃雄黃各二分麝香一錢上下四味共研極細搓入艾中作安豆大丸放於患上灸之毋論痛癢以肉焦為度如毒已經走散就紅暈盡處排炷灸之痛則至癢癢則至痛為妙灸後仍用提疔麥子貼上膏蓋次服蟾酥丸及解毒濟生湯兼治轉回活色有膿為妙金液戊土丹金液戊土丹五味牛黃神志石菖蒲砂雄硝石烏梅等片射人中黃不殊治脫疽及疔瘡發背縱食膏粱厚味法酒又或丹石補藥勉力房勞多致積毒臟腑久則胃汁中干腎水枯竭不能上制心火以致消渴消中消腎饒飲多幹能食多瘦九竅不通驚悸健忘此症若出後必發疽多難治療宜預服此亦可轉重就輕移深就淺又解五金八石之毒藥也人中黃法在末卷烏梅肉茯神胡黃連五味子各一兩石菖蒲辰砂雄黃遠志硝石各三錢牛黃冰片各一錢金箔二十張為衣各為淨末配準前數共入乳鉢內再研小轉於端午七夕或二至二分吉辰在淨室中先將烏梅地黃二膏搗極爛和藥漸加煉蜜少許徐徐添搗軟硬得中每藥一兩分作十丸金箔為衣每服一丸用人乳童便共一大杯化藥隨病上下食前後服之此藥最解膏粱金石藥毒殺三尸除勞熱極有奇功又治煩顛主安神志闢瘴闢瘟及諸邪魅譫語妄情失心喪志者俱效此藥用蠟封固收藏不泄藥味愈久愈效脫疽應用方針刺法蠟礬丸蟾酥餅蟾酥丸見疔瘡門神燈照法太乙膏真君妙貼散內疏黃連湯豬蹄湯玉紅膏托裡消毒散見腫瘍門十全大補湯參朮地黃膏人參養榮湯補中益氣湯加減八味丸見潰瘍門桑木灸法見腦疽門人參敗毒散見時毒門花蕊石散見金瘡門瘰癧論第十九夫瘰癧者有風毒熱毒氣毒之異又有瘰癧筋癧痰癧之殊風毒者外受風寒搏於經絡其患先寒後熱結核浮腫熱毒者天時亢熱暑中三陽或內食膏粱厚味釀結成患色紅微熱結核堅腫氣毒者四時殺厲之氣感冒而成其患耳項胸腋驟成腫塊令人寒熱頭痃項強作痛瘰癧者纍纍如貫珠連接三五枚此不足寒熱其患得於誤食蟲蟻鼠殘不潔之物又或汗液宿茶陳水混入而餐其患先小後大初不覺疼久方知痛筋癧者憂愁思慮暴怒傷肝蓋肝主筋故令筋縮結蓄成核生於項側筋間形如棋子堅硬大小不一或陷或突久則虛羸多生寒熱勞怒則甚痰癧者飲食冷熱不調飢飽喜怒不常多致脾氣不能傳運遂成痰結初起如梅如李生及遍身久則微紅後必潰破易於收斂凡觀此症別其風毒者散其風除其濕如防風解毒湯之類是也熱毒者清其脾瀉其熱連翹消毒飲之類是也氣毒者調其血和其氣藿香正氣散之類是也瘰癧者散其堅和其血散腫潰堅湯之類是也筋癧者清其肝解其鬱柴胡清肝湯之類是也痰癧者豁其痰行其氣芩連二陳湯之類是也又有寡婦尼僧鰥夫庶妾志不得發思不得遂積想在心過傷精力此勞中所得者往往有之最為難治有此先養心血次開鬱結益腎安神疏肝快膈如歸脾湯益氣養榮湯俱加香附青皮山梔貝母木香之類是也又男人不宜太陽青筋潮熱咳嗽自汗盜汗女人又忌眼內紅絲經閉骨蒸五心煩熱男婦有此後必變為癆瘵難治之症但此體實者初起可服散腫潰堅攻利之藥得效者十中三四有不察虛實盡劑追伐損傷元氣致成壞病者十有八九此非患者之命自出醫人之手豫常治初起成核服前藥未效者用針刺核內深入三四分用冰螄散拈成條子插入核內糊紙封上待至二七後核子自然落出隨用紅黑二膏搽貼內服補劑不久便愈又常見斑蝥牽牛巴霜大黃追蝕等用往往致其危亡者多矣切宜戒之瘰癧看法初起核高腫痛色紅軟活微作寒熱肩項不強者易已成根不堅硬內無小核相叢脾健氣血不衰者易已潰膿稠肉色紅活核腫漸消肩項自便漸斂者順潰後易消易斂氣體平和胸膈寬利飲食知味者順未成形體消瘦寒熱往來結核頑硬痰嗽相兼者險已成核堅連續如珠大小不等項強筋急脈虛者險已潰膿水清稀肌肉消鑠自汗盜汗寒熱不睡者逆潰後陰虛煩躁作渴泄祕男子骨蒸女人經閉俱逆瘰癧治法初起腫痛憎寒壯熱四肢拘急項強頭痃者表散之腫硬發熱便祕口乾胸膈不利噁心脈實者宜利之膏粱厚味醇酒積熱濕痰凝結而成化痰降火清中憂思過度鬱怒傷肝筋縮結核者宜養血開鬱疏肝房欲勞傷陰虛晡熱自汗咳嗽形消瘦者滋腎健脾失利忘名懷抱鬱結積想在心所如不得乖隔陰陽虛嗷歲月所得此者精血俱傷先養正氣次治標病堅而不潰腐而潰之潰而不斂補而斂之皆活法也瘰癧治驗一男人項核腫痛拘急惡寒用荊防敗毒散二劑表症悉退余核不消用散腫潰堅湯加川芎香附貝母十餘服其核漸消外以琥珀膏貼之月餘而安一男人仲冬渡江暴發霧氣又值驚恐次日寒熱交作頭面耳項俱腫先以藿香正氣散二服寒熱亦止面腫漸消惟項間堅腫不退紅焮作痛此毒聚必欲作膿仍用正氣散加芎歸皂刺數服候膿熟針之腫痛頓退又以十全大補湯脾健肌生完口一婦人孀居六載子幼未立憂鬱成核半年又兼經水不調寒熱交作形體消瘦脈亦弦數此勞傷氣血肝火妄動而成斯疾也所謂損者益之不可用追蝕之藥損而復損先用逍遙散加香附牡丹皮貝母和其血脈和其肝氣使寒熱盡退次用益氣養榮湯服至月餘氣血漸復經事漸調元氣漸醒外用火針核上點破四孔用黃線藥插入五六次候至孔大換用冰螄散搽於核上封之至十三日外其核自落外搽紅膏生肌收斂內換人參養榮湯加香附木香三十餘服其口自完此婦慎起居回七情戒口味盡調理故可得愈否則必不能矣一室女年十七因父擇壻不遂耽至二旬懷抱日久項生數核堅硬如石此肝經凝結筋縮之病也又兼經水斷絶寒熱如瘧咳嗽脈數惟不顴紅此陰虛火動已成癆瘵症也非藥能愈視其形狀喜無敗色豫曰欲治此病先治其心猶可父問曰何藥治心豫曰非藥也易云天地氤氳萬物化醇男女媾精萬物化生此天地男女生成化育之道也斯病獨起於孤陰寡陽不生不化所謂逆理之病此女大失配謂當至而不至漸成失度之疾其病不生而自生非己作也由時變也故藥不能挽回必得陰陽和而雨澤降夫婦和而家道成斯時之後用藥方可彼父始悟隨即擇嫁三月後復請視之前症稍定先用逍遙散加香附青皮山梔丹皮貝母十餘劑開鬱疏肝寒熱漸止次以人參養榮湯加丹皮紅花通其血脈使心血易生容顏稍澤又用益氣養榮湯倍參術培助脾胃增進飲食間用歸脾湯加麥冬五味遠志沙參收斂神氣寬慰性情又制參朮地黃膏服至半年精神頓復經事亦通惟核不能全退用火針點破一核琥珀膏貼之漸腐為膿又兩月而得收斂余腫三核漸針漸潰漸斂首尾純用補脾開鬱藥調理一年始得全愈一男子年近三十項生數核面白神勞皮粗脈數此元氣受傷之症也先當補養氣血待根本壯實後治其瘡隨用養榮健脾藥十餘劑未效彼以為緩又信方士所惑圖內消之自服斑蝥巴麝之藥連瀉十數行後致小便淋漓不已虛熱更增飲食減少又復請視形色內敗不堪調理辭而不治彼後方悔雖請內醫強投扶助降火之藥終不應而死一婦壯年性急夫蕩不為家左項生核半載漸至雞卵大堅硬如石皮外紅絲纏繞左右脈俱弦數弦屬肝火妄動數乃脾熱之甚先用梔子清肝湯平伐肝木五服後而脈始平又以清肝解鬱湯數服散其鬱結次用益氣養榮湯調其氣血間服散腫潰堅湯軟其堅腫外以琥珀膏貼之調理百日而元氣乃復堅硬已消八九止存小核未盡彼以為愈止不服藥後又一載值夫賭訟未勝暴急驚恐前腫復作兩手脈診細而多數此陰血虧損陽火乘之非前有餘症也又兼胸膈不利飲食無味經水先期過多形容憔悴不澤此神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮稿志傷於暴怒則腰脊不能俯仰以上俱七情內損症也法當滋養氣血調和脾胃益腎清心開鬱散滯庶保無虞彼不肯信仍前欲服散腫潰堅之藥欲灸腫上圖內消之豫曰此非前比今則不敢治也請客醫自制前藥亦灸患上並灸肘尖此為真氣虛而益虛邪氣實而益實後果反加發熱自汗咳嗽項強四肢不收灸瘡無膿血水不絶腫亦熾盛此臟腑已損之候必不久居也又月餘傳為氣急聲啞痰血交出而歿豫嘗見庸醫不辨虛實患家不信正理偏費服藥往往多致不救者十有八九凡醫者患者俱當省而慎戒之瘰癧主治方防風解毒湯防風解毒湯荊桔牛子連翹草石膏薄荷枳殼芎蒼朮知母燈心共豈逃治風毒瘰癧寒暑不調勞傷湊襲多致手足少陽分耳項結腫或外寒內熱痰凝氣滯者並效防風荊芥桔梗牛蒡子連翹甘草石膏薄荷枳殼川芎蒼朮知母各一錢水二鍾燈心二十根煎八分食後服連翹消毒飲