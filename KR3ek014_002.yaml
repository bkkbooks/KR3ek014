堅核不消及服消藥不效者用此點落癧核如馬刀根大面小及失榮等症忌用大田螺五枚去殼日中線穿曬乾白砒一錢二分麵裹煨熟冰片一分硇砂二分用曬乾螺肉切片同煨熟白砒碾為細末加硇片再碾小罐密收凡用時先用艾炷灸核上七壯次後灸瘡起泡以小針挑破將前藥一二釐津唾調成餅貼灸頂上用綿紙以厚糊封貼核上勿動泄氣七日後四邊裂縫再七日其核自落換搽玉紅膏內服補藥兼助完口此藥又治癭瘤患大蒂小及諸般高突異形難狀者並效紫霞膏紫霞膏品不多般銅緑松香一處攢煎入麻油如紫漆百般頑症貼當安治瘰癧初起未成者貼之自消已成未潰者貼之自潰已潰核存者貼之自脫及治諸色頑瘡臁瘡濕痰濕氣新久棒瘡疼痛不已者並用之明淨松香淨末一斤銅緑淨末二兩用麻油四兩銅鍋內先熬數滾滴水不散方下松香熬化次下銅緑熬至白煙將盡其膏已成候片時傾入瓷罐凡用時湯內頓化旋攤旋貼琥珀膏琥珀膏內桂防歸松脂硃砂木鱉隨丁木二香萆麻子木通白芷共相宜治瘰癧及腋下初如梅子結腫硬強漸若連珠不消不潰或潰膿水不絶經久不瘥漸成漏症琥珀一兩木通桂心當歸白芷防風松脂硃砂木鱉肉萆麻肉各五錢丁香木香各三錢麻油二斤二兩黃丹飛炒十四兩先用琥珀丁香桂心硃砂木香為細末其餘為咀浸油內七日入鍋內慢火熬至群藥焦黃為度絹濾淨油徐下黃丹以柳枝手攪候至膏成滴入水中軟硬得中掇下鍋來以盆頓穩攪至煙盡方下群藥攪勻瓷器盛之臨取少許攤貼大紅膏大紅膏血衄銀硃硝石章冰味不殊輕粉南星並石礦乳香貓骨效堪塗治瘰癧痰核結塊不分新久但未穿破者並效南星二兩銀硃血衄硝石朝腦各三錢輕粉乳香各二錢貓頭骨一具煅石灰一兩用大黃三錢切片同炒石灰紅色去大黃上共為細末陳米醋熬稠調藥敷核三日一換敷後皮嫩微損者另換紫霞膏貼之其核自消火針法火針之法獨稱雄破核消痰立大功燈草桐油相協力當頭一點破凡籠治瘰癧痰核生於項間初起堅硬或如梅李結聚不散宜用此法針之插藥易消用縫衣大針二條將竹箸頭劈開以針雙夾縫內相離一分許用線扎定先將桐油一盞用燈草六七根油內排勻點著將針燒紅用手指將核捏起用針當頂刺入四五分核大者再針數孔亦妙核內或痰或血隨即流出候盡以膏蓋之次日針孔必漸作膿輕者用黃線藥插之核堅硬者用冰螄散糊打成條曬乾插核針孔內外以糊紙二重封固次日其核發腫作痛不妨乃藥氣攻入於內又至七日外自然核外裂開大縫再至七日其核自落蔥湯洗淨孔大換用玉紅膏搽入外以膏蓋內服益氣養榮湯或十全大補湯加香附兼戒勞動氣惱房事發物煎炒海腥等件三品一條槍三品一條槍最靈雄礬砒信少人聞加上乳香為線藥疔疽癧漏盡承平上品錠子去十八種痔中品錠子去五漏翻花癭瘤氣核下品錠子治瘰癧疔瘡發背腦疽等症此為古之三品錠子但藥同而分兩不同治病故有分別今注一條槍本方三品以下之症並皆用之俱各相應況又藥品簡易而不繁是曰三品一條槍之説也凡同志者隨試而用之明礬二兩白砒一兩五錢雄黃二錢四分乳香一錢二分砒礬二味共為細末入小罐內加炭火煅紅青煙已盡旋起白煙片時約上下紅徹住火取罐頓地上一宿取出約有砒礬淨末一兩加前雄黃二錢四分乳香一錢二分共研極細厚糊調稠搓成如線條陰乾凡遇前症有孔者紝入孔內無孔者先用針放孔竅早晚插藥二次插至三日後孔大者每插十餘條插至七日患孔藥條滿足方住以後所患四邊自然裂開大縫共至十四日前後其疔核瘰癧痔漏諸管自然落下隨用湯洗搽上玉紅膏虛者兼服健脾之藥瘰癧酒藥方治年久瘰癧結核串生滿項頑硬不穿破者服鶴風草半斤忍冬藤六兩野蓬蒿四兩野菊花四兩五爪龍三兩馬鞭草一兩五錢上藥切碎用老酒十五斤袋貯藥懸於酒內封口煮三香為度取起水頓浸一伏時初服盡醉出汗為效已後隨便應之其酒一料病愈不發瘰癧應用方玉紅膏太乙膏見腫瘍門柴胡清肝湯梔子清肝湯見鬢疽門荊防敗毒散見時毒門十全大補湯見潰瘍門歸脾湯見痔瘡門鬢疽論第二十夫鬢疽者乃手少陽三焦相火妄動又兼腎水不能生水或外受風熱所感但此經多氣少血肌肉相搏凡有患最難腐潰此皆起於情性急暴房欲血虛火動肝氣凝結而成疽之初起寒熱交作頭眩痛徹太陽甚則耳目連鬢通腫治法不可妄用針灸必分陰陽表裡邪正虛實治之庶不有誤且如初見瘡時多寒少熱口乾作渴好飲熱湯六脈虛數無力又兼患上堅硬多不焮痛無潰無膿瘡根流散此等之症乃真氣虛而邪氣實也治以托裡為主消毒佐之如清肝養血湯托裡消毒散之類是也又如見症時熱多寒少頭眩作痛口燥舌乾渴欲飲冷二便祕澀六脈沉實有力瘡亦焮腫疼痛身體發熱易腐易膿根腳不開腫焮在外此乃正氣實而邪氣虛也治以消毒為主托裡佐之如梔子清肝湯鼠黏子湯之類是也大抵正氣勝則實邪氣勝則虛必然一勝則一負邪正不並立欲其虛而不待損而自虛矣又有未見瘡時先作渴症或一年半載日久日重然後發為鬢疽其形色多紫黑瘡多平陷堅硬無膿毒流耳項又兼氣味不正形容不澤精神不明飲食不進者俱為不治鬢疽看法初起無口乾無寒熱飲食有味舉止尋常發瘡者順已成瘡頭腫起根腳不散形色紅活焮痛潰膿者順已潰膿稠色鮮紅活腫消痛止項便頭輕口和者順潰後瘀肉易腐新肉易生瘡口易平飲食有味者順初起瘡頭如粟頂軟不高色紫根散木痛食少者逆已成瘡形紫黑軟陷無膿足冷身涼便利脈虛者逆已潰膿水清稀多生臭穢壞肉不腐新肉不生者逆潰後飲食饜餐身體發熱口乾不眠肉削皮粗者逆鬢疽治法初起焮腫堅硬內熱口乾脈數有力邪實也當利之已成憎寒壯熱四肢拘急脈浮者邪在表也宜散之赤腫作痛血凝滯也散血清肝色黯漫腫升陽助胃已潰堅腫不退脈細而數日晡發熱者宜滋陰健脾肝膽怒火上攻心煩作躁腮顴紅熱者宜抑陰降火已潰膿清腫痛尤甚虛煩食少者宜養氣血健脾胃潰後氣血俱虛身涼脈細大便多溏者宜峻補溫中潰後不斂新肉生遲瘡口淡白膿水不止健中補脾鬢疽治驗一男子患此三日焮腫寒熱脈浮數以荊防敗毒散一劑表症悉退腫痛仍作已欲作膿以托裡消毒散膿潰又以益氣養榮湯加麥冬五味漸斂而愈一男子患此五日頂高根若錢大形色紅活此肝經濕熱為患用麻子大艾灸七壯以梔子清肝湯二服腫勢稍止以蟾酥餅膏貼灸上更以柴胡清肝湯加白芷黃耆天花粉數服膿潰腫消半月收斂一男子渴疾三年寒熱半月自以為瘧鬢間忽生一小瘡三四日外形如粟瘡平堅硬色暗不澤又兼脈洪數而無力此水竭火旺之症也終難潰斂辭不敢治復請醫視為易治用針刺腫上去紫血鍾許內服解毒藥次日邊傍愈腫醫者謂腫高屬陽易治彼家歡悅又三日腮項俱腫口噤不食用針又刺腫上日加昏憒又復請視豫曰死將及矣但此症未病先作渴腎水已竭外形如粟里可容谷形色紫黑氣敗血衰脈洪無力元氣內敗如此干涉豈有不死者彼家方信晚矣共二十一日而歿一男子腫焮五六日彼欲內消外敷涼藥內服大黃泄氣等劑隨後焮腫雖退乃生寒熱噁心乾嘔肩膊牽強診之脈數無力此內虛毒氣入里涼藥之過也東垣云瘡疽之發受之有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒藥攻利損傷脾胃多致內虛故外毒乘虛入里受之內者法當疏利以寒劑反用溫劑托裡初病則是骨髓之毒誤用溫劑使毒上徹皮毛表裡通潰共為一瘡助邪為毒苦楚百倍輕則變重重則死矣前症既出寒藥之過以托裡健中湯二服嘔吐全止又以十全大補湯加白芷數服而原瘡漸起又以人參養榮湯間服腐潰膿稠兩月餘瘡口收斂一婦人患此腫硬寒熱口乾焮痛脈洪大有力此表裡俱實也以防風通聖散一劑行二次前症稍退又一劑大行數次熱退渴止惟原瘡腫硬用銀針點破插入蟾酥條內服托裡消毒散漸潰膿而安一男子患此三四日頂高根活且無表裡之症此肝經濕熱為患用針挑破瘡頂以蟾酥餅蓋貼內服加味逍遙散加皂角針數服頭出微膿根腫亦消鬢疽主治方柴胡清肝湯柴胡清肝芎芍歸黃芩梔子地黃隨防風牛子天花粉甘草連翹一處宜治鬢疽初起未成者毋論陰陽表裡俱可服之川芎當歸白芍生地黃柴胡黃芩山梔天花粉防風牛蒡子連翹甘草節各一錢水二鍾煎八分食遠服鼠黏子湯鼠黏子湯甘桔歸赤芍連翹地骨皮玄參麥冬天花粉防風大黃不可遺治鬢疽初起熱多寒少頭眩作痛口燥咽乾渴常飲冷二便祕澀六脈沉實有力煩悶疼痛者鼠黏子桔梗當歸甘草梢赤芍連翹玄參地骨皮防風天花粉木通各一錢大黃炒二錢水二鍾煎八分食前服渣再煎服加味逍遙散加味逍遙白朮苓紅花丹芍柴胡陳當歸梔貝天花粉甘草羚羊效更奇治鬢疽七日以上根盤深硬色紫焮痛者宜服白朮茯苓牡丹皮白芍柴胡陳皮當歸山梔貝母天花粉各八分甘草紅花羚羊角各五分水二鍾淡竹葉二十片煎八分食後服梔子清肝湯梔子清肝湯牛子柴苓芎芍石當歸黃連甘草丹皮等用水同煎一處煨治少陽經虛肝火風熱上攻遂成鬢疽痛連頸項胸乳太陽等處或寒熱晡甚胸滿口苦舌乾牛蒡子柴胡川芎白芍石膏當歸山梔牡丹皮各一錢黃芩黃連甘草各五分水二鍾煎八分食後服清肝解鬱湯清肝解鬱湯歸芍苓朮梔柴貝母隨人參半夏丹皮附川芎熟地草陳皮治暴怒傷肝憂思鬱結致肝火妄動發為鬢疽頭眩痛徹太陽胸膈痞連兩脅嘔酸水皆服之當歸白芍茯苓白朮貝母熟地山梔各一錢半夏人參柴胡丹皮陳皮香附川芎各六分甘草四分水二鍾薑三片煎八分食遠服參苓內托散參苓內托散歸耆芎芍陳皮白朮隨山藥熟地並官桂附子甘丹地骨皮治鬢疽已成堅而不潰潰而不斂氣血俱虛身涼脈細飲食少思口淡無味及形體消瘦者服歸身黃耆川芎白芍陳皮白朮山藥熟地茯苓人參各一錢甘草肉桂熟附子牡丹皮地骨皮各五分薑三片棗二枚水二鍾煎八分食遠服保安萬靈丹見癰疽門治鬢疽初起憎寒壯熱頭眩噁心四肢拘急者鬢疽應用方托裡消毒散見腫瘍門荊防敗毒散見時毒門蟾酥餅子見疔瘡門人參養榮湯托裡建中湯益氣養榮湯十全大補湯俱見癰疽潰瘍門防風通聖散見時毒門咽喉論第二十一夫咽喉雖屬於肺然所致有不同者自有虛火實火之分緊喉慢喉之説又咽為心肺肝腎呼吸之門飲食聲音吐納之道此關係一身害人迅速故曰走馬看咽喉不待少頃也假如虛火者色淡微腫脈亦細微小便清白大便自利此因思慮過多中氣不足脾氣不能中護虛火易至上炎此恙先從咽嗌乾燥飲食妨礙咳吐痰涎呼吸不利斑生苔蘚壘若蝦皮有如茅草常刺喉中又如硬物嗌於咽下嘔吐酸水噦出甜涎甚則舌上白胎唇生礬色聲音雌啞喘急多痰以上等症皆出於虛火元氣不足中來治此不可誤投涼藥上午痛者屬氣虛補中益氣湯加麥冬五味子牛子玄參午後痛者屬陰虛四物湯加黃柏知母桔梗玄參如服不效者必加薑附以為引導之用亦為佐治之法也實火者過飲醇酒縱食膏粱疊褥重衾餔餐辛烈多致熱積於中久則火動痰生發為咽腫甚者風痰上壅咽門閉塞少頃湯水不入聲音不出此為喉閉緊喉風是也用藥不及事先用針刺喉間發泄毒血隨用桐油餞雞翎探吐稠痰務使痰毒出盡咽門得松湯藥可入語聲得出乃止內服清咽利膈湯疏利餘毒如牙關緊閉難入必當先刺少商出血其閉自開如針刺探吐無痰聲如拽鋸鼻掀痰喘湯水不入語聲不出者真死候也又有喉癰喉痹乳蛾上齶癰等症其患雖腫而咽門半塞半開其病雖凶而喉道又寬又腫此皆標病雖重無妨當用金鎖匙吐出痰涎利膈湯推動積熱膿脹痛者開之損而痛者益之其患自安凡喉閉不刺血喉風不倒痰喉癰不放膿喉痹乳蛾不針烙此皆非法又有痰火勞瘦咳傷咽痛者無法可治咽喉看法初起紅色腫痛語聲清朗亦無表裡之症相兼者輕已成腫痛咽喉半閉半開咯吐痰涎飲食稍進者順咽喉腫閉牙關緊急言語不清痰壅氣急聲小者險咽喉驟閉痰涎壅塞口噤不開探吐不出聲喘者死時瘡之後毒結咽間腫痛腐爛吐納不堪聲啞者重久嗽痰火虛陽上攻咳傷咽痛但見聲嘶面紅者死咽喉治法初起腫痛寒熱交作頭眩拘急者邪在表也宜發散初起腫痛發熱脈有力而便祕者邪在內也宜下之腫痛寒熱口乾作渴脈洪大而有力者宜發表攻裡咽喉腫痛痰涎壅甚面紅口乾邪在上也宜探吐之喉閉痰涎壅塞氣急口噤難開先刺少商後行吐法已成脹痛咽喉塗塞湯水不入膿已成也宜急針之腫痛微紅脈虛無力午後痛者屬陰虛宜滋陰降火腫痛色白咯吐多涎上午痛者屬陽虛宜補中健脾咽喉治驗一男子咽喉腫痛發寒體倦脈弦有力此邪在表以荊防敗毒散加牛子玄參一劑表症已退腫痛仍作又以玄參解毒湯二劑腫痛減半又二劑而安一男子咽喉腫痛痰涎壅盛用金鎖匙先吐稠痰清咽利膈湯推蕩積熱腫痛稍減惟色紅甚此火熱也又以黃連解毒湯加桔梗二劑紅腫亦退而安一男子素飲火酒一時咽喉腫閉口噤舌強痰涎壅塞勢頗危急用針先刺少商二穴口噤方開以桐油餞雞翎探吐稠痰數碗語聲方出仍用針刺腫上出紫血鍾許溫湯漱淨冰硼散搽之以涼膈散加芒硝天花粉利去積熱又以連翹散二劑而安一婦人肥甚暑熱咽間腫痛痰涎上壅語聲不出甚危先用針刺毒血次以金鎖匙吐去稠痰五六碗以清咽利膈湯一服腫痛少減去硝黃又服而安一男子勞甚咽喉腫痛自服清咽利膈藥不應診之脈細而虛此勞傷虛火之症朝以補中益氣湯加麥冬五味子桔梗玄參晚以四物湯加黃柏知母炒黑乾薑服加童便不數日腫痛亦消疲回咽愈一婦人咽痛微腫色白吐咽不利診之脈亦細微此中氣不足虛火假症也用理中湯二服其疼頓止又以補中益氣湯加炒黃柏知母數服再不復作一男子腫痛日甚服清咽利膈藥不應必欲作膿以防風通聖散去硝黃二服喉膿脹痛而下針便愈咽喉主治方清咽利膈湯清咽利膈湯翹芩甘桔荊防梔薄銀大黃牛子黃連等朴硝加上再玄參治積熱咽喉腫痛痰涎壅盛及乳蛾喉痹喉癰重舌木舌或胸膈不利煩躁飲冷大便祕結等症連翹黃芩甘草桔梗荊芥防風山梔薄荷金銀花黃連牛蒡子玄參各一錢大黃朴硝各二錢水二鍾煎八分食遠服玄參解毒湯玄參解毒湯梔子甘草黃苓桔梗隨葛根生地並荊芥竹葉燈心共得宜治咽喉腫痛已經吐下飲食不利及余腫不消玄參山梔甘草黃芩桔梗葛根生地荊芥各一錢水二鍾淡竹葉燈心各二十件煎八分食後服連翹散連翹散內葛根芩赤芍山梔桔梗升門冬牛子並甘草木通加上效如神治積飲停痰蘊熱隔上以致咽喉腫痛胸膈不利咳吐痰涎舌乾口燥無表裡症相兼者服此連翹葛根黃芩赤芍山梔桔梗升麻麥門冬牛蒡子甘草木通各八分水二鍾竹葉二十片煎八分食遠服涼膈散涼膈散中荊芥防薄荷粉桔連大黃玄參石膏牛蒡子貝母山梔總在藏治咽喉腫痛痰涎壅甚膈間有火大便祕澀防風荊芥桔梗山梔玄參石膏薄荷黃連天花粉牛蒡子貝母大黃各等分水二鍾煎八分不拘時服金鎖匙金鎖匙中用焰硝薑蠶片腦雄黃饒加上硼砂效更高咽喉腫閉即時消治喉閉纏喉風痰涎壅塞口噤不開湯水不下焰硝一兩五錢硼砂五錢片腦一字白薑蠶一錢雄黃二錢各另研為末和勻以竹筒吹患處痰涎即出如痰雖出腫痛仍不消急針患處去惡血服前藥理中湯理中湯內藥四般甘草乾薑白朮攢加上人參仔細看虛陽之火立時安治中氣不足虛火上攻以致咽間乾燥作痛吐咽妨礙及脾胃不健食少作嘔肚腹陰疼等症人參一錢甘草炙八分乾薑炒黑五分白朮二錢水二鍾煎八分食遠服桐油餞桐油餞兮桐油餞治的喉風如神見探吐頑痰日照霜回生起死真堪羡治喉風喉閉其症先兩日胸膈氣急呼吸短促驀然咽喉腫痛手足厥冷氣閉不通頃刻不治先用溫湯半碗加入桐油三四匙摟勻用硬雞翎蘸油探入喉中連探四五次其痰壅出再探再吐以人蘇醒聲高為度後服清咽利膈之藥治喉烏龍散烏龍散只一品藥十八喉風總堪嚼開關利膈效如神虛火實火要斟酌歌曰十八喉風各有名原來總是一根因子孫代代宜珍惜誓不輕傳與世人用豬牙皂角七條去皮弦為粗末水一鍾煎五分入人乳三匙冷服即時非吐即瀉治咽喉腫痛痰涎壅盛喉風喉癰乳蛾等症並效惟纏喉風牙關緊閉者不可與恐痰上出而口不開壅塞無路而出故也除此皆效又久病咽痛忌用神效吹喉散神效吹喉散薄荷薑蠶青黛朴硝和白礬火硝黃連多加上硼砂病自瘥治纏喉風閉塞及乳蛾喉痹重舌木舌等症效薄荷薑蠶青黛朴硝白礬火硝黃連硼砂各五分上藥各為細末臘月初一日取雄豬膽七八個倒出膽汁用小半和上藥拌勻復灌膽殼以線扎頭膽外用青缸紙包裹將地掘一孔闊深一尺上用竹竿懸空橫吊上用板鋪用泥密蓋候至立春日取出挂風處陰乾去膽皮青紙瓷罐密收每藥一兩加冰片三分同研極細吹患上神效歌曰此法端的通神聖萬兩黃金方不傳少陰甘桔湯加味甘桔湯黃芩柴胡羌活玄參陳川芎升麻蔥白靈少陰咽痛即安寧治少陰咽痛頭眩脈沉細而身猶熱者宜服之桔梗二錢甘草一錢陳皮川芎黃芩柴胡玄參各六分羌活升麻各四分水二鍾蔥白一根煎八分不拘時服清音噙化丸清音噙朴丸訶子天麥歸苓黃柏參阿膠知母生熟地烏梅人乳犢牛津治肺氣受傷聲音雌啞或久咳嗽傷聲啞亦宜訶子真阿膠天門冬鹽水拌炒知母各五錢麥門冬去心白茯苓黃柏蜜炙當歸生地熟地各一兩人參三錢烏梅肉十五個人乳牛乳梨汁各一碗共熬稠膏共為細末和入前膏加煉蜜搗成丸如雞頭實大每用一丸仰臥噙化日用三丸如改作小丸每服一錢訶子煎湯或蘿蔔湯送下亦可取效治暴失音暴失音方豬板油再加白蜜兩相投慢火煎至稠膏住每日三匙不用憂公豬板油一斤入鍋先煉成油濾去渣入白蜜一斤再煉少頃絹濾淨瓷器內冷定成膏不時挑服一茶匙其音漸清無疾時亦可常服潤肺噙化丸噙化丸中用白礬硼砂牙皂共雄黃膽礬棗肉丸成就吐咽艱難第一方治梅核氣乃痰氣結於喉中咽之不下吐之不出如毛草常刺作癢新則吐酸妨礙久成閉塞膽礬硼砂明礬牙皂雄黃各等分為末紅棗煮爛取肉為丸芡實大空心噙化一丸溫黃酒一杯過口內服蘇子降氣湯蘇子降氣湯蘇子降氣湯厚朴陳皮半夏共前胡官桂相兼甘草用生薑為引效堪圖治虛陽上攻氣不升降致結患咽嗌痰涎壅塞蘇子一錢五分厚朴陳皮半夏前胡官桂各一錢甘草五分水二鍾薑三斤煎八分食遠服冰硼散冰硼散效實堪誇玄明粉再共硃砂硼砂冰片相兼佐咽喉口齒病無他治咽喉口齒新久腫痛及久嗽痰火咽啞作痛冰片五分硃砂六分玄明粉法注末卷硼砂各五錢共研極細末吹搽患上甚者日搽五六次最效咽喉應用方防風通聖散荊防敗毒散見時毒門補中益氣湯四物湯見癰疽潰瘍門黃連解毒湯見疔瘡門少商穴在手掌外側去爪甲角二分是穴稜針刺血時毒論第二十二夫時毒者天行時氣之病也春當溫而反寒夏當熱而反涼秋當涼而反熱冬宜寒而反溫此四時不正之氣感於人發成斯疾也自有陰陽表裡寒熱虛實分治初起與風寒相類惟頭面耳項發腫為真其患既得寒熱交作體強頭眩脈浮緊數者為邪在表以荊防敗毒散或萬靈丹發汗以散之如兩目鼻面漸次傳腫者乃正陽明受病其患焮腫發熱便祕口乾多熱少寒脈數有力為邪在裡五利大黃湯四順清涼飲下之又頭角兩耳前後結腫者乃手少陽經受之其患耳鳴筋痛寒熱嘔吐口苦咽乾煩躁時甚當以知母石膏湯小柴胡湯和之通用防風通聖散加牛子玄參解毒攻裡勞役凶荒沿門閭巷傳染者普濟消毒飲藿香正氣散以安之表裡俱解腫尚不消宜砭去惡血腫熱甚者如意金黃散敷之微熱不紅堅硬者沖和膏選而用之自後仍不消者必欲作膿宜托裡消毒散加白芷皂角針托之已潰體倦食少者補中益氣湯膿穢脾虛食而嘔吐者香砂六君子湯潰而不斂者十全大補湯又有毒中三陽自項之以上俱發腫者光如水色雙目合縫唇似豬形口角流涎腫不消潰聲音不出飲食不入咽喉腫閉牙關難開破流臭水穢氣連綿不絶者犯此俱為不治時毒看法初起寒熱交作頭面一處作腫紅赤發熱疼痛者易已成高腫發熱疼痛有時語聲清朗湯藥易入者輕已潰膿稠堅腫漸消疼痛漸減飲食漸進身溫者吉潰後膿水漸止腫退肌寬神彩精寧睡臥安穩者順初起多寒少熱頭面耳項俱腫光如水晶不熱者險已成漫腫無頭牙關緊閉湯水不入聲音不出者逆已潰膿水清稀氣味敗臭腫痛不除如尸發胖者死潰後臭水淋漓腫不知痛手足多冷常出譫語者死時毒治法寒熱交作頭眩體痛六脈浮緊邪在表也宜汗散之頭面赤腫作痛口燥咽乾大便祕實邪在裡也下之外有寒熱內亦口乾脈弦有力表裡俱實發表攻裡表裡俱解腫痛仍不消者乃瘀血凝滯宜砭去惡血砭血之後腫痛仍作不消者已欲作膿宜托膿健脾腫痛日多而脹痛者已有膿急針之更兼補托脾胃潰後腫痛不減膿清腥穢脾胃弱也更宜溫中健脾飢年時毒流行傳染者忌用攻發當和解宜養正氣時毒治驗一男子耳項腫痛發寒熱脈浮數以荊防敗毒散一劑寒退熱存又以連翹消毒飲一劑便行三次內熱頓退余腫不消本方去大黃加川芎數劑而愈一男子先發寒熱次日頭面俱腫又二日口噤湯水不入診之脈洪數而有力此表裡俱實也又咽喉妨礙湯藥難下先用針刺咽間去惡血鍾許牙關稍開以防風通聖散一劑徐徐服之便去三四次腫上砭去惡血以金黃散敷之次日腫勢稍退又以普濟消毒飲二劑面腫漸消惟兩耳下堅腫不退此必作膿又以托裡消毒散數服候膿熟而針之次以十全大補湯去肉桂加陳皮十餘劑而斂一男子牙根腫痛次傳腮項俱腫頓生寒熱此陽明濕熱上攻用荊防敗毒散加石膏一劑寒熱頓退惟腮腫不消以針刺牙根腫上出毒血以冰硼散搽之外敷真君妙貼散內服牛蒡子湯數服而愈一男子冬月耳面赤腫發熱口乾脈洪實而便祕此三陽蘊熱症也必舍時從症治之以五利大黃湯一劑便行二次赤腫稍退內熱稍疏又以升麻解毒湯二服腫亦消而病愈此為用寒遠寒之意也一婦人冬月面腫咽痛口噤難開脈診洪數有力又見房中暖氣如烘此因爐火盛也以黃連解毒湯加玄參一劑次日腫消咽利又用二劑其疾痊愈一男子勞甚鬢間腫硬肉色不變豫曰勞傷氣血濕痰凝滯之症與夫外感時毒不同又診脈細數而無力為內傷損病治當養氣血調經脈理勞續損治之彼欲內消自服仙方活命飲二服腫不覺消脾胃已損又請一醫乃行攻利復損臟腑數日後飲食不進便泄不止腫硬愈堅痰涎愈甚復請視之辭不可治豫曰凡療理病有主末治有權宜此病初起肉色不變者血不足也堅硬不熱者脾胃弱也脈細數而無力正氣衰也豈可用前有餘之藥以攻不足之病後又強投溫中補劑不應而死時毒主治方荊防敗毒散荊防敗毒散人參羌獨前柴芎桔梗茯苓枳殼同甘草寒甚加蔥共得名治時毒初起頭眩惡寒腮項腫痛脈浮者服之荊芥防風羌活獨活前胡柴胡川芎桔梗茯苓枳殼各一錢甘草人參各五分薑三片水二鍾煎八分食遠服寒甚加蔥三枝五利大黃湯五利大黃湯黃芩升麻梔子朴硝評時毒焮腫大便祕服之敢取即安寧治時毒焮腫赤痛煩渴便祕脈實有力者服之大黃煨黃芩升麻各二錢芒硝梔子各二錢三分水二鍾煎八分空心服未利者渣再煎服連翹消毒飲連翹消毒飲芎歸赤芍牛蒡薄荷隨黃芩花粉桔梗草枳殼升麻共所依治時毒表裡二症俱罷余腫不消疼痛不退者連翹川芎當歸赤芍藥牛蒡子薄荷黃芩天花粉甘草枳殼桔梗各一錢升麻五分水二鍾煎八分食後服便燥者加酒炒大黃防風通聖散防風通聖將軍芍薄荷芎歸草朴硝桔梗梔翹芩白朮荊芥麻黃滑石膏治時毒惡寒發熱煩躁口乾表裡脈症俱實者防風白芍薄荷川芎桔梗山梔黃芩白朮當歸連翹荊芥麻黃滑石石膏各一錢甘草五分芒硝一錢五分大黃酒炒二錢水二鍾煎八分空心溫服普濟消毒飲普濟消毒飲芩連玄草參陳牛子攢柴桔翹藍並馬勃升麻薑蠶共水煎治時毒疫癘初覺憎寒發熱肢體沉重次傳頭面作腫或咽喉不利舌乾口燥煩渴不寧者服黃芩黃連各二錢人參一錢陳皮去白玄參甘草柴胡桔梗炒各一錢五分連翹牛蒡子馬勃板藍根升麻薑蠶各五分水二鍾煎八分食後服如大便燥加酒煨大黃一錢或二錢以利為度腫勢甚者宜砭去惡血通氣散通氣散內用玄胡羊躑躅花與藜蘆川芎牙皂共為末捻於鼻內嚏無危治時毒焮腫疼痛咽喉不利語言不爽者用之玄胡索一錢五分川芎牙皂角各五分藜蘆三分羊躑躅花二錢五分為細末用紙拈蘸藥少許紝於鼻內取嚏為效托裡消毒散見腫瘍門治時毒表裡俱解腫尚不退欲其作膿者服之牛蒡子湯牛蒡子湯用葛根還將管仲共相呈江西豆豉同甘草煎嘗時毒可安寧治時毒熱甚腫痛脈浮數而無力者宜服之葛根管仲甘草江西豆鼓牛蒡子半生半熟研各二錢水二鍾煎八分食後服十全大補湯見潰瘍門治時毒潰後膿水清稀形容消瘦脾胃虛弱飲食減少虛熱不睡自汗盜汗及不收斂者服之時毒應用方金黃散見腫瘍門黃連解毒湯見疔瘡門冰硼散見咽喉門升麻解毒湯見楊梅瘡門真君妙貼散見腫瘍門癭瘤論第二十三夫人生癭瘤之症非陰陽正氣結腫乃五臟瘀血濁氣痰滯而成癭者陽也色紅而高突或蒂小而下垂瘤者陰也色白而漫腫亦無癢痛人所不覺薛立齋分別甚詳肝統筋怒動肝火血燥筋攣曰筋瘤心主血暴急太甚火旺逼血沸騰覆被外邪所搏而腫曰血瘤脾主肌肉鬱結傷脾肌肉消薄土氣不行逆於肉裡而為腫曰肉瘤肺主氣勞傷元氣腠理不密外寒搏而為腫曰氣瘤腎主骨恣欲傷腎腎火鬱遏骨無榮養而為腫曰骨瘤豫曰筋瘤者堅而色紫壘壘青筋盤曲甚者結若蚯蚓治當清肝解鬱養血舒筋清肝蘆薈丸是也血瘤者微紫微紅軟硬間雜皮膚隱隱纏若紅絲擦破血流禁之不住治當養血涼血抑火滋陰安斂心神調和血脈芩連二母丸是也肉瘤者軟若綿硬似饅皮色不變不緊不寬終年只似復肝然治當理脾寬中疏通戊土開鬱行痰調理飲食加味歸脾丸是也氣瘤者軟而不堅皮色如故或消或長無熱無寒治當清肺氣調經脈理勞傷和榮衛通氣散堅丸是也骨瘤者形色紫黑堅硬如石疙瘩高起推之不移昂昂堅貼於骨治當補腎氣養血行瘀散腫破堅利竅調元腎氣丸是也此瘤之五名治瘤之五法惟在此也又觀立齋云筋骨呈露曰筋癭赤脈交結曰血癭皮色不變曰肉癭隨憂喜消長曰氣癭堅硬不可移曰石癭此癭之五名也通治癭瘤初起元氣實者海藻玉壺湯六軍丸久而元氣虛者琥珀黑龍丹十全流氣飲選服此藥自然縮小消磨切不可輕用針刀掘破出血不止多致立危久則膿血崩潰滲漏不已終致傷人又一種粉瘤紅粉色多生耳項前後亦有生於下體者全是痰氣凝結而成宜披針破去脂粉以三品一條槍插入數次以淨內膜自愈又一種黑砂瘤多生臀腿腫突大小不一以手攝起內有黑色是也亦用針刺內出黑砂有聲軟硬不一又一種發瘤多生耳後發下寸許軟小高突按之不痛亦針之粉發齊出又一種蛔蟲瘤生於脅下又一種疽瘤連生肩膊詳在後治驗中豫觀古又有蝨瘤矣但其形狀之異皆五臟濕熱邪火濁氣瘀血各感而成此非正病也以上數瘤皆親手治驗非謬也癭瘤看法初起紅色光亮微熱微痛根腳浮淺不堅實者為易已成紅赤高腫作熱焮痛頂破皮穿膿潰腫消者易已潰膿稠色鮮根腳縮小內肉漸生外皮漸緊者順潰後氣體平和飲食如故腫消痛止口平收斂者順初起肉色不變寒熱漸生根腳散漫時或陰痛者險已成堅硬如石舉動牽強咳嗽生痰皮寒食少者逆已潰無膿惟流血水腫不消痛不止脾氣衰弱者逆破後血水不止腫硬更增敗腐不脫啘氣噁心者死癭瘤治法初起自無表裡之症相兼但結成形者宜行散氣血已成無痛無癢或軟或硬色白者痰聚也行痰順氣已成色紅堅硬漸大微癢微疼者補腎氣活血散堅形如茄蒂瘤大下垂者用藥點其蒂茄落生肌收斂已破流膿不止瘤仍不消宜健脾胃為主佐以化堅已潰出血不常瘤口開泛者宜養血涼血佐以清肝潰後瘤腫漸消脾弱不能收斂者補腎氣兼助脾胃癭瘤治驗一男子臀瘤五年形如復瓢按之隱隱黑色此黑粉瘤也以針破之按出黑砂兼黑粉共約碗許用三品一條槍插入患內十餘日每次捺出黑膜其瘤漸消內服十全大補湯健脾胃養氣血月餘而斂一男子腮上生瘤半年形若復桃皮色不變按之微紅此粉瘤也針破之捺出脂粉插前藥半月而愈一義烏兵士肩膊上連生小瘤五枚三月餘漸發癢異狀以手捫之內則歙歙攻動豫視之內動果如蝦鞠此必有異蟲以針破其一枚先出紅水一匙少頃攻出黑嘴粉紅蟲一條形如蛆樣長六七分又破一枚依然如是其人漸覺昏暈此泄氣之過也余瘤停止服補中益氣湯數劑外以膏蓋又五六日患者方健漸漸破之仍以補藥十餘服而愈一婦人並一女子耳後髮際下一寸各生一瘤半年餘漸漸而大此乃粉瘤用針破之先出脂粉後出頭發數根長約二尺余齊根剪斷出血微許俱用插藥數日化出內膜而愈從此觀之知有發瘤也一婦人腰間生一肉瘤三年餘方漸微痛一日潰後出小蛔三條長約五寸置溫湯中遊動半時方息其時患者形體衰弱面黃肌瘦口乾發熱朝以八味丸午用人參養榮湯服至百日外元氣漸醒又百日其口方收豫意度之其蛔乃經絡氣血所化一婦人氣衝穴生瘤紅紫堅硬乃血瘤也請視之心肝二脈俱已洪數其患得之心氣鬱結肝氣受傷之故辭不可治後請京師明公醫治其時頭已穿潰雖強投補托化堅涼血等劑日潰日爛終至不應破經兩月一旦湧出紫血盆許隨即身亡後人問曰何以致此豫曰心脈洪數心火旺也肝脈弦數肝氣傷也火旺逼血妄行肝氣傷不能藏血後破之必出血不止多致危亡預辭不治者此意也癭瘤主治方清肝蘆薈丸清肝蘆薈丸芎芍昆布青連皂地黃海粉還兼甘草節當歸加上共成方治惱怒傷肝致肝氣鬱結為瘤其堅硬色紫壘壘青筋結若蚯蚓遇喜則安遇怒則痛者服之川芎當歸白芍各二兩生地酒浸搗膏二兩青皮蘆薈昆布海粉甘草節牙皂黃連各五錢上為末神麯糊為丸如梧桐子大每服八十丸白滾湯量病上下食前後服之芩蓮二母丸芩連二母丸芎芍熟地當歸羚羊角蒲黃生地與骨皮甘草柏葉同丸服治心火妄動逼血沸騰外受寒涼結為血瘤其患微紫微紅軟硬間雜皮膚隱隱纏如紅絲皮破血流禁之不住者宜服黃連黃芩知母貝母川穹當歸白芍生地熟地蒲黃羚羊角甘草減半地骨皮各等分上為末側柏葉煎湯打寒食麵為丸如桐子大每服七十丸燈心湯送下或作煎劑服之亦效順氣歸脾丸順氣歸脾湯貝母烏附耆陳術茯神棗仁遠志人參等木香甘草合歡靈治思慮傷脾致脾氣鬱結乃生肉瘤軟如綿腫似饅脾氣虛弱日久漸大或微疼或不疼者服陳皮貝母香附烏藥當歸白朮茯神黃耆酸棗仁遠志人參各一兩木香甘草炙各三錢上為末合歡樹根皮四兩煎湯煮老米糊丸如桐子大每服六十丸食遠白滾湯送下通氣散堅丸通氣散堅丸半夏陳貝芎歸粉草苓香附桔菖參海藻南星枳實共黃芩治憂鬱傷肺致氣濁而不清聚結為瘤色白不赤軟而不堅由陰陽失度隨喜怒消長者宜服陳皮半夏茯苓甘草石菖蒲枳實炒人參膽南星天花粉桔梗川芎當歸貝母香附海藻黃芩酒炒各等分上為末荷葉煎湯跌為丸寒豆大每服一錢食遠燈心二十根薑三片泡湯送下調元腎氣丸調元腎氣丸參地山藥丹歸萸澤苓麥冬龍骨香砂柏骨皮知母效如神治房欲勞傷憂恐損腎致腎氣弱而骨無榮養遂生骨瘤其患堅硬如石形色或紫或不紫推之不移堅貼於骨形體日漸衰瘦氣血不榮皮膚枯稿甚者寒熱交作飲食無味舉動艱辛腳膝無力者並服之淮生地酒煮搗膏四兩山萸肉山藥牡丹皮白苓各二兩人參當歸身澤瀉麥門冬搗膏龍骨地骨皮各一兩木香砂仁各三錢黃柏鹽水炒知母童便炒各五錢上為末鹿角膠四兩老酒化稠加蜜四兩同煎滴水成珠和藥為丸如桐子大每服八十丸空心溫酒送下忌白蘿蔔火酒房事海藻玉壺湯海藻玉壺湯青陳翹貝芎歸昆布評半夏獨活並甘草海帶煎來效有靈治癭瘤初起或腫或硬或赤不赤但未破者服海藻貝母陳皮昆布青皮川芎當歸半夏連翹甘草節獨活各一錢海帶五分水二鍾煎八分量病上下食前後服之凡服此門藥餌先斷厚味大葷次宜絶欲虛心者為妙活血散癭湯活血散癭湯芍歸青皮芎半地黃隨參苓昆布丹皮草紅花肉桂木香催治癭瘤已成日久漸大無痛無癢氣血虛弱者白芍當歸陳皮川芎半夏熟地人參茯苓丹皮各一錢紅花昆布木香甘草節各五分青皮肉桂各三分水二鍾煎八分量病上下服後飲酒一小杯六軍丸六軍丸內用蜈蚣全蠍薑蠶蟬脫同夜明砂與穿山甲諸腫癭瘤可覓功治癭瘤已成未潰者不論年月新久並宜服之蜈蚣去頭足蟬脫全蠍薑蠶炒去絲夜明砂穿山甲以上等分為細末神麯糊為丸粟米大硃砂為衣每服三分食遠酒下忌大葷煎炒日漸可消枯瘤方枯瘤方用白砒硇黃丹輕粉雄黃餅乳香沒藥硼砂等斑蝥田螺米粥調治瘤初起成形未破者及根蒂小而不散者用白砒硇砂黃丹輕粉雄黃乳香沒藥硼砂各一錢斑蝥二十個田螺三枚大者去殼曬乾切片共研極細糯米粥調安捏作小棋子樣曝乾先灸瘤頂三炷以藥餅貼之上用黃柏末水調蓋敷藥餅候十日外其瘤自然枯落次用斂口藥祕傳斂瘤膏祕傳斂瘤膏血衄輕粉龍骨海螵蛸象皮乳香各等分雞子熬油一處調治癭瘤枯藥落後用此搽貼自然生肌完口血衄輕粉龍骨海螵蛸象皮乳香各一錢雞蛋十五枚煮熟用黃熬油一小鐘以上各等細末共再研和入雞蛋油內攪勻每日早晚甘草湯洗淨患上雞翎蘸塗膏藥蓋貼琥珀黑龍丹琥珀黑龍丹海帶南星血衄五靈脂海藻木香並京墨麝香加上效堪隨治五癭六瘤不論新久但未穿破者並宜用之琥珀一兩血衄二兩京墨五靈脂炒海帶海藻南星薑汁拌炒各五錢木香三錢麝香一錢以上各為細末和勻再研煉蜜丸一錢重金箔為衣曬乾密收每用一丸熱酒一杯量病上下食前後化服如患在下部服後隨用美膳壓之十全流氣飲十全流氣飲陳皮赤茯青皮香附隨木香烏藥芎歸芍甘草同煎效可奇治憂鬱傷肝思慮傷脾致脾氣不行逆於肉裡乃生氣癭肉瘤皮色不變日久漸大宜服此藥陳皮赤茯苓烏藥川芎當歸白芍各一錢香附八分青皮六分甘草五分木香三分薑三片棗二枚水二鍾煎八分食遠服癭瘤應用方三品一條槍見痔瘡門人參養榮湯見瘰癧門補中益氣湯八味丸十全大補湯俱見癰疽潰瘍門寒食麵注末卷肺癰論第二十四夫肺癰者金受火刑之症也蓋肺為五臟華蓋其位至高其質至清內主乎氣中主聲音外司皮毛又兼主乎壽夭金清而氣管深長者其音自清其韻自高其聲自洪此三者主壽亦主通達如金濁而氣管短細者其音自焦其韻自低其聲自小此三者主夭亦主蹇滯故肺金獨旺於秋者應其輕清之候也倘有所克其病自生致患肺癰者先因感受風寒未經發越停留肺中初則其候毛聳惡風咳嗽聲重胸膈隱痛項強不能轉側者是其真候也久則鼻流清涕咳吐膿痰黃色腥穢甚則胸脅脹滿呼吸不利飲食減少脈洪自汗法當清金甘桔湯主之麥冬清肺飲調之又久嗽勞傷咳吐痰血寒熱往來形體消削咯吐瘀膿聲啞咽痛其候傳為肺痿如此者百死一生之病也治宜知母茯苓湯主之人參五味子湯調之又有七情飢飽勞役損傷脾肺者麥冬平肺飲主之紫菀葺湯調之又有房欲勞傷丹石補藥消鑠腎水者宜腎氣丸主之金液戊土丹調之又勞力內傷迎風響叫外寒侵入未經解散致生肺癰者初起脈浮微數胸熱氣粗寒熱往來咳嗽生痰者當以小青龍湯主之麥冬清肺飲調之通用金鯉湯蠟礬丸太乙膏相間服之亦效如手掌皮粗六脈洪數氣急顴紅汙膿白血嘔噦草褚水鼻煽不餐飲食者俱為不治此症以身涼脈細膿血交流痰色鮮明飲食知味膿血漸止者俱為無妨反此則死肺癰看法初起脈浮虛細身體不熱咳嗽有痰呼吸調勻者順已成脈浮微數咳吐膿痰形色鮮明語聲清朗者吉潰後咯吐膿痰間吐鮮血時發時止飲食知味者順吐膿漸漸稀少胸脅不痛面色微微帶黃便調多穢初起脈洪弦數身熱多寒胸疼氣喘面紅多汗損壽已成咯吐膿痰氣味草褚臭黃痰如膠黏固唇反終亡咯吐再兼白血氣急多煩指甲紫而帶灣終歸冥路手掌反如枯樹面豔顴紅咽痛音如鴨聲鼻掀終死肺癰治法初起風寒相入頭眩惡寒咳嗽聲重者宜解散風邪汗出惡風咳嗽氣急鼻塞項強胸膈隱痛實表清肺日間多寒喜復衣被夜間發熱多煩去被滋陰養肺口乾喘滿咽嗽而渴咳嗽身熱脈弦數者降火抑陰胸滿喘急咳吐膿痰身熱氣粗不得安臥平肺排膿熱退身涼脈來短澀精神減少自汗盜汗補肺健脾肺癰治驗一義官仲冬時督工河道不常迎風呼喚致肺受傷後發此症初起寒熱交作咳嗽聲重氣急生痰請內醫治之越治越重後豫視診其脈浮而數面光而澤此肺癰也視其痰果有膿意相黏以桔梗湯二服咳嗽稍止以排膿散四服其膿漸多惟胸膈疼痛不減脈亦帶芤此胸中有瘀血也以四順散加紅花牡丹皮二服吐出紫血碗許隨後膈痛漸止又以金鯉湯兼人參五味子湯間服月餘而愈一男子久嗽不已咳吐膿痰面白神勞胸中隱痛診之脈浮微數此屬肺氣不足火尚有餘以知母茯苓湯數服其膿漸少又以清金寧肺丸服之而愈一男子因勞傷咳嗽不止至夜身熱尤甚日久咯吐膿血診之脈弦而數此虛火假症也先以童子小便日飲三四次又服紫菀茸湯數劑至夜身熱不發又間服金鯉湯月餘而漸瘳此非童便之功而陰火豈能得退嘗治瘡瘍虛熱不退者用此極效一男子鬱郁不遂意患嗽半年時或咳吐膿血且形體衰弱飲食減少脈亦微數聲漸將雌惟面不紅其病將成肺痿而尚可治以清金二母湯十餘服咳吐減半又以金鯉湯與人參五味子湯間服之又早飲人乳晚飲童便各一鍾調理百日外而安一男子生平好飲口乾作渴致肺壅熱成癰咳吐膿痰喘滿難臥以葶藶散二服而喘定易睡又以紫菀茸湯加乾葛天花粉十餘服而膿痰漸少早以加減八味丸午用清金寧肺丸間服之兩月而愈一男子五十餘歲平素寵妾膏粱復生咳嗽發熱吐痰腥臭視之手掌枯澀面隱微紅痰中白血脈亦細微而數此肺癰所忌症也辭不治後醫強許其生而用藥終至不應乃死人問曰何以致之豫曰手掌乾澀血枯土傷不能生其金也面色微紅相火已動痰中白血正肺受傷脈細而數真氣虛敗凡肺癰犯此豈有不死者乎以此言之後人乃服肺癰主治方麥冬平肺飲麥冬平肺飲人參赤芍檳榔赤茯苓陳皮甘桔同成劑肺癰咳嗽可回春治肺癰初起咳嗽氣急胸中隱痛嘔吐膿痰者人參麥門冬赤芍檳榔赤茯苓陳皮桔梗各一錢甘草五分水二鍾煎八分食遠服玄參清肺飲玄參清肺飲柴陳甘桔檳榔參茯苓麥冬骨皮薏苡仁生薑童便可安寧治肺癰咳吐膿痰胸膈脹滿上氣喘急發熱者玄參八分銀柴胡陳皮桔梗茯苓地骨皮麥門冬各一錢薏苡仁二錢人參甘草各五分檳榔三分水二鍾薑一片煎八分臨入童便一杯食後服寧肺桔梗湯寧肺桔梗湯貝耆歸蔞枳殼草桑皮防己百合葶五味杏仁知母地骨皮治肺癰胸膈隱痛兩脅腫滿口燥咽乾煩悶多渴自汗盜汗眠臥不得時吐稠痰腥臭者服之桔梗貝母當歸栝蔞仁黃耆枳殼甘草節桑白皮防己百合苡仁各八分五味子甜葶藶地骨皮知母杏仁各五分水二鍾薑三片煎八分不拘時服咳甚加百合身熱加柴胡黃芩大便不利加蜜炙大黃一錢小便澀滯加燈心木通煩躁兼血加白茅根痛甚加人參白芷四順散四順散內有奇功桔梗紫菀貝母同甘草杏仁相協力肺癰喘嗽永無蹤治肺癰吐膿五心煩熱壅悶咳嗽氣急不能安貝母紫菀桔梗各一錢五分甘草杏仁各七分水二鍾煎八分食遠服或為末白湯調服二錢清金寧肺丸清金寧肺貝甘陳參桔歸苓地骨芩銀柴天麥芎連芍五味白朮生熟憑治肺癰咳嗽日久膿痰不盡身熱虛羸漸成勞瘵者服之效陳皮茯苓桔梗貝母人參黃芩各五錢麥門冬地骨皮銀柴胡川芎白芍胡黃連各六分五味子天門冬生地酒浸搗膏熟地搗膏歸身白朮各一兩甘草三錢上為細末煉蜜為丸如梧子大每服七十丸食遠白滾湯送下人參五味湯人參五味湯陳術耆桔歸苓枳地黃桑皮柴前地骨草肺癰虛乏可煎嘗治氣血勞傷咳膿或咯血寒熱往來羸瘦困乏一切虛損之症並效人參五味子前胡陳皮白朮桔梗當歸茯苓熟地甘草各一錢黃耆地骨皮桑白皮枳殼柴胡各五分水二鍾薑三片煎八分食後服紫菀茸湯紫菀茸湯參犀角冬花桑葉草半夏杏仁百合與阿膠貝母蒲黃薑莫卻治膏粱厚味飲食過度或煎炒法酒致傷肺氣咳嗽咽乾吐痰唾血喘急脅痛不得安臥並服紫菀茸犀角炙甘草人參各五分桑葉用經霜者款冬花百合杏仁阿膠貝母半夏蒲黃生各七分水二鍾薑三片煎八分入犀角末食後服排膿散排膿散內用黃耆白芷人參五味宜每服三錢蜜調下肺癰痰吐效堪奇治肺癰已吐膿後宜服此藥排膿穢補肺氣黃耆白芷五味子人參各等分上為細末每服三錢食後蜜湯調服知母茯苓湯知母茯苓湯桔芩薄荷五味草人參柴半冬花芎白朮阿膠麥冬仔細憑治肺痿喘嗽咳吐痰涎或自汗盜汗往來寒熱茯苓黃芩各一錢知母甘草桔梗薄荷人參五味子柴胡半夏川芎款冬花白朮阿膠麥門冬各六分水二鍾薑三片煎八分加童便一杯食後溫服滌痰湯滌痰湯內二陳先麥冬枳實膽星前人參桔梗黃連煎竹茹加上病安然治心火克肺金久而不愈傳為肺痿咽嗌雌啞胸膈痞悶嘔吐痰涎喘急難臥者並服之陳皮半夏茯苓甘草麥門冬膽南星枳實黃連人參桔梗各五分竹茹一錢水二鍾煎八分食後服寧肺丸寧肺丸中二般藥烏梅粟殼去筋膜每服二錢功有靈肺癰肺痿同堪嚼治久嗽咯吐膿血胸膈不利咳嗽痰盛坐臥不安言語不出甚則聲音啞嗌者服之烏梅蜜拌蒸取肉八錢搗膏罌粟殼去膜蜜拌炒為末一兩用烏梅膏加生蜜少許調作丸每服二錢烏梅湯不拘時下清金二母湯清金二母湯芩桔知母蘇柴術杏苓蔞桑五味陳皮麥甘草當歸共此呈治肺痿多嗽少痰午後發熱口乾煩躁不寧者知母貝母桔梗茯苓當歸白朮陳皮各一錢桑皮紫蘇杏仁柴胡栝蔞仁黃芩五味子甘草麥門冬五分水二鍾煎八分童便一杯食後服梔子仁湯梔子仁湯大青葉石膏淡豉共黃芩杏仁知母赤芍藥升麻柴胡甘草行治肺痿發熱潮熱或發狂亂煩躁面赤咽痛者梔子仁赤芍藥大青葉知母各七分黃芩石膏杏仁升麻各一錢五分柴胡六分甘草五分淡豆鼓百粒水二鍾煎八分食遠服加味理中湯加味理中湯半夏茯苓白朮共陳皮乾薑細辛並甘草人參五味效同推治肺胃俱虛咳嗽聲重發熱不已又兼脈浮數而無力者服之炙甘草半夏茯苓乾薑泡白朮陳皮細辛五味子人參各五分水二鍾煎八分食遠服金鯉湯金鯉湯中效罕稀獨將貝母效真奇童子小便重湯頓肺癰痰吐最堪醫治肺癰已成未成胸中隱痛咯吐膿血者服之金色活鯉魚一尾約四兩重貝母一錢先將鯉魚連鱗剖去肚腸勿經水氣用貝母細末摻在魚肚內線扎之用上白童子小便半大碗將魚浸童便內重湯頓煮魚眼突出為度少頃取起去鱗骨取淨魚肉浸入童便內頓熱肉與童便作二三次一日食盡一枚其功效甚捷葶藶散葶藶散中薏苡仁甘草桑皮用葛根栝蔞升麻桔梗等肺癰服下可回春治過食炙爆或飲酒過度致肺熱氣壅喘急不臥及肺癰濁吐腥臭胸膈脹滿不食者並服之甜葶藶桔梗栝蔞仁川升麻薏苡仁桑白皮葛根各一錢炙甘草五分水二鍾薑三片煎八分食後服腎氣丸治腎氣素虛不交於心津液不降敗濁為痰致生咳逆乾山藥四兩山茱萸去核酒拌四兩澤瀉蒸牡丹皮白者佳白茯苓各三兩熟地用生者八兩酒拌銅器蒸半日砂器亦可搗膏上為末地黃煮爛杵膏蜜丸如桐子大每服七八十丸空心滾湯鹽湯溫酒送下肺癰應用方金液戊土丹見脫疽門
