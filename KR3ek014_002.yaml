body:
  text: 卷之二上部疽毒門腦疽論第十六夫腦疽者俗稱對口是也但所發不同其源有二得於濕熱交蒸從外感受者輕五臟蘊結從內發外者重其理何也濕熱之為病天行氣候寒暑不調節序溫涼陰陽失度凡有體虛者易於侵襲項後雖屬督脈又主太陽寒水司行之道所有侵襲氣血必凝凝則後必為腫此從外感受者其患初起有頭多生正穴三四日間多作焮痛始生寒熱口和而干色紅根活瘡勢漸高形不散大時止時痛易膿易腐飲食知味起坐尋常外勢雖可畏而內無七惡之症相干此屬陽症其由從外來矣故多不治可愈所有五臟蘊結而成者重其源有五蓋心主血故心緒煩擾煽動不寧以致火旺而沸騰行於項間與寒水交滯而為腫者一也肝統筋故惱怒傷肝項乃三陽統筋之所肝傷則血脈不潮筋無榮養凝結為腫故項緊急強痛不能轉側其患未潰前肉色紫暗堅硬漫腫破流血水木痛無膿此等之症皆肝氣受傷者二也脾主肌肉故思慮傷脾脾氣日損又或膏粱損胃胃汁乾枯以致中脘痞塞氣不運行逆於肉裡乃生壅腫其患外皮雖腐而內堅不潰口燥舌乾飲食不進根腳走散膿穢色敗此等之症皆脾氣受傷者三也肺主皮毛故憂鬱傷肺肺傷則毛竅閉塞腠理不通氣不舒暢縱橫經絡結而為腫其形瘡多平陷色淡不華皮腐脂流形如湯潑氣粗短促鼻黴鼻掀碌碌生痰殷殷發嗽此等之症皆肺氣受傷者四也腎主骨髓故恣欲傷腎腎傷則真陰之氣敗矣真陰一敗相火自生此火最能自升自降或動或靜煎熬臟腑消爍津液更變形容改換聲音瘡形紫黑脈數乖度煩躁口乾隨飲隨渴此等之症皆腎氣受傷者五也凡治此症必內分虛實外辨陰陽體順天時察其病理七日以前瘡勢未成者當通竅以汗發之七日以後病勢已成治當兼補以托之此則毒不內攻外無變症如藥攻利太過元氣受傷毒多難出又敷圍涼藥氣血冰凝則肌肉多死反難腐潰豫嘗治此及諸發背初起未成者用披針當頂點入知痛處出其惡血通其瘡竅隨插蟾酥條直至瘡底外用膏蓋內服萬靈丹或蟾酥丸發其大汗解散內蘊之毒次日患上或腫或不腫或痛或不痛仍插仍貼直至患頂腫高根腳突起四圍列縫有膿方住插藥輕淺者九日後吐出病根堅硬不化之物毒甚者不能頓然脫落亦可漸腐成膿為轉重就輕之良法外用玉紅膏長肉內服補托收斂其患不久自愈如陽症輕淺者候自腐潰不用前法針刺如不腫不疼灸亦不痛陰症尤當速用不必遲延此為移深居淺之大法也腦疽看法初起頂高根活色紅皮薄作疼焮熱腫不開散者順已成無論偏正瘡形獻起疼痛發熱易膿易腐者順已潰膿稠肉色紅活瘀腐易脫焮腫漸消痛減者順潰後腐脫新肉便生瘡口漸斂凝結癡膿作癢者順初生一點黃泡或似疙瘩不腫不疼自不知覺者逆已成不發高腫亦不焮痛瘡頂軟陷根腳平散者逆已潰膿清肉色紫黑外皮不腐內生臭穢不食者逆腐肉雖盡新肉不生瘡口散大軟陷無神色敗者逆腦疽治法初生有頭或無頭大痛或不痛俱隔蒜灸兼服解毒已成堅硬發熱焮痛口乾便祕者邪在內也宜泄之堅腫不痛發熱惡寒頭痛四肢拘急者兼發表攻裡腫硬日深形色紫黑外皮不腐內膿不潰宜行拔法項強頭面焮熱口燥噁心嘔吐者邪在上也宜清之焮熱腫痛紅色光亮疼苦有時內膿脹痛者急開之將潰不潰微熱微紅不作腐潰者脾胃虛也宜補之潰後腐肉不脫膿水清稀腫痛仍作者當大養氣血大便多溏小便短澀自汗食少脈細身涼溫中健脾腦疽治驗一男人項疽十餘日視其瘡勢頗甚根連左右耳項並腫紅赤焮熱脈浮而數先用黃連消毒散二服退其大勢根腳消定後用托裡消毒散數服不覺腐潰但診脈浮無力詢知患者年過五旬久艱嗣息房中又有妾人多兼思慮勞欲大過損傷元氣故也又瘡形勢大止能起發不能培養為膿更用十全大補湯加桔梗白芷倍人參白朮各三錢外用桑木灸法早晚二次灸之又塗紫霞膏數日患者頭面俱腫雙目合縫形狀可畏然後腐潰並作膿出日至數升如此半月因前藥不勝其事內加煩躁不寧五心煩熱飲食漸少等症此謂膿水出多氣血走泄為虛火假症之故雖變不妨隨用聖愈湯一服不應又進一服加熟附子二錢方應前症悉退次以人參養榮湯加麥冬五味參術常倍至三錢調理月餘後至腦骨腐肉連發片片脫下其狀狼狽不可觀瞻凡相視者無不點頭驚訝又恐腐潰深大補不及事每日粥食中用人參三錢凡餐分入同煮食之以接補脾元後方元氣漸醒調理四月方愈彼後一年反生其子以承後祀也一監生項瘡初起請視瘡頭偏於右半不可輕待必用艾灸為上隔蒜灸至十五壯知痛乃住後彼視為小恙失用內藥又四日其瘡復作頸腫項強紅紫木痛便祕脈實有力以內疏黃連湯加玄明粉二錢通其大便次用消毒救苦湯二服腫勢仍甚此內毒外發也不可再消之換服托裡消毒散至近二十日因患者肥甚外肉多緊不作腐潰豫欲行針開放彼家堅執強阻豈後變症一出煩悶昏憒人事不醒彼方驚悔隨用披針左右二邊並項之中各開一竅內有膿腐處剪割寸許頑肉放出內積瘀毒膿血不止碗許內服健脾胃養氣血托膿補虛之藥其膿似泉水不歇每朝夕藥與食中共參六七錢服至腐肉脫盡新肉已生又至四十日外患者方得漸蘇始知人事問其前由徑不知其故也此患設若禁用針刀不加峻補豈有生乎因其子在庠見識道理從信豫言未百日而愈也一男子項瘡五六日就肆看視頭便黃色根亦平散豫曰此當急治方可彼面色不悅而去又請里中一醫視之乃曰小恙也因喜其説用藥又至五日外其瘡勢堅硬根腳開大毒氣已過兩肩流注前項胸乳皆腫嘔吐噁心寒熱不食瘡勢形色俱覺可畏始信前言復請豫治其瘡形狀不可觀也此非藥力可及先用蔥艾湯洗淨舊藥連煮藥筒拔提二處拔出瘀血碗余隨用銀針斜斜插入根腳透通患底數處以蟾酥條插入孔內此最解毒為膿總以膏蓋走散處以真君妙貼散敷之日漸日消其毒收歸後項原處又兼服內托降火化痰之藥三四日候其大勢已退內膿已通換服十全大補湯凡堅而不化者照之腐而不痛者取之新血生遲者培之如此調理將近三月方得完口平復此為患者諱疾忌醫之過幾乎至於喪命者多矣一女人年過六旬系宦族素稟怯弱項間患疽初起頭便如粟謂里可容谷之病也喜其形體不肥雖發之後必易於腐潰此則不妨前説先用隔蒜灸之次用蟾酥餅貼灸上四邊以吸毒散敷之收其根腳不散內服托裡消毒散數服瘡勢堅硬疼苦不止豫曰到某日方止況今瘡不腐潰診其脈細數而無力此內虛之故不能解毒為膿以疼為要豈可得止次換益氣養榮湯加角針白芷三服腫亦漸起外用桑木灸法其堅漸軟膿出稠而不多前方去角針白芷加香附倍用參耆又數服方得膿潰潰後痛亦不止豫曰再三日午後痛可止也至期腐肉將脫小半臨午用乳香定痛散一服午後疼痛頓退安睡不醒患家欣悅豫曰不然此在用藥適其時也雖半月之言應於今刻惟信則不失耳後當某日腐盡某日肌平某日完口此二者患家以墨繩記候期日果實並無過與不及也此法要在眼力精巧量病難易新腐遲速補助有無用藥合式然後相量日數可決於前發之必中也一婦壯年項瘡三日其形徑對前口彼家相畏人胖不當瘡發此穴也豫視頂高腳活雖發不妨彼欲內消之方妥豫曰藥消則不能針消則可取彼從之用披針當頂針入六七分點至軟肉方住隨去瘀血又以蟾酥條插入孔內服蟾酥丸得大汗而解次日瘡上微膿出之漸消尤恐內毒未盡又用消毒清熱之藥數服不出十日而安大抵凡欲消瘡先斷根本次泄毒氣使毒自衰無得內攻為妙一男子耳後生疽十餘日自謂小恙不治將近半月根腳漸大瘡頭惟流血水稀惡汙穢四邊紫黑軟陷無膿面慘鼻掀手冷氣促脈診散大無根此內敗症也何必治之辭不用藥又延客醫治之因詢無事患者恨豫不治凡遇親友勉力支持厲聲自囑決不甘死豫曰心不服死也再五日必死果然豫嘗觀瘡但犯此症雖山嶽之軀一敗無不傾倒一婦人正對口四五日自灸草余壯徑不知痛灸疤焦黑平塌如故診之脈微數而無力此內虛症也若假藥力則誤其事用披針當頂刺入寸許不知痛亦無血出此毒滯而未發揚者用蟾酥條插入針孔每日一次膏蓋其上至七日後周圍裂縫出膿內服純補之藥至十四日落出瘡根一塊指大長寸余後以玉紅膏平長肌肉又半月其口已平以珍珠散摻上即刻生皮而愈此症設若不用針工專假藥力攻托雖不至死豈能得其速愈者哉一婦人四旬肥甚項瘡五六日視之肉腫瘡不腫必竟生疑恐又兼口燥心煩堅硬色紫根腳散平六脈洪大此大過症也後必無膿相辭不治彼又請醫視之有言外托者又言內消者有稱年壯不妨又説脈大易治衆人紛紛不定仍各用藥又至七八日前後胸項俱腫木悶堅硬仍復請視決之豫曰此不治者何也初起肉腫瘡不腫頂陷者一也根腳平散真氣內敗不能收束毒氣二也口燥心煩邪火內淫三也形色紫暗血死毒滯不作腐潰者四也六脈洪大瘡毒大盛正氣受克無以抵當故瘡終變軟陷邪毒內攻而死者五也當備後事為要此終於二十七朝前後足矣後果至期而歿觀此言正順理之病可嘆時人何為紛紛妄治也腦疽主治方黃連救苦湯黃連救苦湯升葛柴芍芎歸翹梗芩羌活防風銀共草腦疽煎服可安寧治腦疽髮鬢發頤及天行時毒初起憎寒壯熱頭面耳項俱腫服之未成者自消已成者自潰黃連升麻葛根柴胡赤芍川芎歸尾連翹桔梗黃芩羌活防風金銀花甘草節各一錢水二碗煎八分臨服入酒一杯食後服解毒天漿散解毒天漿石決明薑蠶山甲防風評連翹羌活乳香迎銀花歸尾大黃行治腦疽積毒日深堅腫木硬口燥舌乾噁心煩渴六脈沉實有力大便閉結不通者並宜服之石決明生研薑蠶穿山甲土炒防風連翹羌活乳香甘草金銀花黃連歸尾各一錢大黃三錢天花粉四兩新鮮未曬者石臼內搗爛投水一碗攪勻絞去渣用上花粉淨汁一碗半同藥煎至八分入酒一杯空心熱服行過三次方用飲食忌食煎炒發物內托千金散內托千金散芍耆芎歸防桔桂花隨人參白朮蔞根草痛加乳沒效堪推治腦疽發背諸毒惡瘡已成不消者服之易潰白芍黃耆川芎當歸防風桔梗天花粉金銀花人參各一錢肉桂白芷甘草各五分乳香沒藥二味痛甚加入上水二碗煎八分臨服入酒一小杯食遠服回毒銀花散回毒銀花散最奇癰疽陰毒總堪醫借問君家何等藥銀花甘草協黃耆治腦疽及諸發陰瘡不起色變紫黑者急服之金銀花連枝葉二兩黃耆生切四兩甘草切一兩用細酒二十兩同藥入小口砂罐內密封重湯內煮盡三香為度取起濾清服之蓋暖患上其瘡漸漸高腫此轉陰為陽吉矣後用托藥潰膿如服後不痛不起瘡頭流出黑水此真陰不治梅花五氣丹梅花五氣丹輕粉乳沒辰砂麝片酥還有粉霜雄血衄此方原自出仙都治腦疽發背諸般疔腫初起寒熱交作筋骨疼痛有似傷風噁心嘔吐但未成膿者並宜服之梅花片五分當門麝五分輕粉辰砂各六分乳香沒藥瓜兒衄明雄黃各一錢真酥散預於端午前尋之至午日取酥二錢用頭男乳調膏上前藥各研極細對準分數於端午日辰時制度候至午時將上藥九味和入蟾酥膏內向日丸之如茄子大一時內曬乾用川椒二十七粒燈心二十七段同藥收於瓷罐內養之以蠟封口不泄藥氣為妙凡遇惡瘡大毒開器取出一枚先用美饌食飽次用無根水漱淨口內再含水一口少頃待溫用蔥白五寸同水嚼爛咽下隨將藥餅安放舌下睡於暖處以被復蓋藥化苦水徐徐咽之瘡勢大者二三餅亦可藥盡其汗即到如淋諸病若失如冬月天寒難汗噙後將蔥白湯催之亦妙凡治無有不效如暗疔人所不知覺及知覺而失治者毒氣入里人便昏沉一中便倒不能依法服藥急用連須蔥白七個煎酒一杯研藥五餅灌下藥氣到心其功如湯潑雪患者即便蘇醒此為外科第一奇方也小保安湯小保安湯歸藿苓黃耆半夏麥冬陳甘桔人參並白朮棗薑煎服作陽春治腦疽諸發已潰流膿時平常服之庶不更變當歸茯苓川芎黃耆麥門冬陳皮桔梗人參白朮各一錢半夏甘草藿香各五分薑三片棗二枚水二茶鍾煎八分食遠服大保安湯大保安湯木附歸參苓芎芍桂山萸黃耆山藥丹皮草麥冬五味地黃隨治腦項諸發癰疽惡瘡大毒已潰之後膿水出多氣血虛弱精神短少飲食少思坐臥不寧煩躁不眠晝則安靜夜則發熱及虛陽煩渴等症白朮當歸人參茯苓川芎白芍山萸黃耆山藥丹皮熟地五味子各一錢肉桂甘草麥門冬熟附子各五分煨薑三片大棗二枚蓮肉七粒水煎食前後服陽春酒一盞陽春酒罕稀天冬杞術地黃隨人參柏子歸遠志百補方中讓此醫治腦疽諸發已潰流膿腐盡時脾胃虛弱肌肉生遲或氣血原不足以致肉色淡白不能長髮收斂宜服此酒生長肌肉強健脾胃美悅顏色滋潤皮膚凡大瘡後飲此不惟卻病亦且延壽人參切片白朮熟地各五錢當歸身切片天門冬枸杞各三錢柏子仁遠志各二錢五分上上藥用絹袋寬貯以無灰好酒五斤瓷罐內浸至一伏時每早午晚各飲一杯熱服如夏月天炎易壞不堪久服將藥分作五分每次用酒一斤隨便浸服亦效如酒將完藥尚有味再添酒浸飲之一次以後藥淡無味不必再浸用之桑木灸法治諸瘡毒堅而不潰潰而不腐新肉不生疼痛不止用新桑木長七寸劈指大一頭燃著向患上灸之火盡再換每次灸木五六條肉腐為度神妙拔根方治腦疽發背陰症初起不腫高不焮熱灸不痛其病將來難果必致壞人十日以前用披針當頂插入知痛處方止隨用蟾酥條插至孔底每日二條膏蓋三日後加添插藥其根高腫作疼外用神燈照法助陰為陽插照七日其瘡裂縫流膿至十三日其根自脫如日多根深蒂固不能脫者披針取之內用玉紅膏不脫者自脫不斂者自斂此法百人百活再無不愈者腦疽應用方隔蒜灸法拔筒法琥珀蠟礬丸太乙膏真君妙貼散護心散方俱見腫瘍門蟾酥丸蟾酥條俱見疔瘡門十全大補湯人參養榮湯乳香定痛散聖愈湯方俱見潰瘍門疔瘡論第十七夫疔瘡者乃外科迅速之病也有朝發夕死隨發隨死有三日五日而不死一月半月而終死此在於毒中之淺深臟腑之乖逆節候之寒溫肅殺之瞬息畜類尸忤性情激變暴戾一時發生立判人之氣血虛者各隨臟腑而中之且如毒氣發於心經者生為火焰疔其患多生唇口手掌指節間其發初生一點紅黃小泡抓動癢痛非常左右肢體麻木重則寒熱交作頭暈眼花心煩發躁言語昏憒此等出於心經之病也毒氣發於肝經者生為紫燕疔其患多生手足腰脅筋骨之間初生便作紫泡次日破流血水三日後串筋爛骨疼痛苦楚重則眼紅目昧指甲純青舌強神昏睡語驚惕此等出於肝經之病也毒氣發於脾經者生為黃鼓疔其發初生黃泡光亮明潤四邊紅色纏繞其患初生口角腮顴眼胞上下及太陽正面之處發之便作麻癢繃急硬強重則噁心嘔吐肢體木痛寒熱交作煩渴乾噦此等出於脾經之病也毒氣發於肺經者生為白刃疔其發初生白泡頂硬根突破流脂水癢痛驟然易腐易陷重則腮損咽焦毛聳肌熱咳吐膿痰鼻焮氣急此等出於肺經之病也毒氣發於腎經者生為黑靨疔其患多生耳竅胸腹腰腎偏僻軟肉之間其發初生黑斑紫泡毒串皮膚漸攻肌肉頑硬如疔痛徹骨髓重則手足青紫驚悸沉困軟陷孔深目睛透露此等出於腎經之病也以上五疔相應五臟又紅絲疔起於手掌節間初起形似小瘡漸發紅絲上攻手膊令人多作寒熱甚則噁心嘔吐遲者紅絲至心常能壞人用針於紅絲盡處挑斷出血尋至初起瘡上挑破俱用蟾酥條插入膏蓋內服汗藥散之自愈凡治此症貴在乎早初起即治者十全十活稍遲者十全五六失治者十全一二初起項以上者三陽受毒必用披針刺入瘡心四五分挑斷疔根令出惡血隨用回疔丹或蟾酥條插入孔內膏蓋之如項之以下者三陰受毒即當艾灸灸之不痛亦須針刺插藥方效隨後俱用蟾酥丸冬月萬靈丹發其大汗毒方得解庶不稽留毒氣致生變症今人治法不論陰陽表裡部位上下凡見是瘡便加艾灸殊不知頭乃諸陽之首亢陽熱極所致其形雖小其惡甚大再加艾灸火益其勢逼毒內攻反為倒陷走黃之症作矣既作之後頭面耳項俱能發腫形如尸胖七惡頓起治雖有法百中難保一二外又有疔名數種形狀紛紛故有舊説未及重録也疔瘡看法初起如疥形如粉刺或小泡或疙瘩結腫不散者順瘡腫不作寒熱亦不噁心飲食有味手足溫暖者順形已成瘡腫肉不腫四圍白色多痛少癢作膿者順已潰出膿瘡仍高腫肉色鮮明根內紅活漸平者順初起似疔非疔軟慢灰色四邊瘡根平踏漫腫者凶未發前先作寒熱如瘧噁心不食後出瘡如蚊迹蚤斑或青紫黑泡軟陷無根腐爛深孔氣粗足冷者逆瘡形似魚臍頂凹灰白軟慢相兼脈細身冷者多逆已成肉腫瘡不腫根腳走散瘡頂空腐血水氣穢死凡疔項之以上針刺不疼項之以下灸之不痛俱死已經走散頭面耳項俱腫煩躁脈細痰動喘急者死日久原瘡無迹走散之處仍復作膿脈數唇焦終死病雖險惡歲運順者可活瘡雖微險歲運逆者常危疔瘡治法初生項之以上者必先針刺以去惡血庶毒不攻內初發項之以下者必先艾灸以殺其勢庶不侵良肉發熱惡寒身體拘急六脈緊數邪在表也宜汗散之身體發熱口燥咽乾脈實有力二便祕澀者宜下之針刺之後瘡不作腐邊腫不消仍加插藥內亦補托初起誤灸致毒走黃不住者急當隨走處砭去惡血發熱乾嘔心煩作渴悶亂神昏解毒清心托裡護膜潰後氣血受傷神怯食少睡臥不寧助脾胃斂神氣將愈後氣血漸復飲食當進仍作渴者急滋養腎水疔瘡治驗一監生右顴下生疔三日形如魚目詢問起居但今麻癢不常此即肺經受毒之症也用針刺入四五分其硬如骨有聲隨用蟾酥條插至三日猶不腐化此堅頑結聚之病也此藥力不及其事換用三品一條槍插至七日外用糊紙封蓋至十一日脫出疔根一塊約有指許以長肉玉紅膏漸搽漸長先服托裡消毒散加金銀花二錢白芷五分脫後用八珍湯加天花粉麥門冬黃耆陳皮各一錢調理月餘候瘡生肉已平用珍珠散摻上結皮而愈一監生中年妻喪繼娶幼室乃嬌態人也自服補腎助陽之藥以致腎水受傷不能上制心火左顴發生一泡先紫後黑麻木不知痛癢凡黑者腎經之毒也其毒豈淺且喜瘡之四邊尚未走散此猶可取隨用針刺疔上量別藥不濟其事用冰螄散厚糊作條插入患孔用糊紙密封勿令泄氣朝服加減八味丸以滋腎水午服蓋氣養榮湯接補真氣以滋不足晚用琥珀蠟礬丸護心解毒候至十一日外疔根與藥結成一塊依期脫落次用生肌斂口補助調理脾胃之劑二十日而愈後因此公不慎調理失於保節幾及三年覆成虛損勞瘵而歿一婦人年近四旬夫主不利愁郁種種抱懷不散時值季夏歲荒之極腮發一疔六日後方延豫視其時疔毒已經走散頭目唇項俱腫形色紫赤豫曰肉腫瘡不腫乃疔毒走黃不治之症彼婦流涕嘆曰一家皆絶也豫問曰何其如此婦又曰吾夫乃不肖之人婦有一女二子俱未適配設若婦死寄託於夫子女日後必為流蕩輩也故婦在一家生婦逝一家死自然之理豫時聞之沉吟不已如此何以得生不忍棄治況此瘡勢大又非藥力可回用火酒數杯隨用針刺腫上十餘處令吸惡血數碗將溫湯洗淨用蟾酥錠磨濃塗之四圍敷金黃散早晚二次內以護心散蠟礬丸清心護里兼服降火化痰開鬱安神之藥調治庶保不變吸血之後余腫稍退又至六日夫又對言何其不死彼婦相聞甚苦暴怒之極仍又復腫比前尤甚也復用針刺腫甚上約十餘處出血三四碗針孔上小膏蓋貼余腫仍敷其人出血多而其內必虛以人參養榮湯加香附貝母服數日後針口漸膿余腫漸消原瘡處復得高腫仍用蟾酥條插化亦漸腐潰外用生肌斂口內服開鬱和中養血健脾等劑調理百日外方愈此病設若相論瘡勢形色者百無一生之理此功出於強勉行之亦得其生者此婦愈後二子一女俱以婚配其夫亦守其終見今已六旬半矣一婦人二十二歲右耳垂向前一寸生疔二日請豫視之形有豆大頂陷灰色此肺經感毒發為白刃疔也又驗其根腳綿軟毒不結聚為陷伏陰症也未及針刺伊舅曰何恙也豫直告曰疔瘡症彼聽冷笑不信是言也豫因辭不用藥隨其信否彼復請客醫治之視曰風熱疙瘩乃小恙也彼家告以某醫曾曰是疔瘡醫者點頭而笑曰此真胡説患家喜悅天下事大相懸絶醫用消風散藥二服毒氣全收隨發昏憒喘急而即死后里中人詢問何速之甚彼初時因不信豫言自誤其死真可惜也一年少婦顴下生疔疙瘩作癢豫欲針之彼家不信辭後自灸次日四邊漸腫瘡漸軟陷又三日頭面大腫復請治之豫觀原瘡灸上已結黑靨干陷無膿此毒氣內陷外肉已死又面目浮腫光亮發熱形狀不堪此正氣衰而邪氣實也雖治亦不效後必終死彼家方悔自誤之説後延半月果然歸寢疔瘡主治方蟾酥丸蟾酥丸效獨稱雄乳沒砂礬輕粉同銅緑蟾酥寒水麝蝸牛又有用蜈蚣治疔瘡發背腦疽乳癰附骨臀腿等疽一切惡症歹瘡不痛或麻木或嘔吐病重者必多昏憒此藥服之不起發者即發不痛者即痛痛甚者即止昏憒者即蘇嘔吐者即解未成者即消已成者即潰真有回生之功乃惡症中至寶丹也蟾酥二錢酒化輕粉五分枯礬寒水石煅銅緑乳香沒藥膽礬麝香各一錢雄黃二錢蝸牛二十一個硃砂三錢以上各為末稱準於端午日午時在淨室中先將蝸牛研爛再同蟾酥和研稠黏方入各藥共搗極勻丸如緑豆大每服三丸用蔥白五寸患者自嚼爛吐於男左女右手心包藥在內用無灰熱酒一茶鍾送下被蓋如人行五六里出汗為效甚者再進一服黃連解毒湯黃連解毒湯黃柏山梔甘草共連翹內熱口乾煩躁甚更加牛子寂然消治疔毒入心內熱口乾煩悶恍惚脈實者宜用黃連黃芩黃柏山梔連翹甘草牛蒡子各等分水二鍾燈心二十根煎八分不拘時服立馬回疔丹立馬回疔丹輕粉蟾硇蚣麝白丁香雄乳硃砂金頂等化疔如雪去投湯治疔瘡初起已用針刺後又或誤灸失治以致瘡毒走散不住乃疔走黃險惡症也急用此插蟾酥酒化硇砂輕粉白丁香各一錢蜈蚣一條炙雄黃硃砂各二錢乳香六分麝香一字金頂砒五分注末卷共為細末糊成麥子大凡遇疔瘡針破用此一粒插入孔內膏蓋之次後追出膿血疔根為效疔毒復生湯疔毒復生湯牡蠣山梔乳沒骨連翹花粉銀花黃皂刺木通牛子不相饒治疔毒走黃頭面發腫毒氣內攻煩悶欲死者牡蠣山梔銀花木通連翹牛蒡子乳香沒藥角刺花粉大黃地骨皮各八分水酒各一茶鍾煎一半食遠服不能飲者水煎臨服入酒一杯和服亦效脈實便祕者加朴硝七星劍疔瘡最怕七星劍野菊蒼耳豨蘞半麻黃地丁紫河車斬斷諸疔及人面治十三種疔瘡初起憎寒作熱噁心嘔吐肢體麻木癢痛非常心煩作躁甚者昏憒急宜服之野菊嫩頭蒼耳頭豨蘞草半枝蓮地丁草各三錢麻黃一錢紫河