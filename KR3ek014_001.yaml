智丁木沉香白蔻是參苓陳術炮乾薑附子加之功全備治癰疽陽弱陰寒脈虛身冷或瘡為寒變反致不疼或膿水清稀心下痞滿腸鳴腹痛大便微溏食則氣短嘔逆不得安臥時發昏憒者服之白朮茯苓木香丁香各五分半夏陳皮羌活益智乾薑炮人參白寇甘草各一錢附子二錢水二鍾姜三片棗一枚煎八分不拘時服方與舊不同豫制此嘗治癰疽陰症及雜症陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑附之類其津液頓生煩熱頓退其應如響聖愈湯聖愈湯憑熟地耆芎歸生地等相宜人參六品真堪羡膿甚心煩此最奇治潰瘍膿水出多氣血虛極脈細空而無力以致心煩不安眠睡不寧或五心煩躁等症並服熟地生地川芎人參各五錢歸身黃耆鹽水炒各一錢作一劑水二茶鍾煎八分食遠服保元大成湯保元大成湯接命參苓歸術耆陳定木香芍附草砂萸棗姜五味功奇應治潰瘍元氣素虛精神怯弱或膿水出多神無所主以致睡臥昏倦六脈虛細足冷身涼便溏或祕胸膈或寬不寬舌雖潤而少津口雖食而無味脈弦不緊肉色微紅總由不足大補堪題人參白朮黃耆蜜水拌炒各二錢茯苓白芍陳皮歸身甘草炙附子山萸肉五味子各一錢木香砂仁各五分水二鍾煨姜三片去皮大棗三枚煎八分食遠服服至精神回手足暖脾胃醒肉色紅為度上數症乃元氣虛脫已欲變壞之病非此不回也獨參湯人參一味獨稱強濟困扶危立大綱氣血兩亡並自汗脈虛寒熱並皆嘗治潰瘍膿水出多氣血虛極或惡寒或發熱或自汗冷汗或手足指甲青冷或身涼脈細並宜人參切片二兩作一劑水二鍾棗十枚煎一鍾徐徐服之若煎至稠厚即為膏矣作三次用好溫酒化服亦可香砂六君子湯記得香砂六君子參苓白朮陳皮比砂仁半夏藿香同棗姜甘草同煎美治潰瘍脾胃虛弱噁心嘔吐或飲食不思等症人參白朮茯苓陳皮半夏各一錢甘草藿香砂仁各五分姜三片棗二枚水二鍾煎八分食遠服清震湯清震湯中益智仁參苓柿蒂甘草陳香附附子澤半夏棗美厄逆效如神治潰瘍脾胃虛弱或誤傷生冷或氣惱勞役或入房夢遺致火邪乘入中脘乃生厄逆急服之益智仁陳皮半夏茯苓人參甘草香附各一錢柿蒂二十四個澤瀉三分熟附手足冷者用一錢姜三片棗二枚燈心二十根水二鍾煎八分不拘時服如身熱口乾便燥火厄者加黃連五分醒脾益胃湯醒脾湯用參山藥二術二苓陳半夏麥芽澤瀉朴木香山楂蘇子同堪嚼治潰瘍脾胃虛弱過份飲食生冷以致胸膈不寬四肢面目浮腫及小水不利等症並宜服之人參陳皮茯苓半夏山藥白朮各一錢蒼朮厚朴澤瀉麥芽木香山楂蘇子豬苓各五分老黃米炒黃一錢水二鍾姜三片燈心二十根煎八分食前服托裡定痛散托裡定痛散當歸乳沒川芎白芍隨粟殼桂皮並熟地瘡瘍疼痛效堪題治癰疽潰後血虛疼痛不可忍者宜服之甚效歸身熟地乳香沒藥川芎白芍肉桂各一錢粟殼泡去筋膜蜜炒二錢水二鍾煎八分隨病上下食前後服之神應異功散異功散中丁木香桂苓歸朮附子強半夏陳皮參肉蔻棗姜厚朴可回陽治潰瘍陰盛陽虛發熱作渴手足並冷脈虛無力大便自利至飲沸湯而不知其熱者必服之木香官桂當歸人參茯苓陳皮白朮各一錢半夏丁香肉豆蔻附子厚朴各五分水二鍾姜五片棗三枚煎八分不拘時服此方癰疽陰症凡雜症陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑桂附子之類津液頓生煩熱頓退其應如響人但不習而察之參朮膏參朮膏中大補功地黃三味效堪雄補氣補脾並補血嘗堪委命在其中治癰疽發背等症大膿後氣血大虛急宜用此上好人參半斤切片用水五大碗砂鍋內慢火熬至三碗將渣再煎汁一碗共用密絹濾清復熬稠厚瓷碗內收貯聽用云片白朮六兩淮慶熟地六兩俱熬同上法以上三膏各熬完畢各用瓷碗盛之頓入水中待冷取起蓋勿泄氣如患者精神短少懶於言動短氣自汗者以人參膏三匙白朮膏二匙地黃膏一匙俱用無灰好酒一杯頓熱化服如脾氣虛弱飲食減少或食不知味或已食不化者用白朮膏三匙人參膏二匙地黃膏一匙好熱酒化服如患者腰膝痠軟腿腳無力皮膚手足粗澀枯槁者用地黃膏三匙人參白朮膏各三匙化服如氣血脾胃相等無偏勝負者三膏每各二匙熱酒化服此膏用於清晨並臨睡時各進一次自然強健精神頓生氣血新肉易生瘡口易合任瘡危險勢大膿多者可保終無變症夏炎天熱恐膏易變分作二次熬用亦好愈後能服鬚髮變黑返老還童以上諸方功難及此八仙糕八仙糕為何因設健脾養胃兼止泄參苓山藥芡實蓮白糖米粉延生說治癰疽脾胃虛弱精神短少飲食無味食不作飢及平常無病久病但脾虛食少嘔泄者並妙人參山藥茯苓芡實蓮肉各六兩糯米三升粳米七升白糖霜二斤半白蜜一斤上將人參等五味各為細末又將糯粳米亦為粉與上藥末和勻將白糖和蜜湯中頓化隨將粉藥乘熱和勻攤鋪籠內切成條糕蒸熟火上烘乾瓷器密貯每日清早用白湯泡用數條或乾用亦可但遇知覺飢時隨用數條甚便服至百日輕身耐老壯助元陽培養脾胃妙難盡述胃愛丸胃愛丸中參茯苓紫蘇山藥豆蔻陳蓮肉甘草蜜丸靈脾虛不食效如神治潰瘍脾胃虛弱飲食諸味不喜用過開胃進食之藥不效者此脾崩之象宜服之食進為吉云片白朮一兩鮮白者米泔浸去澀水切片曬乾同麥芽拌炒懷慶山藥一兩肥大上白者切片用男乳拌濕候潤透曬微焙上白茯苓一兩切一分厚咀片用砂仁二錢用茯苓合碗內飯上蒸熟只用茯苓清河人參一兩制畢曬乾共為細末白豆蔻三錢陳皮用陳老米先炒黃色方入同炒微燥勿焦六錢小紫蘇蜜拌透曬乾微蒸片時連梗葉切片五錢蓮肉去皮心切片五錢甘草炙三錢上共為細末用老米二合微焙碾粉泡荷葉湯打糊丸梧子大每服八十丸清米湯不拘時服二神丸二神丸來有大功誰知二味氣雄雄肉果相兼破故紙姜同棗煮起疲癃治癰疽脾胃虛弱飲食不消大便溏泄必服之破故紙微炒香色四兩肉果肥大者生用二兩用大棗四十九枚老生薑四兩切片水浸棗姜煮至水乾為度取棗肉為丸梧子大每服七十丸清米湯空心送下及治尋常腎虛脾泄俱效加減八味丸八味丸中丹皮桂山藥山萸兼五味茯苓澤瀉地黃同生津止渴如甘霈治癰疽已發未發口乾作渴舌乾黃硬者宜服茯苓山藥丹皮各四兩山萸肉五兩澤瀉蒸三兩五味子炒三兩肉桂六錢熟地搗膏酒煮八兩上共為末煉蜜丸如梧子大每服二錢空心服鹽湯送下尋常酒服亦可此又滲濕潤燥藥也紅鉛造化丹紅鉛造化出天工山藥參苓甘乳同礬面辰砂冰片麝此方原自出仙宮治癰疽元氣不足軟陷不起發或已發覆被風寒內外所侵以致瘡毒下陷變為陰塌不痛者急宜服此亦可轉陰為陽返出毒氣復腫為吉紅鉛二錢人參茯苓山藥各一兩甘草炙枯礬各五錢辰砂寒食麵各七錢五分麝香八分冰片六分乳粉二錢用頭生男乳每盤內用一小鐘曬乾共收用之上各研精細方為一處共再細研用白蜜二兩再同頭生男乳一大杯慢火重湯內用瓷碗頓蜜滴水不散為度候稍溫和入前藥軟硬得宜丸龍眼核大金箔為衣瓷罐收用或以蠟固亦妙每用一丸好熱酒一杯化藥食遠服之用厚綿帛復暖患上其熱如蒸瘡必復起作痛乃此丹之效也諸症嘔吐怔忡瀉痢屢藥不瘥異症並效大率心經之病石菖蒲肝經之病用遠志脾經之病用生薑肺經之病麥門冬腎經之病五味子各隨五經之症用五引煎湯化服其應如響以上二十四方治癰疽已潰至於收斂正病雜病變症壞症此四者俱在其中選用毋得錯亂以保終吉若不遵此法妄設他說別以奇方祕法治之終致多變但潰後氣血根本無有不虧傷者大抵補怯扶嬴理勞續損皆不出於前方此外無法也癰疽圖形第十五癰疽等症三十圖附外科諸症瘡名十律蓮子發形如蓮子頭多突起者是也腫高潰膿者生平塌陰陷者死蜂窠發形如蜂窠頭含螺子片片腐爛孔孔流膿紅活者生黑陷者死井疽心火妄動發之焮赤高腫者生堅硬紫黑者死玉枕疽膀胱濕熱凝滯而成紅腫者生紫陷者死對心發心火沸騰濕熱凝之腫高腐潰者生軟陷紫黑者死夭疽此陽火熾盛發之紅赤高腫者生紫黑平陷者死附骨疽初起大腿筋骨作痛久則漫腫出膿黃稠者生氣敗者死對口太陽濕熱結聚而成高腫易膿易腐失榮症生於耳前後及項間初如痰核久則堅硬漸大如石破後無膿惟流血水堅硬仍作腫痛異常乃百死一生之症耳後發有頭高腫者生無膿軟陷者死脫疽形如粟米色如紅棗者是也生此百人百不救脾肚癰乃飲食炙爆厚味釀成紅赤高腫潰爛者生紫黑平塌陰陷者死高腫為癰沉潰為疽有膿者生無膿者死胃口疽發在心胸之傍陽者有頭陰者無頭乃飲食炙爆所致唇疽生唇上有頭腦起寒熱交作胃經積毒所致流注起於寒熱不調氣血凝滯而生流注二癰又名臀癰也硬腫腐爛臭穢者是也棉花瘡即楊梅瘡是也婦人等症四圖乳岩中空似岩穴邊腫若泛蓮真死候也紅腫發熱疼痛者是也堅硬腐爛者是也嬰兒等症二圖赤遊丹紅如雲形者是也癰疽諸症瘡名十律其一背之左右謂疽癰手膀肩臂亦相同肺疽居右癰居左蜂癰左右近喉嚨耳後右為鋭毒看夭疽左耳後相逢左右兩肩名搭手井疽正發在心中其二流注牽藤六七成發於心上止臍平脅疽生在脅肢下陰疽大體近箕門穿踝疽穿孤拐下腳氣原來腳底生左為便毒右魚口鶴膝風從膝眼成其三肩下臑癰腋下疽喉嚨上下氣癰醫當脈兌疽君可記三寸相離穿骨基紅絲疔從手上起蛾子喉風口內隨腎疽當腎生左右三里穴發附陰疽其四離臍四寸為嚇癰再高三寸號幽癰腸癰還從臍突起胸疽乳上心肺中合谷一疔名虎口蛇頭魚肚指頭逢腦後一疽名玉枕莫作如常一樣同其五肩疽樂疽居右手石榴離肘上三分左玄陰右襠疽發咬骨陰包穴上生淵疽腎上腿附骨佛頂疽生腦頂門人世毒瘡當切記敢交患者即安生其六顴骨為疔唇上疽鬢邊所發亦疽醫眉中鳳眉防侵腦黑疔耳內不為奇鼻內生疔當速療透腦原來發際基眉尾瘭疽能大毒頰疔魚眼近腮齊其七馬刀瘰癧氣癭瘡一氣生來在頸項虎毒龍泉唇上下對口原來發下藏牙根唇上癰莫異牙下生之疽一行頂牙縫突為疔治休作人間容易瘡其八心肝脾肺腎癰疽當看胸中穴道醫更有黃頭並白泡發無定處速如飛左為坐馬右下馬尾骨頭尖鸛口疑此物殺人能致命火急攻醫切莫遲其九婦人之乳有數種高腫為癰堅硬疽還有乳岩真惡症腫如頑石破如墟鈕叩之風生頸項裙帶風瘡腳下需又有濕臁瘡等疾總生下腿上安居其十嬰兒走馬爛牙疳黑腐沿開臭不堪赤遊丹毒渾身到鵝口瘡苔滿口漫風瘡奶癬多搔癢血灌膿窠痛缺安還有心脾治熱症口疳重舌一般看
