body:
  text: 卷之一癰疽門癰疽原委論第一癰疽發背為何生好好身驅出此形凡人處世而無疾病者水升火降精祕血盈也養生篇曰毋搖爾精毋勞爾形皈心靜默可以長生此皆遠世俗忘名利無貪嗔卻疾病此惟修身保命之士所能今人豈能及哉蓋謂靜則生水動則生火又水能生萬物火能克萬物故百病由火而生火既生七情六欲皆隨應而入之既入之後百病發焉發於內者為風勞蠱膈痰喘內傷發於外者成癰疽發背對口疔瘡此皆言其大略也故成癰者壅也為陽屬六腑毒騰於外其發暴而所患浮淺因病原稟於陽分中蓋陽氣輕清浮而高起故易腫易膿易腐易斂誠為不傷筋骨易治之症也疽者沮也為陰屬五臟毒攻於內其發緩而所患深沉因病原稟於陰分中蓋陰血重濁性質多沉故為傷筋蝕骨難治之症也凡年壯氣血勝毒則順年老毒勝氣血則險治法載於第二論中宜詳觀之內被七情干臟腑憂愁思慮總關心七情六欲者盜人元氣之賊也人能疏於此者無不多安多壽人若親於此者無不有損有傷但人能味之者鮮矣蓋情欲之動作無所不好無所不為故喜傷心怒傷肝憂傷肺思傷脾悲傷於魂魄恐傷腎驚傷膽此等七情皆耗人一身元氣之萌孽也至於六欲者耳聽聲音眼觀物色鼻聞香氣舌貪滋味心帷大地意幄萬方此等六欲皆損人三世鍾靈之真性也又所以為苦為疾為夭為疼以及休廢衰敗諸病諸瘡盡皆出於此等之情欲也醫者患者亦宜慎察之外又六淫傷氣血風寒暑濕火相臨六淫者風寒暑濕燥火是也風為四時不正浩蕩肅殺之氣發而最能中人寒乃節候不調疾風暴雨冰雪嚴寒所傷或口貪生冷之物暑因亢陽酷日爍火流金濕熱熏蒸而中濕從坐臥久陰卑濕之地或身驟臨風雨潮氣所侵燥為陰虛內熱消爍津液不能滋潤臟腑以致皮膚枯槁便乾為燥火生於心緒煩擾醇酒膏粱房欲不閒所動此六淫者皆從外而入之體實之人遇而不中者有體弱之人感而隨發者多又有感之不發邪氣客於臟腑經絡關節之內積襲日久或待內傷或因外感邪氣觸而發之既發之後當參寒熱溫涼邪正勝負而治之膏粱厚味多無忌勞傷房欲致虧陰膏粱者醇酒肥鮮炙爆之物也時人多以火炭烘燻或以油酥燥煮其味香燥甘甜其性鹹酸辛辣又至於塗藏厚料頓煮重湯以取其爽口快心不顧其消陰爍臟又得於寵妾滿前精神飛曠溫床厚被爐火圍匡每至於未飢先食未冷先綿快意從心色力太過稍有不及便去興陽惟取快意於一時不覺陰消於平日況所生是疾者不起於藜藿盡屬於膏粱誰識膏粱味短不及藜藿味長凡知命者當遠之避之擇而用之可也故將五臟多乖變自然六腑不調勻五臟屬五行金木水火土是也常欲相順相生所得木生火火生土土生金金生水水生木此五臟相合相生理稟太和之氣其疾何以生焉是為疾者五臟必相反相剋所被木剋土土剋水水剋火火剋金金剋木此五臟相刑相剋理返互變之機其疾再無不作者所謂相生者昌相剋者亡此誠為萬物生克一定之理豈止於疾病言哉又謂五臟不和則六腑不通六腑不通則九竅疲癃九竅疲癃則留結為癰蓋癰疽必出於臟腑乖變開竅不得宣通而發也治當寒邪而痛者以溫熱散之濕腫強痛者滲而導之燥搐攣痛者滋而潤之泄而痛者溫之塞而痛者通之虛而痛者補之實而痛者瀉之陰陽不和者調燮之經絡祕澀者沖和之膿脹而痛者開之惡肉侵蝕者去之勞而痛者逸之損而痛者續之此等皆為活法惟在用者詳之發於心上多危險五臟相干事可明五臟者心肝脾肺四臟皆繫於背惟腎經一臟獨居於下雖居於下其臟精華津液元氣元神盡行灌溉榮注於上故四臟之火皆賴一臟之水以濟之所謂五臟根本皆繫於背即此之意也凡發癰疽者未有不先傷五臟而後發之況背乃太陽膀胱督脈所主太陽者六經之首領也督脈者十二經絡之統脈也所以瘡生於背毒犯於此況心乃又屬君主之位豈容毒相犯之凡發於此故多成危險難治之症醫者不可不慎而察之心之已下多成順六腑之因亦許評凡瘡生於心之以下者除腎俞一穴外皆為緩六腑者足陽明胃經手太陽小腸經足太陽膀胱經手厥陰心包絡經手少陽三焦經足少陽膽經此六經其名屬腑其形在下其氣主表其病為癰故疾發於五臟者為重生於六腑者為輕此為表裡臟腑輕重之別也脾家積毒生肩脊發生於肩下脊上者乃因飲食膏粱積毒所致發出高腫鮮明根腳不過兩肩者為順先宜解毒護心為主次宜內托清心為要間用蠟礬丸護心散防毒攻心如腫平堅硬漸大漸開攻注兩肩胸項腫而不定者危心經火毒對心臨對心發者乃心火妄動熱極而發之也況心為主宰周身蘊熱流會於此其結為患又稱毒剗君位最易傷人刑截督經害非輕淺況此穴背脊多坑固難起發瘡形落陷腫不高尖治當大降心火急疏蘊熱頂用針通隨行拔法務使毒氣內外疏通各從門出庶不內攻方為成守保至十五日後內無變症得膿為解如是期變症漸生堅硬漸大不作膿者死在二十二朝先後但此症貴在乎早治十中可保其三四也兩肩左右雙生髮肺肝積受不虛名左搭屬肝右搭屬肺俱生於左右肩骨移動之處為可治古云左搭串右右搭串左俱為難治今治不然余每醫左右相串者未嘗見其死惟在治法得宜有此症者先用萬靈丹發汗疏通內外次以清肝解鬱湯柴胡清肝湯氣用四君子湯血用四物湯潰後八珍湯俱兼六郁湯參而調治誠為妥當但此症原起於痰凝氣滯火鬱氣血不調所生正謂郁者開之滯者行之如誤用瘡科解毒泄氣誤補誤攻之藥必致多危蓮子蜂窠防毒陷蜂窠蓮子二發多生於背與心相近與脊中平輕者形長高腫或偏半背重者形斜平塌兩脅俱傷孔似蜂窠突如蓮子瘡形雖畏常能多險多生老弱不堪反取常安常穩大規只怕不純陽治法何妨瘡勢惡護心護膜丸丹須要調停執藥執方活法在乎醫意機參總論法決存亡腰間腎俞發難生腎俞發者生於兩腰內腎陷肉之間或正中亦發凡生於此者最為險候蓋內腎乃為性命根本藏精藏氣藏神又謂受命先天育女育男育壽此等皆出於腎臟之一竅也是為疾者房勞過度氣竭精傷欲火消陰外陽煽惑以致真水真陰從此而耗散既散之後其臟必虛所以諸火諸邪乘虛而入既入之後渾結為瘡如本臟稍有真陰制火瘡形自可紅活高腫為膿治以人參養榮湯加山萸五味子黃柏知母及加減八味丸以救其源也若瘡形色紫黑乾枯堅硬不作膿者為真陰內敗再無可生之理必死在十五日前後為期也督脈經虛從項發俗名對口故相稱對口者生於項後而對前口者是也但有偏正之不同發於正者屬督脈所主發於偏者乃太陽膀胱所司二者皆起於濕熱上攻凝結而成也督脈者發瘡雖正而反為易治因督脈起於下而貫脊行於上故毒氣得之反能衝突高腫使邪毒不致下流低陷乃為外發故多易治膀胱者發瘡雖偏而每為難治蓋膀胱之脈起於巔頂貫項兩旁順下而行乃與瘡毒交會下流故瘡多平塌又太陽膀胱主司寒水其質多冷多沉故瘡於此多難起發形色多難紅活堅硬難潰又易流注兩肩胸項作腫十五日外無膿者必然變黑歸陰故多不治俗呼以正為重以偏為輕此皆庸說不得其消息故也治以黃連消毒飲主之余皆降火化痰解毒清心托裡為要也何期耳後多生髮夭疽鋭毒不非輕發生於耳後一寸三分致命之處誠為險惡之候又左為夭疽右為鋭毒夭者妖變之物也故屬肝木鋭者鋒利之器也是屬肺金二者皆起於積想在心謀慮不決致火旺而又郁鬱而又旺以成此疾也故形多堅硬頭多隱伏未潰先黑未膿先腐臭穢易生元氣易敗常得此者毒氣多致不得外發後必內攻而死但此症者初生起於隱微令人多不知覺及其知覺毒已入內矣如紅活高腫易膿易腐者無妨又有脫疽生手足脫疽之發脫者落也疽者黑腐也此毒皆多生手足發在骨筋初生如粟色似棗形漸開漸大筋骨伶仃烏烏黑黑痛割傷心殘殘敗敗汙氣吞人延至踝骨性命將傾此非天命自喪其身古人有法截割可生今人誰肯割截為名治法雖有詳在後文慢腫難治焮腫易總論中間法可憑慢腫者肉腫瘡不腫是也焮腫者瘡腫肉不腫亦是也此二者發瘡陰陽之大體辨症順逆之末節由此觀之一決而定也瘡之初起理當升發潰膿之後不可用內消宜用托藥如不應者乃毒勝氣血死在旬日或已發出而不腐潰根腳堅硬或軟而散大者急投托藥大補脾胃不應死在二旬若已潰而色不變紅活亦不生肌收斂瘡口暈大腫痛不減胃氣不回急須峻補不應者乃脾崩死在月餘諸瘡另有分門說豈許輕於紊此呈癰疽治法總論第二癰疽發背怎生醫不論陰陽先灸之不痛灸至痛疼灸不疼時凡看癰疽腦項等發大瘡先要從容立定主意以見標日期為始到今幾日看瘡形與日期可否相對相應則多吉不應則多險次看受病之源發於何臟腑出於何部位但身體有上下部位有險否形色辨順逆精神論有無再看年紀老壯氣血盛衰發陰發陽毒深毒淺以陽為易治者多生以陰為難治者多死方診脈之虛實可知順險以決其終凡瘡未潰前脈要太過一二至已潰後又宜不及二三分此為脈病相應首尾自不變生如其相反恐防不測但看法全在目力精巧與心相應一一參明表裡透徹然後方定治法凡瘡七日以前形勢未成元氣未弱不論陰陽表裡寒熱虛實俱先當灸輕者使毒氣隨火而散重者拔引郁毒通徹內外所得火引毒氣混合為陽方能發腫作痛然後可汗可攻或消或托兼求標本參治必以脈合藥以藥合病如此治之自然無錯矣故藥難執方全在活法大抵關節首尾俱不可損傷元氣脾胃為要內服蟾酥丸一服外將神火照三枝凡瘡初起七日之前或已灸之後未服他藥宜用蟾酥丸一服得汗解為妙或萬靈丹發汗亦可所謂毒氣隨汗而散最為捷徑如二藥服後發汗不出此乃表裡閉密之故毒亦不輕當神妙拔根方施治神燈照法甚效亦不可用之太早如瘡四五日之間形未聚毒未出若用之早恐留鬱而內毒反致難出用須在八九日之後瘡勢已定毒氣已聚未成膿腐之時用此照之已成者自高未成者自消不潰者自潰不脫者自脫亦且解毒活血消腫散瘀之良法也用膏貼頂上敷藥四邊圍凡瘡最忌風寒所襲初起之時或已灸之後俱當用太乙膏蓋貼頂上功效在於拔毒提頂提膿防禦風寒不入如焮痛高腫陽瘡七日以後瘡頭自有黃色稠膿相黏膏上余腫紅色光亮鮮明每日宜用蔥湯洗淨換藥貼之其正膿定在十一日前後出也此為易治易安之症如七日之後瘡不大腫高四邊又不焮痛瘡頭亦無膿意相黏此為陰陽相等之症宜用化腐紫霞膏塗瘡頂上外以膏藥蓋之換至十日外瘡頂漸腐余腫漸高似有膿意之象其正膿只在十五日之後可出也此為以險成順之症至於二十日以後無膿者乃純陰之症縱治亦無效矣又如瘡之四邊根腳余腫其功又在敷藥收束根本庶不開大初起時宜用金黃散敷於四邊乃拔毒消腫止痛既潰後當用鐵桶膏箍之庶瘡根漸收漸緊但諸瘡原因氣血凝滯而成切不可純用涼藥冰凝肌肉多致難腐難斂必當溫暖散滯行瘀拔毒活血藥用之方為妥當也氣盛兮頂自高而突起血盛兮根腳束而無疑氣血者人之所原稟老者尚或有餘少者亦有不足人之命脈全賴於此況百病生焉失此豈能無變獨瘡科尤關係不淺但腫瘍時若無正氣衝托則瘡頂不能高腫亦不能焮痛潰膿則無真陰相滋則瘡根不能收束色亦不能紅活收斂凡視瘡之頂高根活不論老少定知氣血有餘故知老幼俱可無妨又宜交會明白交會者瘡根與好肉交界之處高低自然分別明白者瘡形與好形各無混雜自然分明也以此觀之瞭然明白矣高腫起者忌用攻利之藥以傷元氣平塌漫者宜投補托之劑以益其虛凡瘡初發自然高起者此瘡原屬陽症而內臟原無深毒亦且毒發於表便宜托裡以速其膿忌用內消攻伐之藥以傷脾氣膿反難成多致不能潰斂又瘡初起不高不赤平塌漫者此乃元氣本虛急宜投托里溫中健脾之藥務要催托毒氣在外庶無變症矣內熱甚者量加消毒清劑便祕燥者必須通利相宜使臟腑得宣通俾氣血自流利腫瘍時內熱口乾脈實煩躁便祕喜冷者此為邪毒在裡急與寒涼攻利宜內疏黃連湯四順清涼飲內消沃雪湯俱可選用又兼有表症者防風通聖散去麻黃或雙解散加桔梗天花粉又或小便不利者兼入天水散五苓散俱可合用務使二便通利以杜其源又有元氣素虛者恐不勝前藥以托裡消毒散加蜜炒大黃或兼豬膽套法亦得通利為度首尾俱要閉而不結通而不泄得臟腑和平表裡透徹方可使用托裡排膿內補之藥又如潰瘍時雖有口乾便閉臟腑不和小水不利等症此因潰後膿水出多內亡津液氣血虛耗不能榮潤臟腑所致其人必脈細而數口和而干飲食減少好飲熱湯此乃虛陽之火為病非前說有餘所比只宜養氣血滋津液和臟腑理脾胃如此治之則二便自和亦無變症常有誤行攻利多致不救者有矣十日之間瘡尚堅必用披針當頭點破凡瘡十日以後自當腐潰為膿如期不作膿腐仍尚堅硬者此屬陰陽相半之症瘡根必多深固若不將針當頭點入寸許開竅發泄使毒氣無從而出必致內攻也倘內有膿又便易出此為開戶逐賊之意也亦有十日外瘡雖不腐潰形尚紅活焮熱腫痛此雖膿遲後必有出此又不必針之蓋緣元氣不能充足或失用補托之藥又誤用寒涼或蓋復未暖多致膿遲有此症者宜用補中健脾大托補藥以得膿為效又以十五日至二十一日為期過此外者縱有稀膿但元氣被毒相距日久必致耗散誠難歸結也半月之後膿亦少須將藥筒對頂拔提有膿血之交黏必腐肉之易脫如瘡半月後仍不腐潰不作膿者毒必內陷急用披針品字樣當原頂寸許點開三孔隨瘡之深淺一寸二寸皆可入之入針不痛再深入不妨隨將藥筒預先煮熱對孔竅合之良久候溫取下如拔出之物血要紅而微紫膿要黃而帶鮮此為血氣營運活瘡其人必多活又謂膿血交黏用藥可全色鮮紅活腐肉易脫如拔出瘀血紫黑色敗氣穢稀水無膿者此為氣血內敗死瘡所謂氣敗血衰神仙嘆哉此等之瘡難久候其人必在月終亡且如斯時內有膿而不得外發者以針鉤向正面鉤起頑肉用刀剪當原頂剪開寸余使膿管得通流庶瘡頭無閉塞已用藥筒拔膿之後外既有孔內竅亦通瘡期又當大膿發泄之候如尚膿少亦非自然得出故瘡頭必有瘀腐塗塞內肉亦有頑膜阻隔多致膿管不通自難出也須用針鉤鉤起瘡頂頑肉以披針利剪隨便取去寸余頑硬之肉取之微痛亦自血出俱自不妨隨用兩手輕重得宜從瘡根焮處漸漸捺至中間剪出膿管處內有聚膿自然湧出以黃色稠厚為吉其膿日漸多者為輕反此為慮此功務使塗塞者開之令膿毒外發也頻將湯洗切忌風吹凡瘡未潰前或已用照藥後俱要煎蔥艾湯每日淋洗瘡上一次甚者早晚二次使氣血疏通易於潰散又已潰時及藥筒提拔之後尤宜避風先去舊藥用方盤靠身瘡下放定隨用豬蹄湯以軟絹淋湯瘡上併入孔內輕手捺淨內膿庶敗腐宿膿隨湯而出以淨為度再以軟帛疊成七八重勿令大幹帶湯復於瘡上兩手輕盈旋按片時帛溫再換如此洗按四五次使血氣得疏患者自然爽快亦取瘀滯得通毒氣得解腐肉得脫疼痛得減此手功之要法大瘡不可缺也候腐脫已見紅肉時洗後隨用玉紅膏用抿腳挑膏於手心上捺化搽塗患之新舊肉上外用太乙膏蓋之四邊根腳已消處不必箍藥每日如此用之不數日間膿腐盡脫新肉頓生更加內補調理得宜輕瘡只在月餘大瘡不過七十日必完口而愈又關節在於斯時變生出於此候關節者陽瘡以十四日為關陰瘡二十一日為節此時務要出膿勢定不可過攘但膿出方自腐脫腐脫方自肌生肌生方自收斂收斂方自瘡平此為瘡之關節亦由次序來也如期不得膿者後必便有變生為一關順後必多順一關逆後必多逆以此觀之不可不察也治當大補得全收斂之功切忌寒涼致取變生之局凡瘡潰膿之後五臟虧損氣血大虛外形雖似有餘而內臟真實不足法當純補乃至多生但見已潰時發熱惡寒膿多自汗作痛者便進十全大補湯但見虛熱少睡飲食不甘者便進黃耆人參湯但見皮寒虛熱咳嗽有痰者便進托裡清中湯但見四肢倦怠肌肉消瘦面黃短氣者便進人參養榮湯但見膿多心煩少食發躁不睡者便進聖愈湯但見脾虧氣弱身涼脈細大便溏泄者便進托裡溫中湯但見飲食不甘噁心嘔吐者便進香砂六君子湯但見脾虛下陷食少虛熱間作者便進補中益氣湯但見腎虛作渴不能相制心火者便進加減八味丸仿此選用蓋托裡則氣血壯而脾胃盛使膿穢自排毒氣自解死肉自潰新肉自生飲食自進瘡口自斂若不務補托而誤用寒涼謂之真氣虛而益虛邪氣實而益實多至瘡毒內陷膿多臭穢甚則脈洪大渴面紅氣短此真氣虛而死矣蓋瘡全賴脾土調理必要端詳脾胃者脾為倉廩之官胃為水穀之海胃主司納脾主消導一表一里一納一消運行不息生化無窮至於周身氣血遍體脈絡四肢百骸五臟六腑皆藉此以生養又謂得土者昌失土者亡蓋脾胃盛者則多食而易飢其人多肥氣血亦壯脾胃弱者則少食而難化其人多瘦氣血亦衰所以命賴以活病賴以安況外科尤關緊要善養生者節飲食調寒暑戒喜怒省勞役此則不損其脾胃也如不然則精神氣血由此而日虧臟腑脈絡由此而日損肌肉形體由此而日削所謂調理一失百病生焉故知脾胃不可不端詳矣冬要溫床暖室夏宜淨幾明窗但人之氣血喜暖而惡寒又謂遇寒則結遇熱則散況瘡乃肌肉破綻之病若不御風寒最為易襲凡看瘡時冬要著紫炭之火旺旺暖氣逼盡余寒夏宜淨幾明窗亦庶外風不入然後方可揭膏洗貼瘡上常見患者夏月縱意當風取涼或睡臥陰濕之處冬又不從溫床暖室多致寒侵輕則有妨生肌完口重則變為崩塌不膿不斂陰症此常有也凡重命君子可不預慎哉飲食何須戒口冷硬膩物休餐飲食者人之所賴以生養必要適其時而食之如人之病中腫痛時自然痛傷胃氣諸味不喜直待潰後膿毒一出胃氣便回方欲思食彼時但所喜者便可與之以接補脾胃如所思之物不與此為逆其胃氣而反致不能食也切要不可太過惟忌者生冷傷脾硬物難化肥膩滑腸故禁之余隨便用也癰疽雖屬外科用藥即同內傷古之以外科推為雜病之先蓋此傷人迅速關係不淺故特設於前也且如癰疽腦項疔毒大瘡形勢雖出於外而受病之源實在內也及其所治豈可舍於內而治外乎所以外不起者內加托藥表熱甚者內必清解血虛宜用四物湯氣虛宜用四君子脈虛足冷溫中脈實身熱涼膈以此推之內外自無兩異但世以瘡形言之曰外科治以氣血言之即內傷凡醫者治法不可混於內理以致生變症脈虛病虛首尾必行補法表實裡實臨時暫用攻方丹溪云凡瘡未破毒攻臟腑一毫熱藥斷不可用凡瘡既破臟腑已虧一毫涼藥亦不可用誠哉是言也茲說又有不然且如初病未破時脈得微沉緩澀細數浮空外形又兼身涼自汗便利嘔吐少食者瘡形又不起發不焮不痛無潰無膿此等症者皆緣氣血虛弱之故若執前云未破毒攻臟腑之說必投涼藥攻之復損元氣患者其生乎其死乎豫論治病不論首尾難拘日數但見脈症虛弱便與滋補乃可萬全如補不應未可安然虛弱甚者須用參朮膏八仙糕陽虛自汗食少者單人參膏或六君子湯加砂仁木香甚加附子泄瀉腸鳴胃虛嘔逆者參苓白尤散加豆蔻山藥木香柿蒂脾虛下陷溏泄及肛門墜重者補中益氣湯加山藥山萸五味子以此選用又有表實者身體發熱無汗惡寒裡實者脈大身熱便燥口乾假如表症急者先用荊防敗毒散以解其表里症急者先用四順清涼飲以攻其里表裡相兼者宜防風通聖散發表攻裡此隨其表裡先後皆在活法暫時之用也於意受補者自無痰火內毒之相雜不受補者乃有陰火濕熱之兼攻又謂補而應藥者多生虛而不受補者不治病要論久新要法在於寬治猛治且如人之病有新久勢有緩急如受病之初元氣未弱治當隨症迎刃而解若懼行霸道猛劑定不能決效於危急時也但要中病即已故謂藥不瞑眩厥疾不瘳且如表症盛者用萬靈丹大加表散里症急者以內疏黃連湯急與通行又如受病日久邪正相拒其元氣未有不衰弱者縱有餘症雜症壞症俱當先固其本而後調之和之散之使病氣漸退元氣漸醒飲食漸進根本漸實則余患再無不愈之理所謂勢孤則守本立道生常見治者不論病之新久本之盛衰又不悟因虛致病因病致虛其中又有虛熱虛寒之別一例妄行攻治如盲人騎瞎馬半夜臨深池豈不致危哉藥必求標本功莫別於先醫後醫若一概之攻補恐兩途之誤用凡物理皆有標本而身病之標本尤莫切焉且以天地運氣標本言之以五運為本六氣為標此所以參天地之化育明五行之生克考節候之寒溫察民病之凶吉又主萬物榮者皆榮疾者皆疾此所屬天地氣運之標本也以身體標本言之以五臟為本六腑為標五臟主裡主血六腑屬表屬氣此所以主臟腑氣血之盛衰稟筋骨髓腦之強弱司疾病之淺深發生成之壽夭此所屬身體陰陽之標本也以疾病標本言之先以初病為本後以傳病為標又以元氣為本病氣為標此所主寒熱表裡緩急之病應汗下補瀉和解之方凡治病者必先治其本後治其標誠為妥當若先治其標後治其本使邪氣滋甚其病益增又謂緩則治其本急則治其標假如先得瘡疾而後得泄瀉嘔吐食少等症此又宜捨本從標之法治之候泄止嘔定食進方再治瘡余皆仿此若一概攻補必兩途誤用此所屬疾病邪正之標本也又說陽變為陰內外被寒涼克伐瘡本發於陽者為癰為熱為實為疼此原屬陽症易治多因患者不覺以為小恙不早求治反又外受風寒內傷生冷或又被醫者失於補托而又以涼藥敷圍圖其內消之以合病家之意多致氣血冰凝脾胃傷敗使瘡毒不得外發必致內攻凡此症往往不救者多矣如瘡變在十一日未出膿之前形勢與好肉相平不疼不熱軟慢相兼瘡孔止流清稀肥水更兼身體不熱脈亦細微飲食厭餐精神昏短有此症者瘡毒變入真陰雖強投溫中健脾之劑不應者百無一生之理如瘡變在十五日之後已出膿時毒氣已將外發如有調攝失宜誤餐冷物忽變為陰者急投托里溫中湯十二味異功散輕者十全大補湯俱倍加參耆桂附以救之須得瘡熱作痛膿出身溫脈起食進者為吉但瘡原本為陽其人故得多生者有矣豈期陰變為陽首尾得辛熱扶裝病分真似理究陰陽瘡本發於陰者為疽為冷為硬為虛此原屬陰症難治患者知覺欲其生而故將辛香酒煎大方熱藥以助之醫者又欲患處高腫焮熱作膿敷以熱藥圖其起發故瘡得藥性大熱而轉陰為陽其瘡雖得微腫微熱微痛微膿但瘡形終不似真陽紅活亦不能得其真厚黃膿如此者其瘡不久復歸陰矣但瘡原本於陰其人故多死凡值此症若患者方寸不雜托信於醫而醫者又得機關透徹治法得宜內外融和偶偶中節其中亦有可生者十中一二矣其要如救焚拯溺可施者毋待少頃其切似履冰淵可禁者毋妄絲毫如此而不得其生患者實天命而已既有針工之異說豈無線藥之品詳凡瘡毒既已成當托其膿膿既已成當用針通此舉世自然之良規也必當驗其生熟淺深上下而針之假如腫高而軟者發於肌肉膿熟用針只針四五分腫下而堅者發於筋脈膿熟用針只在六七分腫平肉色不變者毒氣附於骨也膿熟用針必須入深寸許方得見膿又輕按熱甚便痛者有膿且淺且稠重按微熱方痛者有膿且深且稀按之陷而不起者膿未成按之軟而復起者膿已成按之都硬不痛者無膿非是膿即瘀血也按之都軟不痛者有膿非是膿即濕水也所謂有膿即當針膿孔宜順下若膿生而用針氣血反泄膿反難成若膿熟而不針腐潰益深瘡口難斂若膿深而針淺內膿不出外血反泄膿淺而針深內膿雖出良肉受傷元氣虛者必先補而後針其膿諸症悉退又有氣癭腫而綿軟不痛者血癭腫而內壘成塊者頑毒結之日久皮腐肉紫根硬四邊紅絲纏繞者以及結核之症漸大漸痛漸腐者以上四症俱不可輕用針刀掘破若妄用之定然出血不止者立危但用針之法妙在膿隨針出而寂然無所知覺也至於癭瘤瘰癧諸痔諸漏疔毒堅硬頑瘡此等症者若非線藥之功亦不能刻期取效夫線藥乃有五六種難以概說與其各病相應者亦隨症附例於各門以便選用故未述於此篇凡用者宜善而用之湯散丸丹要在發而必中神聖工巧誠為學者機關為醫善用方如將善用兵善於水者涉海潛波瞞津撲浪善於陸者穿山越嶺附葛攀藤奇偶者鼓舞飛揚蹊徑者浮沉鑽鑿弱者可守強者當敵此為將得兵用兵之大法也如為醫者理皆仿此其要在知人之強弱識病之內外究病之淺深察時之順逆然後可汗可攻或吐或下或宜和解或宜補益又知某湯善汗某散善攻某丸善和某丹善補因其病而用其方如矢發機投之必中中之必勝勝之則病無不愈之理此為醫得方用方之大法也又如望聞問切神聖工巧亦可兼之所謂望其形而通其神聞其聲而明其聖問其由而得其工切其脈而續其巧此四者誠為初學之繩墨也至於千方百症難將說盡短長方不在多心契則靈症不在難意會則明方不心契症不意會如疏淡之交寡遊之地性情形勢不切何以便托用哉故藥不應病病不應藥即此據也治在活法貴在審詳嘗言昔者承平今時擾攘所以動靜世務不同勞逸機關已異當原受病從外而來今之受病從內而發又古者多實設方宜散宜宣故今者多虛治法宜滋宜補若醫者不識古知今一概施與必多致其夭亡者也用之必得其當醫斯可以稱良詞雖近於粗鄙可為後學提綱癰疽陽症歌第三癰疽不論上中下惟在陰陽二症推發背雖有正與偏要取高低兩樣看純陽初起必焮腫更兼身熱有微寒頂如尖字高突起腫似彎弓根有盤七日之間多焮痛二七之間膿漸漫動息自寧食知味二便調勻無瀉干腫消膿潰精神爽脫腐生新氣血完五善自然臻並至七惡全無半點干痛便隨膿減腫退自肌寬新肉已生紅豔豔腐皮自斂白漫漫一身多爽快五臟盡和歡此屬純陽俱易治百人百可保全安癰疽陰症歌第四純陰初起不知瘡粟米之形疙瘩僵不紅不腫不知痛少熱少焮少提防七朝之後身體倦瘡根平大喜澆湯頂不高兮根不活色不光兮腐不穰陷軟無膿空結聚脈浮散大細飛揚飲食不餐身戰戰嘗湯止許意忙忙瘡上生衣如脫甲孔中結子似含芳膿多臭穢身難便舉動愴惶韻不長瘡形成紫黑面色變青黃精神昏憒多鼾睡言語無人自發揚口乾多舌強痰喘定身亡此屬純陰俱不治百人百可到泉鄉癰疽半陰半陽症歌第五陰陽之症兩相交生死同兼事可招微熱微寒微赤腫半昏半爽半平高脈來雖數多無力飲食雖餐便不消腫而不潰因脾弱潰而不斂為膿饒大便多溏小便數上身有汗下身焦五善雖兼有七惡未全逃口渴喜茶腸腹痛面浮饜飲足心高心煩不穩睡神亂怕音焦投方應病方為妙陰轉為陽漸可調心真造化爾命堅牢逢之任是神仙手半死餘生定莫逃癰疽五善歌第六心善精神爽言清舌潤鮮瘡疼兼不渴睡醒得安然肝善身輕便因煩自不煩指頭紅活色坐起覺平康脾善唇滋潤衾幃蘭麝香凡餐俱有味膿厚更肥黃肺善聲音響無痰韻更長肌膚多滑潤大便自尋常腎善誠為要水升火自降口和兼不渴小水得稀長癰疽七惡歌第七一惡神昏憒心煩舌上干瘡形多紫黑言語自呢喃二惡腰身強目精邪視人瘡頭流血水驚悸是肝迍三惡形消瘦膿清臭穢生瘡形多軟陷脾敗不知疼四惡皮膚槁聲嘶韻不長疼多兼喘急鼻動肺將亡五惡成消渴隨飲即隨干形容多慘黑囊縮腎家端六惡身浮腫腸鳴嘔厄頻大腸多滑泄臟腑並將傾七惡瘡倒陷形如剝鱔同四肢多冷逆汙水自流通治病則例歌第八外科之瘡有治例說與君家須切記病端百出別根因方法一囊豈同類熱與寒通與祕其中消息知端的通多不足祕多餘熱實寒虛分症治陽似陰陰似陽似中妙理要推詳不分表裡一例治輕變重而重變亡醫者貴乎多應變不可偏執用其方且如表症惡寒宜用荊防敗毒散里症發熱可將內疏黃連湯瘡勢已成托裡消毒散誠為正法內膿將潰十全大補湯最得相當人參養榮湯治潰後虛熱發作木香流氣飲散結腫寒濕為殃飲食不甘定用香砂開胃精神怯少須將參朮回陽陰虛陽虛須八珍最為要領盜汗自汗得獨參一味可強潰後多疼乳香定痛散功奇莫緩脾虛下陷補中益氣湯功效尤良口燥譫言瀉實火須黃連解毒湯心煩衄血理虛陽必犀角地黃湯古法治癰疽稱述仙方活命飲今時醫發背還期神授衛生湯蟾酥丸在外科稱為獨品護心散解內毒號曰無雙詎知蠟礬丸護膜護心可羡淡中有味還贊玉紅膏生肌生肉堪誇壞里呈祥身涼自汗腹痛腸鳴嘔逆豈逃異功散睡臥不寧虛陽發燥膿多定用聖愈湯生脈散接虛羸脈來微細歸脾湯除驚悸睡得安康竹葉石膏湯治虛煩身熱者何須疑慮麥冬清肺飲除膈熱有痰者毋待商量金鯉湯治肺癰吐膿氣急玄龜丹攻結毒臭腐頑瘡風熱生瘡通聖散瘡瘍狂躁破棺丹小柴胡湯除客邪往來潮熱大防風湯攻腿膝寒濕為殃咽腫咽疼定用清咽利膈散斑紅斑紫豈逃化斑解毒湯八味丸捐口乾妙藥二神丸治脾泄奇方香連丸為臟腑瀉痢通用甘露飲治口齒腐爛相當六和湯和脾止吐瀉雙解散解表理內傷逍遙散善治女人諸病保元湯常扶赤子多傷皮膚毛髮乾焦蘆薈丸效應甚捷咽喉口齒腫痛冰硼散功實非常滋腎丸治下元腎虛不固涼膈散解上焦膈熱多煩九龍丹消魚口吞之滅跡二蛟散行濕腫服下安康呂祖一枝梅止痢定驚稱為仙藥真君妙貼飲消疼止痛號曰神方痔漏癭瘤疔毒古誇三品錠癰疽流注諸風今羡萬靈丹柴胡清肝湯治鬢疽肝膽有效黃連消毒飲醫對口督脈尤良小兒口內生疳必用人中白散大人咽喉腫痛須將金鎖匙湯下疳新久珍珠散小便淋澀木通湯玉真散破傷風效復元湯跌撲稱強提肩散治胳膊強直作痛拈痛湯除痛腿風濕相傷小便生疳龍膽瀉肝湯可羡大頭腫痛普濟消毒飲何妨便毒懸癰內消散吞何足慮臀癰腿病耆柴湯下自無殃又有女子陰瘡能腫能疼能至癢在人活法或消或補或驅蟲蓋男子之囊癰瀉肝經之濕熱小兒赤遊丹解毒兼砭血凡治楊梅瘡戒熏為至切舌下發痰包利剪方能泄出如雞蛋清消痰是真訣結毒與頑瘡紫金膏可設風瘡徹骨癢雄黃散效絶疔瘡先刺血內毒宜汗泄禁灸不禁針怕綿綿者毒陷也不怕鐵鐵者入針堅硬有聲又有失榮腫堅硬如岩凸強陰失道症形狀要分別婦人之乳岩此中一例決未破肉嶒稜已潰流臭血如此幾般症古今無治說瘡有數百種難以都陳曰惟在一點心何須三寸舌學者若精靈萬事皆通徹此為粗糙歌可譏亦可閲癰疽灸法並禁灸瘡穴第九凡瘡初起惟除項之以上余皆並用艾火隨瘡勢之大小灸艾壯之多少用蒜切成薄片安於瘡頂上著艾炷蒜上點火三壯一換蒜片初灸覺痛以不痛似癢為止初灸不痛以知痛癢為住如初灸全然不覺痛癢宜去蒜當明灸之又陰瘡日數多者艾炷不及其事以蒜搗爛鋪於瘡上以艾亦鋪蒜上點火灸之必知痛甚為效此為火氣方得入里知痛深處方是好肉蓋艾火拔引郁毒透通瘡竅使內毒有路而外發誠為瘡科首節第一法也貴在乎早灸為佳又有禁灸數症亦以參詳頭乃諸陽之首純陽無陰之處凡生瘡腫俱有亢陽熱極所致如再加艾火使毒氣熾甚隨後反加大腫最能引動內痰發之必死面生疔毒亦然又有腎俞一穴在於兩腰脊傍系內腎命根所繫之處此穴發瘡多因房勞素虧腎水枯竭而成若再加艾灸火爍其源必致內外乾涸多成黑陷昏悶而死又有患者元氣素虛發瘡多不高腫其人體必倦怠精神必短而昏脈必浮散空虛數而不鼓此內無真氣抵擋火氣如灸之其人必致昏憒而死常謂艾火不虧人此言誤之多矣醫者亦宜詳察之論病生死法第十初生如粟里可容谷外面如麻裡面如瓜外面如錢里可容拳起勢大終無害未老先白頭無膿軟陷休瘡從疙瘩起有膿生方許腫潰氣昂昂不治自安康根高頂又高八十壽還饒焮痛易腐爛任大終無恙瘡高熱焮疼雖苦必然生瘡軟無神氣應補方為益肉腫瘡不腫必竟生疑恐膿穢不進食泄瀉黃泉客瘡色豬肝紫無膿必定死綿潰不腐爛內怕葡萄嵌仰臥不知疼陰症命難生腐盡有敗氣笑里終生戾根散瘡平塌神仙無治法久病目露神必竟命難存面忽似塗脂十日後分離敗中有紅肉雖重生門路新肉如板片不食終須變手足皮枯槁血敗生難保唇白眼無神腹脹瀉將傾醃氣不滃氣雖重多生意眼匡黑氣濃癰疽怕此逢房中香馥馥是病終為福瘡熱身微熱輕病何須說生死此中求片言一可決察形色順逆第十一凡看人病兼視其形色後與脈病相參誠識於始以決其終百無一失矣何以知之陰病見陽色腮顴紅獻陽病見陰色指甲呈青此二者俱死又身熱脈細唇吻反青目珠直視者死面如塗脂色若土黃油膩黑氣塗抹者死唇舌乾焦鼻生煙煤眼神透露者死形容憔悴精神昏短身形縮小者死喘粗氣短鼻焮睛露語言譫妄者死循衣摸床遺尿失禁撮空者死頭低項軟眼視無神歙歙短氣者死皮破無血肉綻爛斑麻木不知痛癢者死齒黃色如煮豆唇白反理無紋耳黑枯焦不聽人中縮而坦平口張氣出無回閉鼻煽相隨呼吸行汗出如珠不散痰若膠而堅凝白血紅如肺色指甲彎而帶青神昏神浮神亂神離緇衣生滿面黑氣慘天庭逢之都沒命法在此中評病有三因受病主治不同論第十二三因者內因外因不內外因此說從於先古其詞意尚有發而未盡者內因者皆起於七情蘊結於內又兼厚味膏粱熏蒸臟腑房欲勞傷虧損元氣乃五臟受之其病由此內發者但發之多在富貴人及肥胖者十有八九其見症瘡多堅硬根蒂深固二便不調飲食少進外軟內堅平陷無膿表實裡虛毒多難出得此者即病症之內傷也故曰內因外因者皆起於六淫體虛之人夏秋露臥當風取涼坐眠濕地以致風寒濕氣襲於經絡又有房事後得之其寒毒乘虛深入骨髓與氣血相凝者尤重或外感風邪發散未盡遂成腫痛此肌肉血脈筋骨受之其病由此外來者發之多在不善調攝澆薄勞碌人十有八九見症多寒熱交作筋骨疼痛步履艱辛濕痰流毒以及諸風癱瘓口眼歪斜半身不遂風濕風溫天行時毒等症得此者即疾病之外感也故曰外因又有不內外因內無七情干內外無六淫傷外何由來也其病得之於飢飽勞役喜怒不常飲食者冷熱不調動作者勤勞不惜以致臟腑不和榮衛不順脾胃受傷經絡凝滯故為疾者外無六經形症內無便溺阻隔其病多生於膜外肉裡肌膚之間似瘰癧痰注氣痞癭瘤之屬治法不必發表攻裡只當養氣血調經脈健脾和中行痰開鬱治之法為最善此是三因理之盡矣調理須知第十三凡人無病時不善調理而致生百病況既病之後若不加調攝而病豈能得愈乎其調治有法初起病時先看病者元氣虛實次者瘡之陰陽險否然後用藥調治當攻即攻可補便補不可因循耽誤以致變態不虞也且患者又當安定心神相忘諸念毋使愴慌乃保神氣不得變亂也再順天時假如夏熱坐臥不可為風忌置水於榻前床下冬寒須避起居常要溫和非柴火不可開瘡看視常有寒侵致生多變又未潰之先毒氣內作倘有口乾渴症者涼物須當少少與之以滋蘊熱至膿潰之後生冷硬物一概禁之不然傷脾損胃膿必難成致瘡軟陷又難收斂飲食須當香燥甘甜粥飯隨其喜惡毋餐過飽宜少宜熱宜濃方無停滯又得易化故也如大瘡潰後氣血兩虛脾胃並弱必制八仙糕早晚隨食數餅以接補真元培助根本再熬參朮膏如患者脾胃俱虛飲食減少胸膈不寬飲食無味者用白朮膏三匙人參膏二匙清米湯空心化服喜飲者酒化亦可若精神短少昏沉多睡自汗勞倦懶於動作者用人參膏三匙白朮膏二匙亦酒化服如肌膚粗澀面蒼不澤或大便血少虛祕以及皮乾發槁者同地黃膏各二匙和服或飲陽春酒更妙其功強健精神頓生氣血開胃助脾潤肌榮骨此二藥功甚非小大瘡不可缺之實非草藥之比病者當信用之乃無更變虛視者又多反覆不常故有易愈難愈之態實在乎得此失此之規也雜忌須知第十四凡病雖在於用藥調理而又要關於雜禁之法先要灑掃患房潔淨冬必溫幃夏宜涼帳庶防蒼蠅蜈蚣之屬侵之牛犬腥羶醃臘熏藏之物俱能作渴生干瓜果梨柿菱棗生冷等類又能損胃傷脾雞鵝羊肉蚌蛤河豚蝦蟹海腥之屬並能動風發癢油膩煎炒烹炙咸酸厚味等件最能助火生痰赤豆蕎麵動氣發病惱怒急暴多生痞滿飲食太過必致脾殃瘡愈之後勞役太早乃為羸症入房太早後必損壽不避風寒復生流毒不減口味後必瘡癢無度大瘡須忌半年小瘡當禁百日此誠為知命君子也瘡瘍看法初起頂高根活色赤發熱焮腫疼痛日漸高腫者順已成焮痛皮薄光亮飲食如常二便調和身溫者順已潰膿稠色鮮不臭腐肉自脫焮腫易消身輕者順潰後膿厚稠黃新肉易生瘡口易斂飲食漸進者順初起頂平根散色暗微腫不熱不疼身體倦怠者逆已成腫堅色紫不作膿不腐潰惟口乾多煩躁者逆已潰皮爛內堅不腐腫仍不消痛仍不減心煩者逆潰後膿水清稀腐肉雖脫新肉不生色敗臭穢者死腫瘍治法初起知痛或不痛起發或不發毋論陰陽表裡日數遠近但未見膿者俱宜灸之既灸不知痛癢明灸之焮腫發熱疼痛有時脈來浮數無便祕者宜藥托之身體拘急脈緊惡寒飲熱就暖者邪在表也宜汗之腫硬痛深口乾便祕身熱脈實者邪在裡也宜下之焮痛勢甚煩躁飲冷舌乾口燥者火在上也宜清之腫痛堅硬背如負石噁心乾嘔邪毒在內解毒拔之腫痛日深內膿不出瘀肉塗塞瘡口者急宜開割之軟慢不作膿及不腐潰者陽氣虛也壯脾胃助陽氣身涼自汗手足並冷六脈虛細便泄陽脫也急溫之癰疽治驗一男子年五十餘背心生疽十三日矣湯水全然不入堅硬背如負石煩悶不語請視之瘡勢雖重皮色亦紫喜其根腳交會明白毒尚結局於此未經入內故可治之須行拔法使毒氣外發不致內攻為要隨煮藥筒提拔二次共去惡血碗許又脈實便祕以內疏黃連湯及豬膽套法大便通利二次使內外毒氣皆得通泄隨夜睡臥得寧背重失其大半次用托裡排膿之藥外以桑木灸法腫硬漸腐膿毒漸出換服十全大補湯加麥冬五味數服腐肉自脫飲食漸進瘡口漸合調理兩月餘而愈一老婦年近七旬背瘡已過半月形勢全然可畏彼傢俱置不治愴惶整備後事召豫看童稚瘡恙見問其故舉家大小咸言待斃朝夕豫強借觀可否視之瘡形半背皆腫瘡雖不高亦不內陷以手按之外實而內腐老年內虛膿毒中隔不得外發故也雖飲食不餐且喜根腳兩無混雜臟腑各無敗色乃有生之症也病家故執不信又言簽龜命卜俱斷必死治豈生乎豫嗟可惜也再三四日不治內膜穿潰必死此命陷於無辜矣次日豫心不服自往討治喟然嘆曰豫非相強實見其有生不忍舍其待死固欲強之醫後藥金分毫不取直待患者果愈隨其酬補何如彼衆方肯先用蔥艾湯淋洗瘡上外面俱是不腐頑肉隨用披針利剪正中取去二寸頑肉放通膿管以手輕重之間捺淨內蓄膿血交流不住約有三碗傍視者無不點頭失色待膿血稍盡仍換前湯洗淨用膏封貼內用回元大成湯二服以接補真氣後用人參養榮湯倍參術加香附早以八味丸八仙糕相兼調理欲其脾健食進腐脫肌生況此婦謹慎調理並未更變不出百日瘡愈身健而安自後方信豫言無謬也一監生年過五旬素有渴症身又肥胖之極生背疽約有尺許至十二朝後請治視其瘡勢微腫色淡微紅根腳半收半散此陰陽相等之症也況肥人內虛瘡勢又大非補托瘡必難起毒必易陷恐後不及事也初服便以托裡散固其內候至十五日外用披針小小從頂放通三孔庶使內膿內毒有路而出勢大不可過放走泄元氣恐膿難成內用參耆內托散倍加人參黃耆各三錢服至二十日大膿將發日至升許早以參朮膏午用十全湯加參耆各四錢麥冬五味子各一錢服至月餘肉腐通潰膿似泉湧間用聖愈湯八仙糕兼之調理保助脾胃增進飲食後恐前藥不勝其事藥中加熟附一錢喜其脾健膿稠色黃而止至四十日外瘡勢方得微退時值仲夏天炎酷熱患者生煩誤飲冷水二碗至晚瘡隨下陷忽變為陰不痛無膿身涼脈細腹痛足冷彼覺請視瘡形軟陷脈亦細微此瘡因寒變之故也非辛熱不可回陽急用十二味異功散倍人參熟附各三錢不應此藥力不勝其寒也換用生附人參各五錢早晚二服方得身溫脈起瘡高腹痛又二服膿似前流大膿出至一月約有百碗余竟不減少外皮紅退亦不腐爛此肥人外實而內虛皮故不腐而內潰也又用紅玉膏搽於棉花片上推入患內膏蓋之其內腐漸脫漸出又十日後出大腐一塊約有六兩自然腫消身便膿少漸長生肌百日外方得平復人參服過五斤外附子亦用十兩餘方得全安此症設用解毒傷脾宣利等藥不用辛熱峻補豈有得生之理一鄉官年逾七旬余發瘡右背已經八日外視之瘡雖微腫色淡不紅勢若龜形根漫不聳此老年氣血衰弱之故也診其脈帶微數而有力此根本尚有蒂也雖老可治隨用排膿內托散加皂刺以潰膿托裡為要服至十三日後瘡漸腫高色亦漸赤便不能腐潰為膿此食少脾弱不能培養之故也又用十全大補湯數服膿亦漸出不能快利凡膿澀滯者內膜中隔不通故也不可惜其老而誤其大事隨用披針當頭取開寸許捺通膿管果膿隨出以豬蹄湯洗淨膏蓋後用照藥每日一次外肉漸腐為膿患者形色枯槁不澤更用人參養榮湯倍加參耆托裡腐肉將脫者取之新肉欲生者培之但老年氣血不能速效又加服參朮膏早晚二次以後新肉方生飲食頓倍調理七十五日而安一庠生年六十餘患背疽十日外視其瘡形堅硬色亦深紫頭髮甚多含若螺子豎長尺余根橫半背且喜其弓腫光亮發熱焮痛脈得洪數而有力此瘡得於膏粱醇酒濕熱交蒸之故也雖重不妨隨用照藥三條相應照畢其頭內含螺子盡欲吐出亦用抿腳括去又流惡血鍾許蔥湯洗淨搽上腐藥用紙蓋貼周圍根腳用吸毒散敷之收其毒氣庶不開大次日仍照舊敷三日後外肉漸腐內加托藥培助脾胃解毒為膿早服八味丸以滋腎水換洗蹄湯仍將膏貼候其腐盡深入寸余隨用紅膏日漸日長但此公素性好飲雖在恙中不能相忌兩月後新肉雖平嬌嫩不能結皮完口因嫌戒飲復將浮嫩之肉盡行剪去用膏貼數日待肉老平換用珍珠散摻上數次方結老蓋八十日而安一老年人患疽半月其瘡貫脊遍背皆腫上至肩膊下至腰脅腫若瓜形頭計數百彼家以為勢重不治豫診其脈微洪而不鼓又兼腫焮外發詢問飲食知味其年雖老而根本尚有餘也雖老何慮先用托裡消毒散二服其勢稍定外用桑木灸法助力腐潰根以鐵筒膏箍之更服排膿內托散候正膿漸出但老年氣血外肉不能易腐視其肉色相變不能腐化者隨用針鉤利剪徐徐剪去其形腐凹寸余長低尺許凡見紅肉便用膏塗其新肉已生將半時值隆冬患家自行開瘡洗看失著柴炭之火又兼蓋護未暖外被寒侵次後瘡色淡白膿反清稀飲食減少氣體不舒請視之此不遵調法愛護乃被寒氣侵入也雖變不妨因瘡原稟於陽故能不失陽矣房中即著柴火烘燻暖氣逼盡余寒開瘡相看果應前言也隨用濃蔥湯乘暖淋洗將紅膏烘化搽上外用膏貼以熱綿軟絹復疊數層繃蓋甚密內用神功托裡散早晚連進二服次早復看其瘡自回陽矣已後遵法調理百日而安一老人年過六旬患背疽十二日矣視其瘡形半腫半紅微痛微熱其患發於背心之下腎俞之上高低平等廣開八寸根腳泛腫色若水噴頂軟無神似腐非腐兼診脈浮而大重按而虛此瘡利於腫潰不利於收斂辭不可治彼家喟然而笑復請里中老醫視之見患者起居平和言語清利舉動如常飲食有味此為五善俱具是安若泰山之症也何必相慮彼家得此欣躍萬態隨用其藥日漸有功膿潰腫退腐盡肌生彼此以為萬全之象也豫常對患家親族言此病不可待必死於收口至錢大時也衆若以豫為胡說後問收口只有錢許未合豫曰不久居也急備後事恐不及矣不數日變症一出不四朝而死后里人始信豫之前言是矣一男人六旬有二發生右搭先用艾灸次漸形勢高腫堅硬不痛十五日後尚未潰膿日生煩悶恐其毒陷先用針通隨行拔法找出惡血鍾許已後稍得輕便搽上化腐之藥膏蓋用至三日其瘡漸作腐潰至二十日亦出正膿壞肉漸脫新肉漸生此外治之法盡矣因病家與內科一醫平交甚切托彼用藥內服而不遵外科補托之法自執己見不聽豫言失於峻補每日人參不過二錢以為足用豫曰不足法當五錢兼熟附二錢方為稱病不然必生變矣彼此不信後果肉色淡白瘡口散大膿水清稀飲食減少此敗症具矣後雖強投溫中健脾大補之藥終則不應至於形體消削膿水臭穢延至六十日歷盡氣血而亡然後方自懊悔殊不知凡大瘡每日膿出一碗用參必至三錢以此為則況本病出膿日有三碗用參二錢謂之大損小補豈不歸死又外科乃破漏之病最能走泄真氣如損補兩不相敵無以抵當往往至於不救者多矣此為不信於補而執俗見自取敗亡者也可惜一男子年近六旬時值仲夏背生熱癤二十餘處彼家邀請視孫瘡恙見彼坐於堂滿背皆癤豫略視之內有一瘡比癤甚小其毒甚大豫對曰此非瘡癤比也後發勢不可及彼笑而答之無恙也乃即送至門庭豫又囑曰可急請他醫治之不可緩待俱不聽信又至十日形勢稍發命里中一醫治之又曰是癤也又十日形勢內陷敗症齊出稍信前言方央親友邀豫相視其人睡臥於堂帛復瘡上登堂未進二三步即退人曰何也豫曰敗氣滿前死期速矣何必視瘡急備後事再七日死後果如言不差時刻此為諱疾忌醫致其自敗者也可惜以上治法種種不能枚舉聊陳數條與同志者採訪觀之所謂得其要者一言而終不知其要者流散無窮但病不參透舉手錯亂醫理精明決斷自成腫瘍主治方神授衛生湯神授衛生方芷甲羌乳紅沉石決明皂翹歸尾銀花草大黃花粉效如神治癰疽發背腦疽對口丹瘤瘰癧惡毒疔瘡濕痰流注及外科一切瘡症但未成者即消已成者即潰能宣熱散風行瘀活血解毒消腫疏通臟腑且藥性平和功效甚速誠外科首用方也羌活八分防風白芷穿山甲土炒研沉香紅花連翹石決明煅各六分金銀花皂角刺歸尾甘草節花粉各一錢乳香五分大黃酒拌炒二錢脈虛便利者不用水二碗煎八分病在上部先服藥隨後飲酒一杯病在下部先飲酒一杯隨後服藥以行藥勢內消沃雪湯內消沃雪青陳皮乳沒翹針甲芷耆射干芍貝銀花粉木香甘草大黃歸治發背並五臟內癰尻臀諸腫大小腸癰肛門臟毒初起但未出膿堅硬疼痛不可忍者並服青皮陳皮乳香沒藥連翹黃耆當歸甘草節白芷射干天花粉穿山甲貝母白芍金銀花皂角刺各八分木香四分大黃二錢水酒各一碗煎至八分量病上下食前後服之內疏黃連湯內疏黃連湯木香梔歸芩芍薄荷郎桔梗甘草連翹等大黃加倍效能強治癰疽腫硬發熱作嘔大便祕澀煩躁飲冷噦啘心煩舌乾口苦六脈沉實有力此邪毒在臟也急宜服此以內除之使邪氣不得傳變經絡木香黃連山梔當歸黃芩白芍薄荷檳榔桔梗連翹各一錢甘草五分大黃二錢水二茶鍾煎八分食前服臨服加蜜二匙亦可保安萬靈丹保安萬靈丹術蠍天麻歸斛草芎朱羌活荊防細辛等麻雄黃二共三烏治癰疽疔毒對口發頤風濕風溫濕痰流注附骨陰疽鶴膝風症左癱右瘓口眼喎斜半身不遂氣血凝滯偏身走痛步履艱辛偏墜疝氣偏正頭痛破傷風牙關緊閉截解風寒無不應效茅朮八兩全蠍石斛明天麻當歸甘草炙川芎羌活荊芥防風麻黃北細辛川烏湯泡去皮草烏湯泡去皮尖何首烏各一兩明雄黃六錢上為細末煉蜜丸彈子大每藥一兩分作四丸一兩作六丸一兩作九丸三等做下以備年歲老壯病勢緩急取用預用硃砂六錢研細為衣瓷罐收貯如惡瘡初起二三日之間或癰疽已成至十朝前後但未出膿者狀若傷寒頭疼煩渴拘急惡寒肢體疼痛噁心嘔吐四肢沉重恍惚悶亂坐臥不寧皮膚壯熱又治傷寒四時感冒傳變疫症但惡寒身熱表症未盡者俱宜服之用連須大蔥白九枝煎湯一茶鍾將藥一丸乘熱化開通口服盡被蓋出汗為效如服後汗遲再用蔥白湯催之後必汗如淋洗漸漸退下覆蓋衣物其汗自收自斂患者自然爽快其病如失但病未成者隨即消去已成者隨即高腫潰膿如諸疾無表症相兼不必發散者只用熱酒化服此方原載於諸風癱瘓門豫每用之發散瘡毒其功甚捷故移録於此詳觀此方治腫瘍甚效者何也凡瘡皆起於榮衛不調氣血凝滯乃生癰腫觀此藥性專發散又能順氣搜風通行經絡所謂結者開之況瘡毒又乃日積月纍結聚所發苟非甘溫辛熱發泄以汗疏通安能得效所謂發散不遠熱正合此方之意無謬也服後避風當食稀粥忌冷物房事孕婦勿服雙解復生散雙解荊防芎芍耆麻黃甘草荷山梔歸翹滑石銀羌活參朮硝黃共得宜治癰疽發背諸般腫毒初起憎寒發熱四肢拘急內熱口乾大小便祕宜此藥發表攻裡並效荊芥防風川芎白芍黃耆麻黃甘草五分薄荷山梔當歸連翹滑石金銀花羌活人參白朮各八分大黃芒硝各二錢水二碗表症甚者姜三片蔥頭二莖里症甚者臨服加生蜜三匙和服為發表攻裡雙解藥也內消散內消散內用銀花知貝天花白芨加半夏穿山並皂刺乳香功效病無嗟治癰疽發背對口疔瘡乳花百種無名腫毒一切歹瘡此藥能令內消化毒為黑水從小便而出勢大者雖未全愈亦可轉重就輕移深居淺金銀花知母貝母天花粉白芨半夏穿山甲皂角針乳香各一錢水酒各一碗煎八分隨病上下食前後服之留藥渣搗爛加秋芙蓉葉細末一兩白蜜五匙同渣調敷瘡上一宿自消重者再用一服忌口效清熱消風散清熱消風散芎芍歸粉銀花翹皂角柴芩防草與紅花陳皮蒼朮耆無落治癰疽諸毒瘡腫已成未成之間外不惡寒內無便祕紅赤高腫有頭焮痛宜服此藥和解之防風川芎當歸黃芩白芍天花粉金銀花甘草五分連翹紅花柴胡蒼朮陳皮黃耆角刺各一錢水二茶鍾煎八分食遠服婦人加香附童便炒以上七方癰疽七日以前瘡勢未成形體壯實表裡之症相合者宜服病退即已如過七日以後形勢已成便宜用後托裡等藥催毒在外以速其膿禁前表下之藥損傷元氣致生多變矣內固清心散內固清心散茯苓砂雄豆蔻乳香稱甘草緑豆玄明粉人參冰片可清心治癰疽發背對口疔瘡熱甚焮痛煩躁飲冷有此症者可預防毒氣內攻當服此藥庶不變症茯苓辰砂人參玄明粉白豆蔻甘草乳香明雄黃冰片一錢真豆粉二兩上為細末每服一錢五分蜜湯調下不拘時候護心散護心散中豆粉佳乳香甘草共硃砂每服二錢頻送下敢交嘔吐自無他治瘡毒內攻口乾煩躁噁心嘔吐者宜用此藥真豆粉一兩乳香淨末三錢硃砂一錢甘草末一錢上共研極細每服二錢白滾湯調服早晚二次琥珀蠟礬丸琥珀蠟礬丸琥珀明礬黃蠟與硃砂雄黃蜂蜜丸成就護心護膜效堪誇治癰疽發背已成未膿之際恐毒氣不得外出必致內攻預服此丸護膜護心亦且散血解毒白礬一兩二錢黃蠟一兩雄黃一錢二分琥珀另研極細一錢硃砂一錢二分蜂蜜二錢臨入上四味先碾研極細另將蜜蠟銅杓內溶化離火片時候蠟四邊稍凝時方入上藥攪勻共成一塊以一人將藥火上微烘衆手急丸小寒豆大用硃砂為衣瓷罐收貯每服二三十丸白湯食後送下病甚者早晚日進二次其功最效托裡消毒散托裡消毒散人參芎芍耆歸術茯苓角針白芷銀花等桔梗甘草效如神治癰疽已成不得內消者宜服此藥以托之未成者可消已成者即潰腐肉易去新肉易生此時不可用內消泄氣寒涼等藥致傷脾胃為要人參川芎白芍黃耆當歸白朮茯苓金銀花各一錢白芷甘草皂角針桔梗各五分水二鍾煎八分食遠服脾弱者去白芷倍人參排膿內托散排膿內托散芎歸參朮苓陳芍茯耆甘草桔梗並肉桂隨方加減在人為治癰疽腦項諸發等瘡已潰流膿時宜服此藥當歸白朮人參各二錢川芎白芍黃耆陳皮茯苓各一錢香附肉桂各八分甘草五分白芷項之上加三分桔梗胸之上加五分牛膝下部加五分姜三片水二茶鍾煎八分食遠服乳香黃耆散乳香黃耆散乳沒粟殼參耆甘草撮芎歸白芍與陳皮加上熟地疼即脫治癰疽發背諸毒疔瘡疼痛不可忍者或未成者速散已成者速潰敗腐膿毒不假刀砭其惡肉自然脫下及治打撲損傷筋骨疼痛並服之乳香沒藥各五分黃耆粟殼去筋膜蜜炒人參甘草川芎歸身白芍陳皮熟地黃各一錢水二鍾煎八分量病上下食前後服之神功內托散神功內托散芎耆歸術陳皮白芍宜附子木香甘草炙參苓山甲起顛危治癰疽腦項諸發等瘡至十四日後當腐潰流膿時不作腐潰更兼瘡不高腫脈細身涼者用當歸二錢白朮黃耆人參各一錢五分白芍茯苓陳皮附子各一錢木香甘草炙各五分川芎一錢山甲炒八分煨姜三片大棗二枚水二茶鍾煎八分食遠服透膿散透膿散內用黃耆山甲芎歸總得宜加上角針頭自破何妨膿毒隔千皮治癰疽諸毒內膿已成不穿破者宜服之即破黃耆四錢山甲炒末一錢當歸二錢皂角針一錢五分水二鍾煎一半隨病前後服臨入酒一杯亦好竹葉黃耆湯竹葉黃耆湯草芩芎歸耆芍共人參半夏石膏兼淡竹麥冬生地可回津治癰疽發背諸般疔腫表裡熱甚口乾大渴者黃耆甘草黃芩川芎當歸白芍人參半夏石膏淡竹葉十片麥冬各八分生地黃一錢水二鍾姜三片燈心二十根煎八分食遠溫服回陽三建湯回陽三建附參耆歸術芎苓杞活萸陳朴木紅甘紫草陰疽危症效堪推治陰疽發背初起不疼不腫不熱不紅硬若牛皮堅如頑石十日外脈細身涼肢體倦怠皮如鱉甲色似土朱粟頂多生孔孔流血根腳平散軟陷無膿又皮不作腐手熱身涼者俱急服之附子人參黃耆當歸川芎茯苓枸杞陳皮萸肉各一錢木香甘草紫草厚朴蒼朮紅花獨活各五分煨姜三片皂角樹根上白皮二錢水二碗煎八分入酒一杯隨病上下食前後服之用綿帛蓋暖瘡上預不得大開瘡孔走泄元氣為要愚按凡背疽屬陰者皆由臟腑先壞而內毒不得發越於外也舊有用雞冠剪血滴於疽上者有醋煮雄艾敷用者豬腦熱藥敷圍者神燈火氣灼照者此數法皆陰疽之用豫雖常用未見其實但陰疽不起者如樹木之根壞強力培植枝葉而終無發生之理豫常據理用藥固有得其生者十中三四譬如先要疏其嫁土通其地脈助其根本回其陽氣此四者缺一不可用蒼朮厚朴茯苓陳皮疏其土川芎當歸紫草紅花通其脈人參黃耆枸杞山萸助其本附子木香甘草獨活回其陽如此用之但根本內有一脈未絶之氣服之俱可得其生又驗其手足溫暖瘡便發熱漸作焮腫復生疼痛色暗得活堅硬得腐胃氣得回此是藥之效驗必在三服中應之為吉外兼照法接助回陽此通治陰疽之大法也黍米寸金丹黍米寸金丹乳沒雄黃狗寶射蟾酥輕粉粉霜硇黑石丁香狗鯉膽蜈蚣二名返魂丹三名再生丸四名追命丹五名延壽丹六名來蘇丸七名知命丸八名得道丸此方昔出異人所傳常有暴中急症忽然卒倒者干開牙關研灌三丸其人即活又能治發背腦疽遍身壅腫附骨癰疽等症初起憎寒壯熱四肢倦怠沉重者毋分表裡老幼輕重並宜服之麝香五分乳香沒藥雄黃狗寶輕粉烏金石各一錢蟾酥二錢粉霜水銀煉白色者黃蠟各三錢硇砂二錢鯉魚膽陰乾三個狗膽乾用一個白丁香四十九根金頭蜈蚣全者酥炙黃色七條頭胎男乳一合上件為細末除黃蠟乳汁二味熬成膏子同藥和丸緑豆大大人三丸小兒用一丸病重者五丸冷病用蔥湯熱病用新汲水送下衣被密蓋勿令透風汗出為度諸病如失後食白粥調理熏發背奇方發背諸方此獨奇誰期照藥罕人知雄竭射砂並沒藥為燈一照脫藩籬治發背初起七日前後未成者自消已成者自潰不起發者即發不潰腐者即腐誠為良法也雄黃硃砂血竭沒藥各二錢麝香四分上五味研為細末每用三分綿紙裹藥為燃長約尺許以真麻油潤透灼火離瘡半寸許自外而內周圍徐徐照之火頭向上藥氣入內瘡毒隨火解散自不內侵臟腑初用三條漸加至四五條候瘡勢漸消漸減熏後隨用敷藥如已潰大膿發泄時不必用此照敷只宜用膏藥蓋貼敷藥方熏後敷方有四般車前豨蘞五龍堪米粉銀花為糨和敷之百腫自當安車前草連根葉豨蘞草五龍草金銀花各等分上四味鮮草藥一處搗爛加三年陳米粉即常用糨衣者初起仍如飛鹽末二三分共打為稠糊遍敷瘡上中留一頂以膏蓋貼避風自然拔出膿毒若冬月草無鮮者預採蓄下陰乾為末用陳米醋調敷亦如前法並效今恐前敷藥內用五龍草隨地或有缺少不便合用豫常熏後頂以膏蓋周圍腫上以如意金黃散代敷亦效如意金黃散如意金黃散大黃薑黃黃柏芷陳蒼南星厚朴天花粉敷之百腫自當安治癰疽發背諸般疔腫跌撲損傷濕痰流毒大頭時腫漆瘡火丹風熱天泡肌膚赤腫乾溼腳氣婦女乳癰小兒丹毒凡外科一切諸般頑惡腫毒隨手用之無不應效誠為瘡家良便方也天花粉上白十斤黃柏色重者大黃薑黃各五斤白芷五斤紫厚朴陳皮甘草蒼朮天南星各二斤以上共為咀片曬極乾燥用大驢磨連磨三次方用密絹羅廚篩出瓷器收貯勿令泄氣凡遇紅赤腫痛發熱未成膿者及夏月火令時俱用茶湯同蜜調敷如微熱微腫及大瘡已成欲作膿者俱用蔥湯同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風症等病俱用蔥酒煎調如風熱惡毒所生患必皮膚亢熱紅色光亮形狀遊走不定者俱用蜜水調敷如天泡火丹赤遊丹黃水漆瘡惡血攻注等症俱用大藍根葉搗汁調敷加蜜亦可湯潑火燒皮膚破爛麻油調敷具此諸引理取寒熱溫涼制之又在臨用之際順合天時洞窺病勢使引為當也四虎散四虎散內用南星草烏半夏效通靈藥內再添狼毒力癰疽頑腫即安寧治癰疽腫硬厚如牛領之皮不作膿腐者宜用南星草烏半夏狼毒各等分上為細末用豬腦同搗遍敷瘡上留正頂出氣真君妙貼散真君妙貼散奇功蕎麵硫黃白麵同諸般異症皆堪效常取收功掌握中治癰疽諸毒及異形異類頑硬大惡歹瘡走散不作膿者宜用此藥不痛者即痛痛甚者即止明淨硫黃為末十斤蕎麵白麵各五斤共一處用清水微拌乾溼得宜木箱內曬成面片單紙包裹風中陰乾收用臨時再研極細用新汲水調敷如皮破血流濕爛疼苦等症麻油調搽天泡火丹肺風酒刺染布青汁調搽並效回陽玉龍膏回陽王龍膏肉桂白芷軍姜仍在位草烏赤芍與南星熱酒同調功更倍治背疽陰病不腫高不焮痛不發熱不作膿及寒濕流注鼓風久損冷痛痹風諸濕腳氣手足頑麻筋骨疼痛及一切皮色不變漫腫無頭鶴膝風等但無皮紅肌熱者一概用之俱有功效草烏炒三兩軍姜煨三兩赤芍炒白芷南星煨各一兩肉桂五錢上制畢共為細末熱酒調敷此藥有軍薑肉桂熱血生血既生既熱恐不能散而為害故有草烏南星可以破惡氣祛風毒活死肌除骨痛消結塊回陽氣又有赤芍白芷足以散滯血住痛苦加以酒行藥性攻通氣血雖十分冷症未有不愈者誠為寒灰之焰枯木之春大抵病冷則肌肉陰爛不知痛癢其有痛者又多附骨之痛設若不除則寒根透髓尋常之藥固莫能及矣沖和膏沖和膏內紫荊皮獨活菖蒲赤芍宜白芷隨方加減法諸般百症可堪醫治癰疽發背陰陽不和冷熱不明者宜用此藥紫荊皮炒五兩獨活炒三兩赤芍炒二兩白芷一兩石菖蒲一兩半上為細末蔥湯熱酒俱可調敷藥中紫荊皮乃木之精能破氣逐血消腫獨活土之精動蕩凝滯血脈散骨中冷痛去麻痹濕石菖蒲水之精善破堅硬生血止痛破風消腫白芷金之精能去風生肌定痛赤芍藥火之精能生血活血散瘀除痛蓋血生則肌肉不死血動則經絡流通故肌活不致爛痛經通不致壅腫此為散風行氣活血消腫祛冷軟堅之良藥也其中五行相配用者再無不效之理又流毒骨疽冷症尤效鐵桶膏鐵桶膏中銅緑倍膽礬輕粉鬱金香還有晉礬並白芨醋調箍腫不開張治發背將潰已潰時根腳走散不收束者用此銅緑五錢明礬四錢膽礬三錢五倍子微炒一兩白芨五錢輕粉鬱金各二錢麝香三分上為極細末用陳米醋一碗杓內慢火熬至一小杯候起金色黃泡為度待溫用上藥一錢攪入膏內每用頓溫用新筆塗膏瘡根上以綿紙蓋其瘡根自生皺紋漸收漸緊再不開大為效煮拔筒方拔筒奇方羌獨活紫蘇蘄艾石菖蒲甘草白芷生蔥等一筒拔回壽命符治發背已成將潰時膿毒不得外發必致內攻乃生煩躁重如負石非此法拔提毒氣難出也羌活獨活紫蘇蘄艾鮮菖蒲甘草白芷各五錢連須蔥二兩預用徑口一寸二三分新鮮嫩竹一段長七寸一頭留節用力剗去外青留內白一半約厚一分許靠節鑽一小孔以柵木條塞緊將前藥放入筒內筒口用蔥塞之將筒橫放鍋內以物壓勿得浮起用清水十大碗淹筒煮數滾約內藥濃熟為度候用再用披針於瘡頂上一寸內品字放開三孔深入淺寸約筒圈內將藥筒連湯用大瓷鉢盛貯患者榻前將筒藥倒出急用筒口乘熱對瘡合上以手捺緊其筒自然吸住約待片時藥筒已溫拔去塞孔木條其筒自脫將器倒出筒中物色看其何樣如有膿血相黏鮮明紅黃之色亦有一二杯許其病乃是活瘡治必終愈如拔出物色純是敗血氣穢紫黑稀水而無膿意相黏者其病氣血內敗肌肉不活必是死瘡強治亦無功矣此法家傳屢經有驗如陽瘡易潰易膿之症不必用此以傷氣血此法陰瘡之用要在十五日前後堅硬不潰不膿者行之最當此法的有回天之效醫家不可缺也豬蹄湯豬蹄湯內羌甘草赤芍黃芩白芷歸加上露蜂房更妙諸瘡一洗脫凡衣治癰疽諸毒已潰流膿時用此湯洗消毒氣去惡肉回死肌潤瘡口又能散風消腫腐盡則已羌活甘草赤芍黃芩白芷當歸蜂房各等分上為粗末看疽瘡大小用藥多少先將獖豬前蹄一隻用白水六碗煮蹄軟為度將汁濾清吹去汁上油花用藥一兩投於汁中再用微火煎十數沸密絹濾去藥渣候湯半熱將軟絹蘸湯淋於瘡上輕手挹去瘀膿腐肉其惡物隨湯而下洗訖以絹帛挹干照前總論次第如式用藥又洗藥方洗藥方中歸獨活蔥頭白芷甘草撮癰疽腐盡此淋之生肌長肉常誇說當歸獨活白芷甘草各二錢蔥頭五個用水三碗煎至藥爛濾清以絹帛蘸湯挹淨瘡上隨搽貼紅黑二膏蓋之洗時切忌風寒為要常治背瘡輕易者以此代豬蹄湯用其功亦效加味太一膏太一膏中桂芷歸乳沒丹參地芍魏將軍木鱉兼輕粉血餘槐柳共稱奇治發背癰疽及一切惡瘡跌撲傷損濕痰流毒風濕風溫遍身筋骨走注作痛內傷風鬱心腹胸背攻刺作痛腿腳痠軟腰膝無力湯潑火燒刀傷棒毒五損內癰七傷外症俱貼患處又男子遺精婦人白帶俱貼臍下臟毒腸癰亦可丸服諸般瘡癤血氣癩癢諸藥不止痛癢者並效肉桂白芷當歸玄參赤芍生地大黃土木鱉各二兩真阿魏三錢輕粉四錢槐枝柳枝各一百段血餘一兩東丹四十兩乳香末五錢沒藥末三錢上十味並槐柳枝用真麻油足稱五斤將藥浸入油內春五夏三秋七冬十候日數已畢入潔淨大鍋內慢火熬至藥枯浮